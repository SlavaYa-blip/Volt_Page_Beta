en Mitgliederorganisation und effizienten Nutzung der vorhandenen Sportstätten\",\"Fortführung der Sportförderungsrichtlinien im Landkreis Gießen\",\"Stärkung des Sportkreis Gießen als Bindeglied zwischen Vereinen, Stadt und Landessportbund\",\"Vernetzung der Sportvereine mit Bildungsträgern und Schulen\",\"Nachwuchs- und Jugendförderung durch Schul-Sport-Kooperationen\",\"Förderung frei zugänglicher Sport- und Begegnungsstätten, z.B. überdachte Basketballplätze, Skateparks, Stangenparks, Schachfelder, Barfuß- und Erlebnispfade, Bolzplätze, Abenteuerspielplätze, Kneipp-Becken\"],\"path\":\"C:/Users/Slava/.gemini/antigravity/scratch/volt-giessen-website/assets/Whalprogramme/wahlprogramm/cluster2_bildung-gesundheit/themenblock1_bildung/thema_sportfoerderung.md\"},{\"slug\":\"thema_aerztliche-versorgung\",\"title\":\"Ärztliche Versorgung & Koordination\",\"cluster\":\"cluster2_bildung-gesundheit\",\"clusterTitle\":\"Bildung Gesundheit\",\"themenblock\":\"themenblock2_medizin\",\"themenblockTitle\":\"Medizin\",\"tags\":[\"Gesundheit\",\"Soziale-Gerechtigkeit\",\"Innovation\"],\"links\":[\"thema_oepnv\",\"thema_hochschulbildung\",\"thema_arbeit-industrie-gerecht\"],\"paragraph\":\"Im Landkreis Gießen überschritten im letzten Jahr rund 70 % des hausärztlichen Fachpersonals die Altersgrenze von 65 Jahren. Gleichzeitig sinkt die Zahl der Medizinischen Fachangestellten, die für reibungslose Abläufe in den Praxen sorgen und viele behandlungsbedürftige Personen warten lange auf Facharzttermine.\",\"massnahmen\":[\"Lokale Gesundheitsversorgungszentren schaffen und stärken, insbesondere in sozial benachteiligten Wohngebieten. Dadurch sollen faire Gesundheitsstrukturen aufgebaut und die Gesundheitskompetenz der Bevölkerung erhöht werden.\",\"Mobile Gesundheitsangebote ausbauen, wie etwa Sprechstunden auf Rädern und Impfbusse, um eine flächendeckende Versorgung zu gewährleisten.\",\"Die Gründung von Gemeinschaftspraxen unterstützen, um die Arbeitsbedingungen des medizinischen Personals zu verbessern und effizientere Versorgungsstrukturen zu schaffen.\",\"Die Nachwuchsgewinnung stärken, etwa durch Programme wie das HeLaMed (Hessen | Land | Medizin )-Programm der Universität Gießen, das gezielt auf die hausärztliche Tätigkeit im ländlichen Raum vorbereitet.\"],\"path\":\"C:/Users/Slava/.gemini/antigravity/scratch/volt-giessen-website/assets/Whalprogramme/wahlprogramm/cluster2_bildung-gesundheit/themenblock2_medizin/thema_aerztliche-versorgung.md\"},{\"slug\":\"thema_digitale-gesundheitsstrategie\",\"title\":\"Digitale Gesundheitsstrategie\",\"cluster\":\"cluster2_bildung-gesundheit\",\"clusterTitle\":\"Bildung Gesundheit\",\"themenblock\":\"themenblock2_medizin\",\"themenblockTitle\":\"Medizin\",\"tags\":[\"Gesundheit\",\"Digitalisierung\",\"Innovation\",\"Barrierefreiheit\"],\"links\":[\"thema_pflege-alter\",\"thema_notfallversorgung\"],\"paragraph\":\"Viele Gesundheitsdienste arbeiten noch analog und sind nicht miteinander vernetzt. Dabei können digitale Lösungen die Versorgung verbessern. Ohne eine koordinierte digitale Gesundheitsstrategie bleibt das Potenzial digitaler Lösungen für eine bessere, gerechtere und krisenfeste Gesundheitsversorgung ungenutzt.\",\"massnahmen\":[\"Den Öffentlichen Gesundheitsdienst (ÖGD) digital besser ausstatten, damit Informationen zur Gesundheitsvorsorge, zu Impfungen und zur Krisenkommunikation schnell verfügbar sind.\",\"Digitale Angebote und Schnittstellen zwischen Kliniken, Arztpraxen, Pflegeeinrichtungen und Rettungsdiensten unterstützen, um eine bessere Zusammenarbeit über die Sektorengrenzen hinweg zu schaffen.\",\"Angebote zum Kompetenzerwerb zu den Themen Digitalisierung und Gesundheit für die Bevölkerung ausbauen, zum Beispiel durch Programme wie Digital durch das Gesundheitswesen.\",\"Die Verstetigung und den Ausbau von Pilotprojekten wie dem Licher Modell zur digitalen Nachsorge vorantreiben.\"],\"path\":\"C:/Users/Slava/.gemini/antigravity/scratch/volt-giessen-website/assets/Whalprogramme/wahlprogramm/cluster2_bildung-gesundheit/themenblock2_medizin/thema_digitale-gesundheitsstrategie.md\"},{\"slug\":\"thema_frauengesundheit\",\"title\":\"Frauengesundheit & Reproduktive Rechte\",\"cluster\":\"cluster2_bildung-gesundheit\",\"clusterTitle\":\"Bildung Gesundheit\",\"themenblock\":\"themenblock2_medizin\",\"themenblockTitle\":\"Medizin\",\"tags\":[\"Gesundheit\",\"Geschlechtergerechtigkeit\",\"Soziale-Gerechtigkeit\"],\"links\":[\"thema_schulbildung\",\"thema_hochschulbildung\",\"thema_aerztliche-versorgung\",\"thema_pflege-alter\",\"thema_gesundheitsfoerderung-praevention\",\"thema_jugendzentren\"],\"paragraph\":\"Die gesundheitliche Versorgung von Frauen ist in Gießen in mehreren Bereichen unzureichend abgesichert. Hohe Kosten für Verhütungsmittel, ein sehr eingeschränktes Angebot an wohnortnahen Schwangerschaftsabbrüchen sowie Versorgungslücken in der Hebammenbetreuung schränken reproduktive Rechte und den Zugang zu bedarfsgerechter Gesundheitsversorgung ein. Gleichzeitig werden geschlechterspezifische Unterschiede in Medizin und Forschung noch immer zu wenig berücksichtigt, was zu Fehldiagnosen und Unterversorgung führt.\",\"massnahmen\":[\"Den Verhütungsmittelfonds von Pro Familia sichern, ausbauen und bekannter machen, damit Menschen mit geringem Einkommen bei den Kosten für Verhütungsmittel unterstützt werden. Ärztliche Praxen, Apotheken, Jugendzentren und Universitäten sollen aktiv auf dieses Angebot hinweisen, zudem soll der Fonds so aufgestockt werden, dass auch Menschen mit geringem Einkommen ohne Anspruch auf Sozialleistungen Zugang erhalten.\",\"Sicherstellen, dass Schwangerschaftsabbrüche wohnortnah, sicher und ohne Stigmatisierung möglich sind. Volt will fördern, dass ärztliche Praxen im Landkreis Gießen neutral zu Schwangerschaftsabbrüchen beraten, Beratungsbescheinigungen ausstellen und entsprechende Leistungen anbieten. Derzeit werden in Gießen Beratungsbescheinigungen lediglich von drei staatlich anerkannten Konfliktberatungsstellen ausgestellt, von denen zwei in kirchlicher Trägerschaft sind, und Schwangerschaftsabbrüche werden nur von einer ärztlichen Praxis durchgeführt.\",\"Die wichtige Rolle von Hebammen im Wochenbett, in der Stillberatung und in der Geburtshilfe stärken. Beratungsangebote sollen in verschiedenen Sprachen verfügbar sein, um alle werdenden Mütter zu erreichen. Zudem will Volt die Einrichtung eines Fonds fördern, der den Eigenanteil der Haftpflichtversicherung für freiberufliche Hebammen mit Geburtshilfe übernimmt, um die Existenz dieser systemrelevanten Berufsgruppe zu sichern. Die Finanzierung soll aus dem städtischen Gesundheitsbudget und aus Landesmitteln erfolgen.\",\"Geschlechterspezifische Benachteiligungen im Gesundheitswesen abbauen, die dadurch entstehen, dass medizinische Versorgung, Forschung und Behandlung häufig nicht gleichermaßen auf alle Geschlechter ausgerichtet sind. Die geschlechterspezifische Medizin soll gezielt gestärkt werden, indem in kommunalen Krankenhäusern und Gesundheitseinrichtungen regelmäßige Fort- und Weiterbildungsangebote zu geschlechtsspezifischen Unterschieden in Diagnostik, Therapie und Medikation eingeführt werden. Zudem will Volt Versorgungslücken, insbesondere bei Erkrankungen wie Endometriose, systematisch erfassen, sichtbar machen und in kommunalen Gesundheitsberichten berücksichtigen. Durch leicht zugängliche Informations- und Aufklärungsangebote sollen Patientinnen besser über geschlechtsspezifische Risiken, Symptome und Behandlungsoptionen informiert werden. Mehr Wissen und Aufmerksamkeit in der Gesellschaft sollen dazu beitragen, bestehende Ungleichbehandlungen abzubauen und langfristig mehr Gleichberechtigung im Gesundheitswesen zu erreichen.\"],\"path\":\"C:/Users/Slava/.gemini/antigravity/scratch/volt-giessen-website/assets/Whalprogramme/wahlprogramm/cluster2_bildung-gesundheit/themenblock2_medizin/thema_frauengesundheit.md\"},{\"slug\":\"thema_gesundheitsfoerderung-praevention\",\"title\":\"Gesundheitsförderung & Prävention\",\"cluster\":\"cluster2_bildung-gesundheit\",\"clusterTitle\":\"Bildung Gesundheit\",\"themenblock\":\"themenblock2_medizin\",\"themenblockTitle\":\"Medizin\",\"tags\":[\"Gesundheit\",\"Soziale-Gerechtigkeit\",\"Bildung\",\"Klimaresilienz\"],\"links\":[\"thema_klimaresilienz\",\"thema_schulbildung\",\"thema_aktionsplan-haeusliche-gewalt\",\"thema_nachtleben-clubkultur\"],\"paragraph\":\"Chronische Krankheiten durch Lebensstilfaktoren sowie psychische Belastungen nehmen zu, während niedrigschwellige Vorsorge- und Suchthilfeprojekte oft stigmatisiert oder schwer erreichbar sind. In Gießen, einer Stadt mit ausgeprägter Party-Kultur, birgt der Konsum psychoaktiver Substanzen durch Verunreinigungen zusätzliche Risiken. Gleichzeitig verschärft die Klimakrise durch extreme Hitzeperioden die Gesundheitsgefahr für vulnerable Gruppen wie Senioren, Kinder und chronisch Erkrankte.\",\"massnahmen\":[\"Ganzheitliche Prävention & Vorsorge ○ Lebensnahe Angebote: Ausbau von Programmen zu Ernährung, Bewegung und Stressmanagement, die bereits fächerübergreifend in Schulen verankert werden. ○ Mobile Vorsorge: Verstärkte Bewerbung und dezentrale Bereitstellung von Früherkennungsuntersuchungen (z. B. Mammographie, Hautkrebsscreening) in Bürgerzentren. ○ Hitzeschutz: Verbindliche Umsetzung des kommunalen Hitzeaktionsplans. Dies umfasst den Ausbau von Trinkbrunnen, die Förderung von Verschattung und die Ausweitung des digitalen „Coolen Stadtplans\\\" mit kühlen Aufenthaltsorten. ○ Sektorenkopplung: Stärkung der lokalen Gesundheitskonferenz zur Vernetzung von Stadt, Landkreis, Krankenkassen und JLU Gießen.\",\"Evidenzbasierte Suchtpolitik & Harm Reduction\",\"Drug-Checking-Pilotprojekt: Gießen soll als Pionierstadt (analog zu Wiesbaden) ein Drug-Checking-Angebot etablieren. Sobald die hessische Landesverordnung vorliegt, schaffen wir in Kooperation mit der AIDS-Hilfe und dem SuchtHilfeZentrum mobile und feste Teststellen, um Überdosierungen durch verunreinigte Substanzen zu verhindern.\",\"Drogenkonsumraum prüfen: Wir fordern eine systematische Bedarfsanalyse der Gießener Szene. Bestätigt diese den Bedarf, richten wir nach Frankfurter Vorbild einen medizinisch begleiteten Konsumraum ein, um Infektionen zu vermeiden und den Zugang zum Hilfesystem zu ebnen.\",\"Prävention vor Repression: Orientierung an der Schweizer Vier-Säulen-Politik (Prävention, Therapie, Schadensminderung, Repression). Fokus auf Enttabuisierung und gezielte Aufklärung in der Club-Szene und an Schulen.\",\"Wissenschaftliche Begleitung: Evaluation aller Pilotprojekte in Zusammenarbeit mit den Fachbereichen Public Health und Soziologie der JLU Gießen.\"],\"path\":\"C:/Users/Slava/.gemini/antigravity/scratch/volt-giessen-website/assets/Whalprogramme/wahlprogramm/cluster2_bildung-gesundheit/themenblock2_medizin/thema_gesundheitsfoerderung-praevention.md\"},{\"slug\":\"thema_notfallversorgung\",\"title\":\"Innovative Notfallversorgung\",\"cluster\":\"cluster2_bildung-gesundheit\",\"clusterTitle\":\"Bildung Gesundheit\",\"themenblock\":\"themenblock2_medizin\",\"themenblockTitle\":\"Medizin\",\"tags\":[\"Gesundheit\",\"Sicherheit\",\"Digitalisierung\"],\"links\":[\"thema_ukgm-rekommunalisierung\"],\"paragraph\":\"Notaufnahmen und Rettungsdienste sind oftmals überlastet, unter anderem aufgrund zahlreicher Beanspruchung durch nicht dringliche Fälle. Gleichzeitig stehen innovative digitale und sektorenübergreifende Lösungen erst am Anfang ihrer Umsetzung, obwohl sie das Potenzial haben, die Notfallversorgung deutlich zu entlasten und zu verbessern.\",\"massnahmen\":[\"Ambulante Praxen stärker in die Notfallversorgung einbinden, sodass nicht dringliche Fälle über Leitstellen direkt dorthin vermittelt werden können.\",\"Pilotprojekte wie GiMIC, DokPro und SaN verstetigen und weiter ausbauen, um digitale, mobile und sektorenübergreifende Modelle dauerhaft in der Notfallversorgung zu verankern.\",\"Die falsche Inanspruchnahme von Notaufnahmen durch gezielte Aufklärung der Bevölkerung und leicht verständliche Gesundheitsinformationen reduzieren.\"],\"path\":\"C:/Users/Slava/.gemini/antigravity/scratch/volt-giessen-website/assets/Whalprogramme/wahlprogramm/cluster2_bildung-gesundheit/themenblock2_medizin/thema_notfallversorgung.md\"},{\"slug\":\"thema_pflege-alter\",\"title\":\"Pflege & Würde im Alter\",\"cluster\":\"cluster2_bildung-gesundheit\",\"clusterTitle\":\"Bildung Gesundheit\",\"themenblock\":\"themenblock2_medizin\",\"themenblockTitle\":\"Medizin\",\"tags\":[\"Gesundheit\",\"Generationengerechtigkeit\",\"Soziale-Gerechtigkeit\",\"Wirtschaftsförderung\"],\"links\":[\"thema_wirtschaftsfoerderung\"],\"paragraph\":\"Laut Angaben des hessischen Pflegemonitors fehlen in Gießen bereits heute zahlreiche Pflegefachkräfte, Altenpflegekräfte und Mitarbeitende in der Altenpflegeassistenz. Gleichzeitig wird die Zahl der Pflegebedürftigen bis 2040 um nahezu 60 % steigen, wodurch der Bedarf an verlässlichen und gut organisierten Pflege- und Unterstützungsangeboten deutlich zunimmt.\",\"massnahmen\":[\"Pflege- und Betreuungsangebote weiterentwickeln, etwa durch den Ausbau von Pflegestützpunkten, die Stärkung ambulanter Dienste, die flächendeckende Einführung von Gemeindepflegekräften, sowie die Gestaltung und Umsetzung demografiesensibler Wohnformen.\",\"Beratungs- und Unterstützungsangebote für Pflegebedürftige und Angehörige ausbauen und leichter zugänglich machen. Dies soll konkrete Entlastungsmöglichkeiten umfassen, etwa durch das Angebot von mehr Kurzzeitpflegeplätzen sowie durch eine bessere finanzielle Absicherung der Angehörigenpflege. Diese wird oftmals erwartungsgemäß von Frauen übernommen und bislang weder angemessen entlohnt noch ausreichend wertgeschätzt.\"],\"path\":\"C:/Users/Slava/.gemini/antigravity/scratch/volt-giessen-website/assets/Whalprogramme/wahlprogramm/cluster2_bildung-gesundheit/themenblock2_medizin/thema_pflege-alter.md\"},{\"slug\":\"thema_ukgm-rekommunalisierung\",\"title\":\"Rücküberführung des UKGM in öffentliches Eigentum\",\"cluster\":\"cluster2_bildung-gesundheit\",\"clusterTitle\":\"Bildung Gesundheit\",\"themenblock\":\"themenblock2_medizin\",\"themenblockTitle\":\"Medizin\",\"tags\":[\"Gesundheit\",\"Finanzpolitik\",\"Partizipation\",\"Transparenz\"],\"links\":[\"thema_hochschulbildung\",\"thema_aerztliche-versorgung\",\"thema_finanzen\",\"thema_arbeit-industrie-gerecht\"],\"paragraph\":\"Das Universitätsklinikum Gießen und Marburg (UKGM) ist das einzige privatisierte Uniklinikum Deutschlands. Es gibt regelmäßig Berichte über Probleme in der stationären Versorgung, Personalmangel und Beschwerden über Arbeitsbedingungen.\",\"massnahmen\":[\"Das Land Hessen dazu auffordern, das UKGM wieder in öffentliches Eigentum zu überführen, um eine hochwertige und verlässliche medizinische Versorgung sowie Forschung und Lehre langfristig zu sichern.\"],\"path\":\"C:/Users/Slava/.gemini/antigravity/scratch/volt-giessen-website/assets/Whalprogramme/wahlprogramm/cluster2_bildung-gesundheit/themenblock2_medizin/thema_ukgm-rekommunalisierung.md\"},{\"slug\":\"thema_arbeit-industrie-gerecht\",\"title\":\"Arbeit und Industrie gerecht gestalten\",\"cluster\":\"cluster3_innovation-wirtschaft\",\"clusterTitle\":\"Innovation Wirtschaft\",\"themenblock\":\"themenblock1_finanzen-wirtschaft\",\"themenblockTitle\":\"Finanzen Wirtschaft\",\"tags\":[\"Wirtschaftsförderung\",\"Soziale-Gerechtigkeit\",\"Gesundheit\"],\"links\":[\"thema_wirtschaftsfoerderung\",\"thema_gewerbeflaechen\",\"thema_klimafreundliche-produktion\"],\"paragraph\":\"Die Umstellung auf digitale und klimafreundliche Produktionsweisen verändert viele Arbeitsplätze in Gießen und im Landkreis. Betriebe benötigen mehr Fachkräfte mit digitalen und technischen Kompetenzen, während Beschäftigte oft nur begrenzt Zugang zu Weiterbildungsangeboten haben. Ohne Unterstützung drohen Qualifikationslücken und ungleiche Chancen in der Transformation.\",\"massnahmen\":[\"Transformationsstellen in den Wirtschaftsförderungen von Stadt und Landkreis einrichten, die Betriebe und Beschäftigte zu Qualifizierung, Fördermitteln und Veränderungsprozessen beraten.\",\"Bildungsverbünde mit IHK, HWK, THM, JLU und Unternehmen stärken, damit flexible Weiterbildungen wie Mikro-Zertifikate oder berufsbegleitende Module leicht zugänglich sind.\",\"Soziale Kriterien bei Vergaben und Gewerbeansiedlungen verankern, damit Tariftreue, Ausbildung und faire Arbeitsbedingungen gestärkt werden.\",\"Gute Rahmenbedingungen schaffen, etwa durch bessere Mobilitätsangebote und Kinderbetreuung in der Nähe größerer Gewerbegebiete.\"],\"path\":\"C:/Users/Slava/.gemini/antigravity/scratch/volt-giessen-website/assets/Whalprogramme/wahlprogramm/cluster3_innovation-wirtschaft/themenblock1_finanzen-wirtschaft/thema_arbeit-industrie-gerecht.md\"},{\"slug\":\"thema_brandplatz-wirtschaft\",\"title\":\"Ein Brandplatz, der Menschen anzieht\",\"cluster\":\"cluster3_innovation-wirtschaft\",\"clusterTitle\":\"Innovation Wirtschaft\",\"themenblock\":\"themenblock1_finanzen-wirtschaft\",\"themenblockTitle\":\"Finanzen Wirtschaft\",\"tags\":[\"Wirtschaftsförderung\",\"Wohnen-und-Stadtentwicklung\",\"Kultur-und-Kreativität\"],\"links\":[\"thema_brandplatz\",\"thema_wirtschaftsfoerderung\",\"thema_lebendige-innenstadt\"],\"paragraph\":\"Die geplante Umgestaltung des Brandplatzes bietet große Chancen, wird bislang jedoch kontrovers diskutiert. Mangelnde Transparenz sowie die Sorge vor dem Verlust von Parkplätzen und die Unsicherheit über die Zukunft des Wochenmarktes haben in Teilen der Bürgerschaft zu Vertrauensverlust geführt. Gleichzeitig ist der heutige Brandplatz weder ein attraktiver Aufenthaltsort noch ein starker Impulsgeber für Handel, Gastronomie und Innenstadtentwicklung. Für Menschen mit Mobilitätseinschränkungen oder für kurzfristige Arztbesuche fehlen geeignete Stellplätze in unmittelbarer Nähe.\",\"massnahmen\":[\"Die Planung des Brandplatzes transparent gestalten und die Bürgerschaft frühzeitig beteiligen, damit Entscheidungen nachvollziehbar und gut legitimiert sind.\",\"Gastronomieflächen integrieren, die Aufenthaltsqualität erhöhen und dem Platz ein klares Profil geben.\",\"Geeignete Stellplätze für Arztbesuche und Menschen mit Mobilitätseinschränkungen in unmittelbarer Nähe bereitstellen, um Barrierefreiheit und Erreichbarkeit sicherzustellen.\",\"Kooperationen mit nahegelegenen Parkhäusern prüfen, um Wegfall von Stellplätzen auszugleichen und Betriebe nicht zusätzlich zu belasten.\",\"Den Wochenmarkt dauerhaft sichern und im neuen Platzkonzept so verankern, dass er weiterhin als zentraler Anziehungspunkt dient.\",\"Begrünung und Verschattung einplanen, um Hitze entgegenzuwirken und den Platz für Menschen jeden Alters nutzbar zu machen.\"],\"path\":\"C:/Users/Slava/.gemini/antigravity/scratch/volt-giessen-website/assets/Whalprogramme/wahlprogramm/cluster3_innovation-wirtschaft/themenblock1_finanzen-wirtschaft/thema_brandplatz-wirtschaft.md\"},{\"slug\":\"thema_digitale-wirtschaft\",\"title\":\"Digitale Wirtschaft und Daten als Infrastruktur\",\"cluster\":\"cluster3_innovation-wirtschaft\",\"clusterTitle\":\"Innovation Wirtschaft\",\"themenblock\":\"themenblock1_finanzen-wirtschaft\",\"themenblockTitle\":\"Finanzen Wirtschaft\",\"tags\":[\"Wirtschaftsförderung\",\"Digitalisierung\",\"Innovation\"],\"links\":[\"thema_klimaresilienz\",\"thema_waerme-kaelte\",\"thema_energieverbrauch\",\"thema_katzenschutz\",\"thema_gruendungsfoerderung\",\"thema_wirtschaftsfoerderung\",\"thema_digitale-infrastruktur\",\"thema_offene-daten\",\"thema_nachhaltige-digitalisierung\"],\"paragraph\":\"Gießen hinkt bei der digitalen Infrastruktur im Vergleich zu anderen Hochschul- und Mittelzentren noch spürbar hinterher. Unvollständige Glasfaserabdeckung, schwankende Mobilfunknetze und wenig genutzte Datenangebote erschweren digitalen Unternehmen, Start-ups und Forschungseinrichtungen die Arbeit. Gleichzeitig wachsen datengetriebene Geschäftsmodelle, die stabile Netze, leistungsfähige Serverkapazitäten und offene Datenschnittstellen benötigen. Das betrifft auch den Landkreis, der in vielen Bereichen auf die digitale Leistungsfähigkeit der Stadt angewiesen ist.\",\"massnahmen\":[\"Das Rechenzentrum am Katzenfeld nur unter klaren ökologischen Standards unterstützen, einschließlich Abwärmenutzung für lokale Wärmeprojekte, hoher Energieeffizienz und einer Stromversorgung aus erneuerbaren Quellen.\",\"Gießen zur Smart-City-Modellregion weiterentwickeln, indem Daten zur Verkehrssteuerung, Energieeffizienz, Mobilität und Planung genutzt und digitale Bürgerdienste ausgebaut werden.\",\"Digitale Zwillinge für städtische Planungen einsetzen, um Bauvorhaben, Verkehrsflüsse, Versorgungsnetze und Klimaanpassungsmaßnahmen transparenter und nachhaltiger zu gestalten.\"],\"path\":\"C:/Users/Slava/.gemini/antigravity/scratch/volt-giessen-website/assets/Whalprogramme/wahlprogramm/cluster3_innovation-wirtschaft/themenblock1_finanzen-wirtschaft/thema_digitale-wirtschaft.md\"},{\"slug\":\"thema_finanzen\",\"title\":\"Finanzen\",\"cluster\":\"cluster3_innovation-wirtschaft\",\"clusterTitle\":\"Innovation Wirtschaft\",\"themenblock\":\"themenblock1_finanzen-wirtschaft\",\"themenblockTitle\":\"Finanzen Wirtschaft\",\"tags\":[\"Finanzpolitik\",\"Transparenz\",\"Partizipation\"],\"links\":[\"thema_oepnv\",\"thema_klimaneutral-2035\",\"thema_wirtschaftsfoerderung\"],\"paragraph\":\"Kommunen sichern zentrale öffentliche Leistungen wie Kinderbetreuung, Nahverkehr, Wirtschaftsförderung, Kultur und Klimaschutz. Dafür benötigen sie stabile, verlässliche und vorausschauend geplante Finanzen. Die Haushaltslage der Stadt Gießen bleibt angespannt. Für 2025 plant die Stadt Gießen ein Defizit von 12,3 Millionen Euro im Ergebnishaushalt und einen Zahlungsmittelbedarf von 13,9 Millionen Euro. Für 2026 rechnet die Stadt mit einer weiteren deutlichen Verschärfung. Dadurch ist Gießen dazu gezwungen, zentrale Investitionen in Bildung, Mobilität, Energie und Verwaltungsmodernisierung unter schwierigen Bedingungen zu sichern.\",\"massnahmen\":[\"Einführung von Zero-Based-Budgeting (ZBB), um öffentliche Mittel konsequent auf wirksame und notwendige Ausgaben zu konzentrieren. Statt Haushaltsansätze automatisch aus den Vorjahren zu übernehmen, wird regelmäßig überprüft, welche Maßnahmen tatsächlich einen Mehrwert für die Allgemeinheit schaffen. So wird verhindert, dass überholte oder ineffiziente Ausgaben fortgeschrieben werden, und finanzielle Spielräume können gezielt dort eingesetzt werden, wo sie den größten Nutzen entfalten. Studien zeigen, dass Zero-Based-Budgeting zu einer effizienteren Mittelverwendung führt und unnötige Ausgaben deutlich reduziert.\",\"Förderung von Bürgerhaushalten und Open Budget-Plattformen Volt möchte die Transparenz und Bürgerbeteiligung in der Haushaltsplanung stärken. Dazu will Volt Bürgerhaushalte einführen und digitale Plattformen bereitstellen, auf denen die Bürgerschaft Haushaltsvorschläge einreichen und über Ausgabenprioritäten abstimmen kann. Erfahrungen aus anderen Städten zeigen, dass Bürgerhaushalte Transparenz schaffen und Entscheidungen nachvollziehbarer machen. So entsteht eine nachvollziehbare Priorisierung öffentlicher Ausgaben.\",\"Digitalisierung der Verwaltung Volt setzt sich dafür ein, die Verwaltungen Gießens zu digitalisieren. Dafür modernisiert Volt IT-Strukturen, automatisiert Standardprozesse und setzt verstärkt auf Open-Source-Lösungen. Eine digitalisierte Verwaltung erhöht die Effizienz, reduziert Fehlerquellen und ermöglicht eine bessere Datenanalyse für fundierte Entscheidungen. Der Schutz persönlicher Daten hat dabei oberste Priorität.\",\"Integration von Klimaschutz in die Finanzplanung Volt will Klimaschutz zu einem verbindlichen Bestandteil jeder Haushaltsentscheidung machen, denn jede Investition hat eine konkrete Klimawirkung. CO₂-Budgets sollen sichtbar machen, welche Maßnahmen Emissionen senken und welche sie erhöhen. So werden Investitionen priorisiert, die Gießen nachweislich klimaneutraler machen.\",\"Effiziente Nutzung von Fördermitteln Volt setzt sich dafür ein, die Kapazitäten Gießens zur Beantragung und Verwaltung von Fördermitteln aus EU-, Bundes- und Landesprogrammen zu stärken. Volt will eine zentrale Fördermittelstelle aufbauen und Mitarbeitende gezielt qualifizieren. Die geplante Stelle in der Gießener Verwaltung wird im kommenden Jahr nicht wieder besetzt. Volt hält diesen Aufgabenbereich jedoch für zentral und möchte ihn dauerhaft stärken.\",\"Förderung sozialer Gerechtigkeit durch Finanzpolitik Volt möchte durch eine gezielte Finanzpolitik soziale Ungleichheiten abbauen. Dies umfasst Investitionen in benachteiligte Stadtteile, sowie die Förderung von Projekten, die soziale Teilhabe und Chancengleichheit stärken. So fließen Investitionen gezielt in Stadtteile, die heute zu wenig profitieren.\"],\"path\":\"C:/Users/Slava/.gemini/antigravity/scratch/volt-giessen-website/assets/Whalprogramme/wahlprogramm/cluster3_innovation-wirtschaft/themenblock1_finanzen-wirtschaft/thema_finanzen.md\"},{\"slug\":\"thema_gewerbeflaechen\",\"title\":\"Nachhaltige und wirtschaftlich kluge Gewerbeflächenstrategie\",\"cluster\":\"cluster3_innovation-wirtschaft\",\"clusterTitle\":\"Innovation Wirtschaft\",\"themenblock\":\"themenblock1_finanzen-wirtschaft\",\"themenblockTitle\":\"Finanzen Wirtschaft\",\"tags\":[\"Wirtschaftsförderung\",\"Klimaschutz\",\"Klimaresilienz\",\"Biodiversität\"],\"links\":[\"thema_klimaresilienz\",\"thema_biodiversitaet\",\"thema_finanzen\",\"thema_wirtschaftsfoerderung\"],\"paragraph\":\"Der Bedarf an Gewerbeflächen wächst, doch Erweiterungen auf Kosten von Wald- und Naturflächen sind wirtschaftlich und ökologisch kurzsichtig. Die Erschließung neuer Waldflächen verursacht hohe Investitions- und Folgekosten, während gleichzeitig zentrale Flächen in Gießen brachliegen und ungenutzte Potenziale bieten. Das ehemalige Gail-Areal zeigt, dass wertvolle Gewerbeflächen im Stadtgebiet verfügbar sind, jedoch bisher nicht konsequent für wirtschaftliche Entwicklung aktiviert wurden. Eine moderne Gewerbeflächenpolitik muss deshalb effizient mit bestehenden Ressourcen umgehen, statt neue Flächen aufwendig und teuer zu erschließen.\",\"massnahmen\":[\"Brachflächen wie das ehemalige Gail-Gelände priorisiert entwickeln, da sie bestehende Infrastruktur nutzen und deutlich geringere Kosten verursachen als neue Gewerbeerschließungen auf Waldflächen.\",\"Unternehmen bei Erweiterungswünschen aktiv beraten, um Ausbaupotenziale auf eigenen Grundstücken oder auf verfügbaren Bestandsflächen zu identifizieren und effizient zu nutzen.\",\"Eine wirtschaftlich ausgerichtete Standortanalyse einführen, die verfügbare Gewerbeflächen systematisch erfasst, Entwicklungskosten vergleicht und Investitionen auf die wirtschaftlich sinnvollsten Standorte lenkt.\",\"Kooperationen zwischen Stadt, Landkreis und Eigentümerschaft stärken, um ungenutzte Flächen schneller marktfähig zu machen und Entwicklungshindernisse zu beseitigen.\",\"Wald- und Naturflächen schützen, da Rodungen hohe Folgekosten verursachen, die Standortattraktivität mindern und langfristig wirtschaftlichen Schaden für Tourismus, Lebensqualität und regionale Arbeitgeber bedeuten. Unser Ziel ist ein Wirtschaftsstandort, der sich mutig weiterentwickelt, Wachstum nachhaltig gestaltet und Chancen fair verteilt. Gießen soll ein Ort sein, an dem neue Ideen entstehen, Unternehmen gerne investieren und Menschen gerne leben. Gemeinsam mit der Bevölkerung will Volt diesen Weg gehen und Gießen langfristig wettbewerbsfähig, resilient und zukunftsfähig machen.\"],\"path\":\"C:/Users/Slava/.gemini/antigravity/scratch/volt-giessen-website/assets/Whalprogramme/wahlprogramm/cluster3_innovation-wirtschaft/themenblock1_finanzen-wirtschaft/thema_gewerbeflaechen.md\"},{\"slug\":\"thema_gruendungsfoerderung\",\"title\":\"Gründungsförderung und Innovation\",\"cluster\":\"cluster3_innovation-wirtschaft\",\"clusterTitle\":\"Innovation Wirtschaft\",\"themenblock\":\"themenblock1_finanzen-wirtschaft\",\"themenblockTitle\":\"Finanzen Wirtschaft\",\"tags\":[\"Wirtschaftsförderung\",\"Innovation\",\"Bildung\"],\"links\":[\"thema_schulbildung\",\"thema_hochschulbildung\",\"thema_wirtschaftsfoerderung\",\"thema_lebendige-innenstadt\"],\"paragraph\":\"Gießen verfügt mit JLU und THM über eine starke Hochschul- und Forschungslandschaft, doch innovative Ausgründungen entstehen noch selten. Gute Ideen bleiben häufig in Laboren und Projekten stecken, weil Bürokratie, fehlende Vernetzung und mangelnde Frühfinanzierung Gründende ausbremsen. So nutzt Gießen sein Potenzial als Universitäts- und Technologiestandort nicht vollständig und verliert Talente an andere Städte.\",\"massnahmen\":[\"Einen kommunalen One-Stop-Shop für Gründende aufbauen, der Beratung, Genehmigungen und Förderanträge bündelt und eng mit dem Technologie- und Innovationszentrum zusammenarbeitet.\",\"Städtische Räume für Start-ups bereitstellen, etwa im Leihgesterner Weg, im Umfeld des Bahnhofs oder in derzeit leerstehenden Erdgeschossen der Innenstadt, nutzbar als Co-Working-Spaces, Maker-Spaces oder Testflächen.\",\"Die Zusammenarbeit mit JLU und THM vertiefen, durch gemeinsame Transferangebote, Gründungslabore und Programme für Ausgründungen aus Forschung und Lehre.\",\"Kommunale Mikrokreditfonds einrichten, in Kooperation mit der EU, lokalen Banken und der Wirtschaftsförderung, um Start-ups in der Frühphase finanziell zu unterstützen.\",\"Die lokale Gründungsszene sichtbarer machen, unter anderem durch eine jährliche Startup-Week, Pitch-Events und offene Innovationsformate, die Wissenschaft, Unternehmen und Zivilgesellschaft verbinden.\"],\"path\":\"C:/Users/Slava/.gemini/antigravity/scratch/volt-giessen-website/assets/Whalprogramme/wahlprogramm/cluster3_innovation-wirtschaft/themenblock1_finanzen-wirtschaft/thema_gruendungsfoerderung.md\"},{\"slug\":\"thema_industrie-40\",\"title\":\"Industrie 4.0 und digitale Transformation\",\"cluster\":\"cluster3_innovation-wirtschaft\",\"clusterTitle\":\"Innovation Wirtschaft\",\"themenblock\":\"themenblock1_finanzen-wirtschaft\",\"themenblockTitle\":\"Finanzen Wirtschaft\",\"tags\":[\"Wirtschaftsförderung\",\"Digitalisierung\",\"Innovation\",\"Bildung\"],\"links\":[\"thema_schulbildung\",\"thema_hochschulbildung\",\"thema_wirtschaftsfoerderung\",\"thema_gewerbeflaechen\",\"thema_digitale-infrastruktur\",\"thema_europaeische-identitaet\"],\"paragraph\":\"Viele Industrie- und Handwerksbetriebe in Gießen, Lollar, Staufenberg, Heuchelheim, Pohlheim und weiteren Gemeinden des Landkreises stehen vor der Aufgabe, ihre Produktion zu digitalisieren. Häufig fehlen jedoch flächendeckende Glasfaseranschlüsse, leistungsfähiges 5G oder Orte, an denen neue Technologien gemeinsam getestet und weiterentwickelt werden können. Gleichzeitig verfügen THM und JLU über großes Potenzial, um Betriebe in dieser Transformation zu unterstützen. Dieses Potenzial wird jedoch noch nicht ausreichend genutzt, weil Vernetzung und gemeinsame Strukturen fehlen.\",\"massnahmen\":[\"Gemeinsame Testfelder und Industrial Data Spaces für Produktionstechnologien in Kooperation mit THM, JLU und regionalen Clustern einrichten, damit Betriebe neue Anwendungen praxisnah erproben können und diese mit europäischen Initiativen wie Manufacturing-X kompatibel bleiben.\",\"Beratungsangebote und Digitalisierungsprogramme für kleine und mittlere Unternehmen ausbauen, damit Prozessoptimierung, Datensicherheit und Automatisierung niedrigschwellig möglich sind.\",\"Offene digitale Standards fördern, damit Maschinen, Software und Sensorsysteme in Gewerbegebieten langfristig miteinander kompatibel bleiben und Betriebe ohne Hürden an städtische und regionale Plattformen angebunden werden können.\",\"Qualifizierungsangebote gemeinsam mit IHK, HWK, THM und JLU stärken, damit Beschäftigte und Fachkräfte gezielt auf digitale Arbeitswelten vorbereitet werden.\"],\"path\":\"C:/Users/Slava/.gemini/antigravity/scratch/volt-giessen-website/assets/Whalprogramme/wahlprogramm/cluster3_innovation-wirtschaft/themenblock1_finanzen-wirtschaft/thema_industrie-40.md\"},{\"slug\":\"thema_industrie-flaechenpolitik\",\"title\":\"Flächenpolitik und smarte Industriegebiete\",\"cluster\":\"cluster3_innovation-wirtschaft\",\"clusterTitle\":\"Innovation Wirtschaft\",\"themenblock\":\"themenblock1_finanzen-wirtschaft\",\"themenblockTitle\":\"Finanzen Wirtschaft\",\"tags\":[\"Wirtschaftsförderung\",\"Innovation\",\"Digitalisierung\",\"Klimaschutz\"],\"links\":[\"thema_stromerzeugung\",\"thema_wirtschaftsfoerderung\",\"thema_regionale-wertschoepfung\",\"thema_gewerbeflaechen\",\"thema_digitale-infrastruktur\"],\"paragraph\":\"Viele Gewerbe- und Industriebereiche in Gießen und den Gemeinden des Landkreises sind historisch gewachsen und nutzen ihr Potenzial noch nicht vollständig. In Gebieten wie Wieseck, dem Europaviertel oder den Flächen in Lollar und Heuchelheim fehlen oft moderne Energie- und Wärmekonzepte, digitale Vernetzung oder Lösungen für Kreislaufwirtschaft. Gleichzeitig liegen innerstädtische Flächen wie das ehemalige Gail-Gelände brach, während Betriebe Erweiterungsbedarf haben und Naturflächen unter Druck geraten. Eine Flächenpolitik, die zuerst bestehende Areale stärkt, ist daher sowohl wirtschaftlich als auch ökologisch sinnvoll.\",\"massnahmen\":[\"Bestehende Gewerbeareale stärken und Brachflächen wie das Gail-Gelände priorisiert entwickeln, bevor neue Standorte ausgewiesen werden.\",\"Ein digitales Flächenkataster aufbauen, das freie und umnutzbare Gewerbeflächen in Stadt und Landkreis sichtbar macht.\",\"Nachhaltige Standards festschreiben, darunter Photovoltaik, Regenwassermanagement, Begrünung, Entsiegelungspotenziale und die Nutzung industrieller Abwärme.\",\"Gebietsverantwortliche einsetzen, die Unternehmen vernetzen und gemeinsame Energie- oder Logistikkonzepte koordinieren.\",\"Interkommunale Gewerbegebiete fördern, damit Flächen effizient genutzt werden, Gemeinden Kosten teilen und regionale Wertschöpfung gestärkt wird.\"],\"path\":\"C:/Users/Slava/.gemini/antigravity/scratch/volt-giessen-website/assets/Whalprogramme/wahlprogramm/cluster3_innovation-wirtschaft/themenblock1_finanzen-wirtschaft/thema_industrie-flaechenpolitik.md\"},{\"slug\":\"thema_klimafreundliche-produktion\",\"title\":\"Klimafreundliche Produktion\",\"cluster\":\"cluster3_innovation-wirtschaft\",\"clusterTitle\":\"Innovation Wirtschaft\",\"themenblock\":\"themenblock1_finanzen-wirtschaft\",\"themenblockTitle\":\"Finanzen Wirtschaft\",\"tags\":[\"Wirtschaftsförderung\",\"Klimaschutz\",\"Innovation\"],\"links\":[\"thema_waerme-kaelte\",\"thema_stromerzeugung\",\"thema_energieverbrauch\",\"thema_wirtschaftsfoerderung\",\"thema_gewerbeflaechen\",\"thema_industrie-flaechenpolitik\"],\"paragraph\":\"Viele Betriebe in den Gewerbegebieten rund um Gießen, von stadtnahen Arealen wie Wieseck und dem Europaviertel bis hin zu Industrieflächen in den Gemeinden des Landkreises, stehen vor der Aufgabe, ihre Produktion energieeffizienter, kostensicherer und klimaverträglicher auszurichten. In vielen dieser Gebiete bleiben Potenziale für Photovoltaik, Abwärmenutzung, gemeinsame Energiesysteme oder Materialkreisläufe bisher ungenutzt. Gleichzeitig eröffnet die kommunale Wärmeplanung neue Chancen, industrielle Abwärme vor Ort einzubinden und Betriebe unabhängiger von fossilen Energien zu machen.\",\"massnahmen\":[\"Photovoltaik auf Dächern und Fassaden, Gründächer und Regenwassermanagement als verbindliche Standards in Gewerbegebieten festschreiben.\",\"Energie- und Abwärmeverbünde in bestehenden Industriegebieten aufbauen und mit der kommunalen Wärmeplanung von Stadt und Landkreis verzahnen, damit Abwärme aus Betrieben lokal genutzt wird.\",\"Förderprogramme von EU und Bund nutzen, um Investitionen in Energieeffizienz, Speichertechnologie und Prozesswärme wirtschaftlich attraktiv zu machen.\",\"Saubere Logistik unterstützen, unter anderem mit Lade- und Tankinfrastruktur für emissionsarme Nutzfahrzeuge und mit gemeinsam nutzbaren Logistikflächen in Gewerbegebieten.\"],\"path\":\"C:/Users/Slava/.gemini/antigravity/scratch/volt-giessen-website/assets/Whalprogramme/wahlprogramm/cluster3_innovation-wirtschaft/themenblock1_finanzen-wirtschaft/thema_klimafreundliche-produktion.md\"},{\"slug\":\"thema_lebendige-innenstadt\",\"title\":\"Lebendige Innenstadt und starker Seltersweg\",\"cluster\":\"cluster3_innovation-wirtschaft\",\"clusterTitle\":\"Innovation Wirtschaft\",\"themenblock\":\"themenblock1_finanzen-wirtschaft\",\"themenblockTitle\":\"Finanzen Wirtschaft\",\"tags\":[\"Wirtschaftsförderung\",\"Wohnen-und-Stadtentwicklung\",\"Kultur-und-Kreativität\"],\"links\":[\"thema_seltersweg\",\"thema_fruehkindliche-bildung\",\"thema_aerztliche-versorgung\",\"thema_wirtschaftsfoerderung\",\"thema_kita-familienzentren\"],\"paragraph\":\"Die Gießener Innenstadt verliert zunehmend an Attraktivität. Gerade im Seltersweg führen Leerstände, ein fehlendes eigenständiges Profil und wechselnde Anbieter dazu, dass Aufenthaltsqualität und Kaufkraft sinken. Gleichzeitig wandern Arztpraxen, Dienstleistungen und soziale Angebote an den Stadtrand, wodurch wichtige Frequenzbringer fehlen. Viele Betriebe kämpfen mit hohen Mieten, auslaufenden Geschäftsmodellen und geringer Sichtbarkeit. Auch im Landkreis zeigt sich, dass ein starkes Zentrum wirtschaftliche Stabilität für die gesamte Region schafft.\",\"massnahmen\":[\"Medizinische Versorgungseinrichtungen, soziale Einrichtungen, Kitas oder betreutes Wohnen gezielt im Innenstadtbereich ansiedeln, damit wichtige Alltagswege wieder in die Stadt führen und die Frequenz steigt.\",\"Die Aufenthaltsqualität auf dem Seltersweg verbessern, durch ansprechende Möblierung, Begrünung, schattenspendende Elemente, klare Wegeführungen und sichere Querungen.\",\"Gastronomieflächen ausbauen und draußen nutzbar machen, damit der öffentliche Raum zu einem Ort des Verweilens wird.\",\"Ein aktives Leerstandsmanagement einführen, das die Eigentümerschaft einbindet, Mietentwicklungen beobachtet und Nutzungswechsel beschleunigt.\",\"Kooperationen zwischen Stadt und örtlichen Betrieben sowie dem Landkreis stärken, um gemeinsame Veranstaltungsreihen, Märkte oder Wochenangebote zu koordinieren, die die Innenstadt beleben.\"],\"path\":\"C:/Users/Slava/.gemini/antigravity/scratch/volt-giessen-website/assets/Whalprogramme/wahlprogramm/cluster3_innovation-wirtschaft/themenblock1_finanzen-wirtschaft/thema_lebendige-innenstadt.md\"},{\"slug\":\"thema_regionale-landwirtschaft\",\"title\":\"Regionale Landwirtschaft stärken\",\"cluster\":\"cluster3_innovation-wirtschaft\",\"clusterTitle\":\"Innovation Wirtschaft\",\"themenblock\":\"themenblock1_finanzen-wirtschaft\",\"themenblockTitle\":\"Finanzen Wirtschaft\",\"tags\":[\"Wirtschaftsförderung\",\"Biodiversität\",\"Klimaschutz\",\"Gesundheit\",\"Soziale-Gerechtigkeit\"],\"links\":[\"thema_biodiversitaet\",\"thema_fruehkindliche-bildung\",\"thema_schulbildung\",\"thema_pflege-alter\",\"thema_wirtschaftsfoerderung\",\"thema_regionale-wertschoepfung\",\"thema_kita-familienzentren\"],\"paragraph\":\"Regionale Landwirtschaft, handwerkliche Betriebe und lokale Lebensmittelproduzenten tragen wesentlich zur Wertschöpfung, Versorgungssicherheit und Lebensqualität in Gießen und dem Landkreis bei. Dennoch stehen viele Höfe und handwerkliche Lebensmittelbetriebe unter wirtschaftlichem Druck, während Großanbieter den Markt dominieren. Gleichzeitig wünschen sich immer mehr Menschen gesunde, regional erzeugte Lebensmittel und transparente Lieferketten. Auch Kitas, Schulen, Krankenhäuser und Pflegeeinrichtungen benötigen verlässliche Strukturen für eine gesundheitsförderliche Versorgung.\",\"massnahmen\":[\"Regionale Erzeuger mit Gastronomie, Gemeinschaftsverpflegung und öffentlichen Einrichtungen vernetzen, damit lokale Produkte verlässlicher Absatz finden.\",\"Beschaffungsrichtlinien für Kitas, Schulen, Kliniken und Pflegeeinrichtungen anpassen, damit regionale und gesundheitsförderliche Lebensmittel bevorzugt werden.\",\"Wochenmärkte und Hofläden als zentrale Orte für regionale Versorgung stärken, etwa durch niedrigere Hürden für Standplätze oder bessere Sichtbarkeit.\",\"Regionale Wertschöpfungsketten ausbauen, indem Landwirtschaft, Lebensmittelhandwerk, lokale Verarbeiter und Gastronomie enger zusammenarbeiten.\",\"Programme zur Ernährungsbildung unterstützen, damit nachhaltige und regionale Ernährung sichtbarer wird und Betriebe langfristige Planungssicherheit erhalten.\"],\"path\":\"C:/Users/Slava/.gemini/antigravity/scratch/volt-giessen-website/assets/Whalprogramme/wahlprogramm/cluster3_innovation-wirtschaft/themenblock1_finanzen-wirtschaft/thema_regionale-landwirtschaft.md\"},{\"slug\":\"thema_regionale-wertschoepfung\",\"title\":\"Regionale Wertschöpfung und nachhaltige Energie\",\"cluster\":\"cluster3_innovation-wirtschaft\",\"clusterTitle\":\"Innovation Wirtschaft\",\"themenblock\":\"themenblock1_finanzen-wirtschaft\",\"themenblockTitle\":\"Finanzen Wirtschaft\",\"tags\":[\"Wirtschaftsförderung\",\"Klimaschutz\",\"Innovation\"],\"links\":[\"thema_waerme-kaelte\",\"thema_wirtschaftsfoerderung\",\"thema_regionale-landwirtschaft\",\"thema_gewerbeflaechen\"],\"paragraph\":\"Gießen verfügt über erhebliche Möglichkeiten, regionale Energie aus eigenen Ressourcen zu gewinnen. Landwirtschaftliche Reststoffe, kommunale Bioabfälle oder Grünschnitt werden teilweise teuer entsorgt, obwohl sie lokal genutzt werden könnten. Gleichzeitig steigen Energiepreise für Betriebe und öffentliche Einrichtungen, während die regionale Wertschöpfung ungenutzt bleibt. Beispiele aus Mittelhessen, etwa Biogasanlagen, die bereits erfolgreich Abwärme in Nahwärmenetze einspeisen und umliegende Dörfer versorgen, zeigen, welches Potenzial in regionalen Energiekreisläufen steckt.\",\"massnahmen\":[\"Nachhaltige Biogasanlagen unterstützen, die auf regionale Reststoffe setzen und ohne energetischen Maisanbau auskommen.\",\"Abwärme aus bestehenden und neuen Anlagen in lokale Wärmenetze integrieren, etwa zur Versorgung öffentlicher Gebäude, Gewerbegebiete oder sozialer Einrichtungen.\",\"Stadt und Landkreis bei der regionalen Bioabfall- und Grünschnittverwertung bündeln, um regionale Anlagen effizient zu versorgen.\",\"Landwirtschaftliche Betriebe aktiv beteiligen, damit sie von Einspeisung, Wärmelieferung und Kooperationen profitieren und zusätzliche Einnahmequellen erhalten.\",\"Regionale Energiepartnerschaften ausbauen, um Hochschulgebäude, Betriebe und kommunale Einrichtungen verlässlich mit lokal erzeugter Energie zu versorgen.\"],\"path\":\"C:/Users/Slava/.gemini/antigravity/scratch/volt-giessen-website/assets/Whalprogramme/wahlprogramm/cluster3_innovation-wirtschaft/themenblock1_finanzen-wirtschaft/thema_regionale-wertschoepfung.md\"},{\"slug\":\"thema_sozial-gerechte-wirtschaftspolitik\",\"title\":\"Sozial gerechte Wirtschaftspolitik\",\"cluster\":\"cluster3_innovation-wirtschaft\",\"clusterTitle\":\"Innovation Wirtschaft\",\"themenblock\":\"themenblock1_finanzen-wirtschaft\",\"themenblockTitle\":\"Finanzen Wirtschaft\",\"tags\":[\"Wirtschaftsförderung\",\"Soziale-Gerechtigkeit\",\"Innovation\"],\"links\":[\"thema_schulbildung\",\"thema_hochschulbildung\",\"thema_wirtschaftsfoerderung\",\"thema_arbeit-industrie-gerecht\"],\"paragraph\":\"Viele Beschäftigte in der Region arbeiten in geringfügigen Jobs, obwohl sie sich oft größere Umfänge und bessere Absicherung wünschen. Diese Struktur führt zu niedrigen Einkommen, geringerer sozialer Sicherheit und einer schwächeren Kaufkraft. Auch Betriebe in Gießen und im Landkreis haben Schwierigkeiten, Fachkräfte zu halten oder neue Mitarbeitende zu gewinnen. Ein Grund dafür ist, dass die Vorteile der Midijob-Zone trotz ihres großen Potenzials kaum bekannt sind.\",\"massnahmen\":[\"Midijobs aktiver kommunizieren, damit Unternehmen ihre finanziellen und sozialen Vorteile gegenüber Minijobs erkennen und nutzen können.\",\"Einen digitalen Midijob-Rechner auf den Seiten der kommunalen Verwaltung einführen, der Beschäftigten und Betrieben Nettoeffekte und Arbeitgeberkosten transparent darstellt.\",\"Informationsangebote und Veranstaltungen für Unternehmen bereitstellen, um den Übergang vom Minijob zum sozialversicherten Beschäftigungsverhältnis zu erleichtern.\",\"Gemeinsame Qualifizierungs- und Weiterbildungsprogramme mit Betrieben, Kammern, Jobcenter und Hochschulen ausbauen, damit Geringqualifizierte, Berufsrückkehrende oder Zugewanderte neue Perspektiven erhalten.\",\"Vergabeverfahren sozial fair gestalten und kleinere, regionale Betriebe gezielt berücksichtigen, wenn sie gute Arbeitsbedingungen bieten.\"],\"path\":\"C:/Users/Slava/.gemini/antigravity/scratch/volt-giessen-website/assets/Whalprogramme/wahlprogramm/cluster3_innovation-wirtschaft/themenblock1_finanzen-wirtschaft/thema_sozial-gerechte-wirtschaftspolitik.md\"},{\"slug\":\"thema_wirtschaftsfoerderung\",\"title\":\"Moderne kommunale Wirtschaftsförderung\",\"cluster\":\"cluster3_innovation-wirtschaft\",\"clusterTitle\":\"Innovation Wirtschaft\",\"themenblock\":\"themenblock1_finanzen-wirtschaft\",\"themenblockTitle\":\"Finanzen Wirtschaft\",\"tags\":[\"Wirtschaftsförderung\",\"Innovation\",\"Digitalisierung\"],\"links\":[\"thema_schulbildung\",\"thema_hochschulbildung\"],\"paragraph\":\"Viele kommunale Wirtschaftsförderungen konzentrieren sich noch immer auf klassische Gewerbeansiedlungen und veraltete Strukturen. In Gießen zeigt sich dies daran, dass Nachhaltigkeit, Digitalisierung und soziale Aspekte bisher zu wenig berücksichtigt werden und Unternehmen in ihrer Transformation nur begrenzt Unterstützung erhalten. Gleichzeitig fehlt eine abgestimmte wirtschaftliche Strategie zwischen Stadt und Landkreis, obwohl beide eng verflochtene Arbeits- und Lebensräume bilden.\",\"massnahmen\":[\"Die Wirtschaftsförderung an Nachhaltigkeits- und Innovationskriterien knüpfen, sodass Förderungen bevorzugt Unternehmen zugutekommen, die klimaverantwortlich, sozial fair und zukunftsorientiert arbeiten.\",\"Kommunale Förderstellen konsequent digitalisieren, mit transparenten Online-Portalen für Standortsuche, Fördermittelauskünfte, Antragsprozesse und regionale Netzwerkangebote.\",\"Cluster-Strategien für regionale Stärken entwickeln, etwa in IT, Gesundheitswirtschaft, Bildungstechnologien und GreenTech, eng vernetzt mit JLU, THM und Betrieben im Landkreis.\",\"EU-Fördermittel zielgerichtet einsetzen, um wirtschaftliche Strukturwandelprozesse zu unterstützen und innovative Projekte im Stadtgebiet und im Umland zu ermöglichen.\",\"Unternehmen beim Übergang in nachhaltige Geschäftsmodelle durch Beratungsangebote, Workshops und Kooperationen mit den Hochschulen und regionalen Institutionen unterstützen.\"],\"path\":\"C:/Users/Slava/.gemini/antigravity/scratch/volt-giessen-website/assets/Whalprogramme/wahlprogramm/cluster3_innovation-wirtschaft/themenblock1_finanzen-wirtschaft/thema_wirtschaftsfoerderung.md\"},{\"slug\":\"thema_barrierefreier-rechtszugang\",\"title\":\"Barrierefreier Zugang zum Recht - Justiz für alle zugänglich machen\",\"cluster\":\"cluster3_innovation-wirtschaft\",\"clusterTitle\":\"Innovation Wirtschaft\",\"themenblock\":\"themenblock2_sicherheit\",\"themenblockTitle\":\"Sicherheit\",\"tags\":[\"Barrierefreiheit\",\"Sicherheit\",\"Integration-und-Diversität\",\"Digitalisierung\",\"Soziale-Gerechtigkeit\"],\"links\":[\"thema_inklusive-sicherheit\"],\"paragraph\":\"Wer kein Deutsch spricht, wer im Rollstuhl sitzt, wer gehörlos ist - für diese Menschen ist der Zugang zur Justiz oft versperrt. Gerichtsgebäude haben Treppen, Formulare sind in komplizierter Sprache und Dolmetschende sind teuer. Das ist ein Problem: Recht muss für alle zugänglich sein, nicht nur für die, die es sich leisten können oder die keine Barrieren erleben.\",\"massnahmen\":[\"Zentrale Website mit Informationen zu: Wo finde ich welche rechtliche Hilfe? Wie funktionieren Gerichtsverfahren? Wo gibt es kostenlose Beratung?\",\"Barrierefreiheit nach WCAG 2.1 AA-Standard (Screenreader-kompatibel, Leichte Sprache, Gebärdensprach-Videos)\",\"Mehrsprachig (mindestens Deutsch, Englisch, Arabisch, Farsi, Türkisch)\",\"Aufbau eines Pools zertifizierter Dolmetschenden für häufige Sprachen\",\"Kostenübernahme für Geringverdienende auch außerhalb von Gerichtsverfahren (z.B. Rechtsberatung, Behördengänge)\",\"Regelmäßige Beratungstermine in Stadtteilen mit hohem Migrantenanteil\",\"Kooperation mit Wohlfahrtsverbänden und Migrantenselbstorganisationen\",\"Niedrigschwellig, vertraulich und mehrsprachig\",\"Kommunale Mediationsstelle für nachbarschaftliche Konflikte, Mietstreitigkeiten und familiäre Konflikte\",\"Alternative zur Gerichtsverhandlung\",\"Kostenlos bzw. stark vergünstigt\"],\"path\":\"C:/Users/Slava/.gemini/antigravity/scratch/volt-giessen-website/assets/Whalprogramme/wahlprogramm/cluster3_innovation-wirtschaft/themenblock2_sicherheit/thema_barrierefreier-rechtszugang.md\"},{\"slug\":\"thema_brandschutz\",\"title\":\"Brandschutz und Katastrophenschutz\",\"cluster\":\"cluster3_innovation-wirtschaft\",\"clusterTitle\":\"Innovation Wirtschaft\",\"themenblock\":\"themenblock2_sicherheit\",\"themenblockTitle\":\"Sicherheit\",\"tags\":[\"Sicherheit\",\"Klimaschutz\",\"Gesundheit\"],\"links\":[\"thema_ehrenamt-mobilitaet\",\"thema_inklusive-sicherheit\"],\"paragraph\":\"Die Feuerwehr lebt vom ehrenamtlichen Engagement. In Gießen gibt es 7 Stadtteilfeuerwehren, nicht alle davon sind in der Lage, nachhaltig schnell auszurücken; es gibt Engpässe beim Ehrenamt und bei der Tagesalarmbereitschaft. Gleichzeitig steigen durch Klimawandel und Extremwetter die Anforderungen an den Katastrophenschutz.\",\"massnahmen\":[\"Den Brand- und Katastrophenschutz in Gießen kontinuierlich durch moderne Technik sowie durch die gezielte Förderung des bürgerschaftlichen Engagements verbessern.\",\"Feuerwehren und andere Einsatzkräfte mit gezielten Trainings sowie geeigneter Ausrüstung für den Umgang mit Starkregenereignissen sowie Wald- und Vegetationsbränden ausstatten, damit sie sicher arbeiten und einen modernen Brandschutz gewährleisten können.\",\"Den Katastrophenschutz auch durch eine umfassende Stromausfall- und Notfallplanung, Informationskampagnen sowie Übungen mit der Bevölkerung stärken und dabei inklusive Konzepte entwickeln, die Menschen mit Behinderungen und ältere Menschen ausdrücklich berücksichtigen.\"],\"path\":\"C:/Users/Slava/.gemini/antigravity/scratch/volt-giessen-website/assets/Whalprogramme/wahlprogramm/cluster3_innovation-wirtschaft/themenblock2_sicherheit/thema_brandschutz.md\"},{\"slug\":\"thema_inklusive-sicherheit\",\"title\":\"Inklusive Sicherheit\",\"cluster\":\"cluster3_innovation-wirtschaft\",\"clusterTitle\":\"Innovation Wirtschaft\",\"themenblock\":\"themenblock2_sicherheit\",\"themenblockTitle\":\"Sicherheit\",\"tags\":[\"Sicherheit\",\"Barrierefreiheit\",\"Integration-und-Diversität\",\"Soziale-Gerechtigkeit\"],\"links\":[\"thema_seltersweg\",\"thema_hochschulbildung\",\"thema_gesundheitsfoerderung-praevention\",\"thema_lebendige-innenstadt\",\"thema_nachtleben-clubkultur\"],\"paragraph\":\"Gendersensible Beleuchtung und Heart Zones - Sicherheit für alle\",\"massnahmen\":[\"Erstellung eines umfassenden Beleuchtungsplans, der Sicherheitsbedürfnisse mit dem Schutz vor Lichtverschmutzung vereint.\",\"Installation sensorgesteuerter LED-Beleuchtung mit reduzierter Blendwirkung, insbesondere auf Wegen von/zur Universität, am Bahnhof, in der Innenstadt und in Wohngebieten.\",\"Einsatz von Bewegungssensoren in Parks zur bedarfsgerechten Ausleuchtung bei gleichzeitiger Energieeinsparung.\",\"Schaffung breiterer Gehwege mit klaren Sichtachsen zu potenziellen Notrufsäulen.\",\"Bessere Beleuchtung von Spiel-, Bolz- und Basketballplätzen, um deren Nutzung auch in den Wintermonaten sicherzustellen.\",\"Partizipation: Aktive Einbindung von Frauen, der Studierendenvertretung und der LGBTIQA+-Community bei der Identifikation und Entschärfung von Angsträumen.\",\"Umgestaltung zentraler Plätze (z.B. Bahnhofsumfeld, Marktplatz, Seltersweg) zu Zonen mit hoher Aufenthaltsqualität.\",\"Bereitstellung von mehr Sitzgelegenheiten für ältere Menschen und konsequent barrierefreie Zugänge.\",\"Integration von Spielbereichen für Kinder und verstärkte Begrünung zur Steigerung der sozialen Kontrolle durch Belebung.\",\"Konsequente Umsetzung des „Broken Windows\\\"-Ansatzes: Schnelle Beseitigung von Vandalismusspuren zur Wahrung des Sicherheitsgefühls.\",\"Prävention durch Graffiti-Workshops und die Freigabe legaler Flächen für urbane Kunst.\",\"Erhöhung der Reinigungsintervalle in Parks und Bereitstellung von mehr, auch nachts zugänglichen, öffentlichen Toiletten.\"],\"path\":\"C:/Users/Slava/.gemini/antigravity/scratch/volt-giessen-website/assets/Whalprogramme/wahlprogramm/cluster3_innovation-wirtschaft/themenblock2_sicherheit/thema_inklusive-sicherheit.md\"},{\"slug\":\"thema_it-sicherheit\",\"title\":\"Digitale Sicherheit\",\"cluster\":\"cluster3_innovation-wirtschaft\",\"clusterTitle\":\"Innovation Wirtschaft\",\"themenblock\":\"themenblock2_sicherheit\",\"themenblockTitle\":\"Sicherheit\",\"tags\":[\"Sicherheit\",\"Digitalisierung\",\"Bildung\"],\"links\":[\"thema_hochschulbildung\",\"thema_gesundheitsfoerderung-praevention\"],\"paragraph\":\"IT-Sicherheit der Stadt stärken - Prävention gegen Cyberangriffe\",\"massnahmen\":[\"Umsetzung des BSI (Bundesamt für Sicherheit in der Informationstechnik) IT-Grundschutz-Profil: Basis-Absicherung Kommunalverwaltung\",\"IT-Sicherheitsaudit: Externe Fachleute durchleuchten alle wichtigen Systeme - wo sind Lücken? Dann: Schließen der Lücken\",\"Regelmäßige Sicherheits-Updates für alle Programme\",\"Backups: Tägliche Sicherungen aller kritischen Daten, verteilt auf mehrere physische Orte (nicht alles in einem Datencenter)\",\"Verschlüsselung aller sensiblen Daten\",\"Multi-Faktor-Authentifizierung: Login ins System erfordert nicht nur Passwort, sondern auch Code aus App oder Hardware-Schlüssel\",\"Was tun, wenn trotzdem ein Angriff erfolgt? Wer wird informiert? Wie wird isoliert? Wie werden die Daten und Informationen wiederhergestellt?\",\"Regelmäßige Übungen (mindestens 1x jährlich)\",\"IT-Sicherheitsstelle: Eine Person oder ein kleines Team, spezialisiert auf IT-Sicherheit, direkt bei der Verwaltungsspitze angesiedelt\",\"Schulung aller Beschäftigten: Häufigstes Problem sind Phishing-Mails - jährliche Schulungen: Wie erkenne ich verdächtige Mails?\",\"Kultur: IT-Sicherheit ist Aufgabe aller, nicht nur der IT-Abteilung\",\"Enge Kooperation mit dem Hessischen Cyber Competence Center (HCCC) - kostenlose Beratung nutzen\",\"Austausch mit anderen Kommunen über Erfahrungen und Bedrohungen\",\"Kooperation mit der Universität Gießen (Informatik, IT-Sicherheit)\"],\"path\":\"C:/Users/Slava/.gemini/antigravity/scratch/volt-giessen-website/assets/Whalprogramme/wahlprogramm/cluster3_innovation-wirtschaft/themenblock2_sicherheit/thema_it-sicherheit.md\"},{\"slug\":\"thema_jugendgerichtshilfe\",\"title\":\"Rechtsnahe Infrastruktur\",\"cluster\":\"cluster3_innovation-wirtschaft\",\"clusterTitle\":\"Innovation Wirtschaft\",\"themenblock\":\"themenblock2_sicherheit\",\"themenblockTitle\":\"Sicherheit\",\"tags\":[\"Sicherheit\",\"Soziale-Gerechtigkeit\",\"Barrierefreiheit\"],\"links\":[\"thema_schulbildung\",\"thema_sportfoerderung\",\"thema_gesundheitsfoerderung-praevention\"],\"paragraph\":\"Jugendgerichtshilfe stärken - Prävention statt Strafe\",\"massnahmen\":[\"Aktuell: ca. 3-4 VZÄ für über 90.000 Einwohnende - deutlich zu wenig\",\"Ziel: Aufstockung auf 6-7 VZÄ für intensivere Betreuung\",\"Spezialisierung: mindestens eine Person mit Migrationserfahrung/interkultureller Kompetenz\",\"Etablierung eines interdisziplinären Netzwerks aus Jugendgerichtshilfe, Schulen, Polizei, Jugendarbeit und Bewährungshilfe\",\"Regelmäßige Fallkonferenzen bei auffälligen Jugendlichen vor Straftaten\",\"Niedrigschwellige Beratungsangebote in Schulen und Jugendeinrichtungen\",\"Ausbau von sozialen Trainingskursen, Täter-Opfer-Ausgleich und gemeinnütziger Arbeit\",\"Sportprojekte, Handwerksprojekte und Mentoring-Programme als Bewährungsauflagen\",\"Kooperation mit lokalen Vereinen und Betrieben\"],\"path\":\"C:/Users/Slava/.gemini/antigravity/scratch/volt-giessen-website/assets/Whalprogramme/wahlprogramm/cluster3_innovation-wirtschaft/themenblock2_sicherheit/thema_jugendgerichtshilfe.md\"},{\"slug\":\"thema_ordnungspartnerschaft\",\"title\":\"Ordnungspartnerschaft - digitale Vernetzung statt Parallelstrukturen\",\"cluster\":\"cluster3_innovation-wirtschaft\",\"clusterTitle\":\"Innovation Wirtschaft\",\"themenblock\":\"themenblock2_sicherheit\",\"themenblockTitle\":\"Sicherheit\",\"tags\":[\"Sicherheit\",\"Digitalisierung\",\"Innovation\"],\"links\":[\"thema_ehrenamt-mobilitaet\"],\"paragraph\":\"In Gießen arbeiten verschiedene Akteure an öffentlicher Sicherheit und Ordnung: städtischer Ordnungsdienst, Polizei, private Sicherheitsdienste, Verkehrsbetriebe, ehrenamtliche Helfende. Oft wissen sie nicht voneinander, doppeln Einsätze oder lassen Lücken entstehen. Vorfälle werden mehrmals gemeldet, aber niemand weiß, wer gerade vor Ort ist. Schlägereien werden beobachtet, aber die Information erreicht die Polizei erst mit Verzögerung.\",\"massnahmen\":[\"Entwicklung einer sicheren digitalen Plattform für Echtzeitkommunikation\",\"Zugang für: Ordnungsdienst, Polizei, Verkehrsbetriebe, autorisierte Sicherheitsdienste\",\"Funktionen: Vorfallsmeldung, Standortanzeige, Aufgabenkoordination, Dokumentation\",\"Monatliche Koordinierungstreffen aller Partner\",\"Gemeinsame Schulungen und Fortbildungen\",\"Jahresauswertung mit Optimierung der Zusammenarbeit\",\"Transparente Kommunikation über die Partnerschaft (keine Überwachung, sondern Koordination)\",\"Jährlicher Bericht über Einsatzzahlen und Erfolge\"],\"path\":\"C:/Users/Slava/.gemini/antigravity/scratch/volt-giessen-website/assets/Whalprogramme/wahlprogramm/cluster3_innovation-wirtschaft/themenblock2_sicherheit/thema_ordnungspartnerschaft.md\"},{\"slug\":\"thema_praeventionsrat\",\"title\":\"Kommunaler Präventionsrat – Vernetzung für ein sicheres Gießen\",\"cluster\":\"cluster3_innovation-wirtschaft\",\"clusterTitle\":\"Innovation Wirtschaft\",\"themenblock\":\"themenblock2_sicherheit\",\"themenblockTitle\":\"Sicherheit\",\"tags\":[\"Sicherheit\",\"Partizipation\",\"Transparenz\",\"Integration-und-Diversität\"],\"links\":[\"thema_schulbildung\",\"thema_hochschulbildung\",\"thema_gesundheitsfoerderung-praevention\",\"thema_antidiskriminierungskonzept\",\"thema_hasskriminalitaet\",\"thema_nachtleben-clubkultur\"],\"paragraph\":\"Ein sicheres Gemeinwesen ist das Ergebnis guter Zusammenarbeit. Wenn Polizei, Schulen, Jugendhilfe, Ordnungsdienst und Zivilgesellschaft isoliert voneinander arbeiten, entstehen Lücken – Probleme werden übersehen, Chancen vergeben. In Gießen als Universitätsstadt mit besonderem Nachtleben, hohem Studierendenanteil und konzentrierten Problemlagen braucht es einen Ort, an dem alle Akteure regelmäßig zusammenkommen, Daten systematisch austauschen und koordinierte Lösungen finden.\",\"massnahmen\":[\"Formale Einrichtung eines Präventionsrats mit Vertretungen aus: Polizeipräsidium Mittelhessen, Ordnungsdienst, Jugendamt, Schulen, Jugendarbeit, Bewährungshilfe, Migrantenselbstorganisationen, Hochschulen, WIR-Vielfaltszentrum und Zivilgesellschaft\",\"Koordinationsstelle mit 1,5 Vollzeitstellen (Koordination, Datenanalyse, Netzwerkarbeit)\",\"Quartalsweise Sitzungen mit rotierenden thematischen Schwerpunkten (Jugendkriminalität, Extremismus, Hasskriminalität, Nachtleben/Freizeitgewalt)\",\"Kooperationsvereinbarung zwischen Stadt Gießen und Polizeipräsidium Mittelhessen Datengestützte Arbeit\",\"Systematische Auswertung von Kriminalitäts-, Sozial- und Infrastrukturdaten\",\"Identifikation von Problemzonen durch GIS-Mapping\",\"Entwicklung maßgeschneiderter Interventionen basierend auf Evidenz\",\"Jährlicher öffentlicher Sicherheitsbericht mit interaktiven Dashboards Früherkennung und Intervention bei Radikalisierung\",\"Schulung von Sozialarbeitenden, Lehrkräften und – in Kooperation mit dem Land Hessen – Polizeikräften zur Erkennung von Radikalisierungsanzeichen\",\"Klare, niedrigschwellige Meldestrukturen ohne Anzeigepflicht\",\"Fallkonferenzen mit allen beteiligten Akteuren zur Entwicklung individueller Unterstützungspläne\",\"Anbindung an das Landesprogramm „Hessen – aktiv für Demokratie und gegen Extremismus\\\" Schutz für Betroffene\",\"Ausstiegshilfen für Menschen aus extremistischen Milieus\",\"Schutzkonzepte für gefährdete Personen (Opfer von Hass und Diskriminierung)\",\"Enge Verzahnung mit der kommunalen Antidiskriminierungsstelle (→ siehe Kapitel Plurale Gesellschaft)\"],\"path\":\"C:/Users/Slava/.gemini/antigravity/scratch/volt-giessen-website/assets/Whalprogramme/wahlprogramm/cluster3_innovation-wirtschaft/themenblock2_sicherheit/thema_praeventionsrat.md\"},{\"slug\":\"thema_schöffenwesen\",\"title\":\"Schöffenwesen modernisieren - Justiz für alle\",\"cluster\":\"cluster3_innovation-wirtschaft\",\"clusterTitle\":\"Innovation Wirtschaft\",\"themenblock\":\"themenblock2_sicherheit\",\"themenblockTitle\":\"Sicherheit\",\"tags\":[\"Sicherheit\",\"Integration-und-Diversität\",\"Soziale-Gerechtigkeit\",\"Partizipation\"],\"links\":[\"thema_ehrenamt-mobilitaet\",\"thema_schulbildung\",\"thema_hochschulbildung\"],\"paragraph\":\"Schöffinnen sind ehrenamtliche Richterinnen, die gemeinsam mit Berufsrichterinnen urteilen. Sie bringen die \\\"Stimme des Volkes\\\" in die Justiz. Aber: Das System ist veraltet. Schöffinnen werden oft nicht repräsentativ ausgewählt (überwiegend ältere Menschen und Beamtinnen), und viele wissen gar nicht, dass sie sich bewerben können. Junge Menschen, Menschen mit Migrationshintergrund und Selbständige – fehlen oft.\",\"massnahmen\":[\"Öffentlichkeitskampagne: Was machen Schöffinnen eigentlich? Gezielte Ansprache von unterrepräsentierten Gruppen (junge Menschen, Menschen mit Migrationshintergrund, Frauen) Infoveranstaltungen in Stadtteilen, bei Vereinen und an Hochschulen\",\"Erhöhung der Aufwandsentschädigung\",\"Arbeitgebenden-Kooperationen: Freistellung ohne Lohnausfall\",\"Kinderbetreuung während der Gerichtstermine\",\"Verpflichtende Schulungen zu rechtlichen Grundlagen, Diskriminierungssensibilität und interkultureller Kompetenz\",\"Supervision und Austausch zwischen Schöffinnen\"],\"path\":\"C:/Users/Slava/.gemini/antigravity/scratch/volt-giessen-website/assets/Whalprogramme/wahlprogramm/cluster3_innovation-wirtschaft/themenblock2_sicherheit/thema_schöffenwesen.md\"},{\"slug\":\"thema_sicherheitsbeirat\",\"title\":\"Sicherheitsbeirat und öffentliche Debatte - Vertrauen durch Mitsprache\",\"cluster\":\"cluster3_innovation-wirtschaft\",\"clusterTitle\":\"Innovation Wirtschaft\",\"themenblock\":\"themenblock2_sicherheit\",\"themenblockTitle\":\"Sicherheit\",\"tags\":[\"Sicherheit\",\"Partizipation\",\"Transparenz\"],\"links\":[\"thema_radverkehr\",\"thema_consul-plattform\",\"thema_livestream-stadtverordnetenversammlung\",\"thema_jugendparlament\"],\"paragraph\":\"Sicherheitsmaßnahmen werden oft \\\"von oben\\\" angeordnet. Videoüberwachung wird installiert, ohne dass die Bevölkerung weiß, warum und wie lange. Polizeipräsenz wird verstärkt, ohne dass die Betroffenen gehört werden. Das schafft nicht Vertrauen, sondern Unbehagen. Hinzu kommt: Menschen erleben Sicherheit unterschiedlich. Für ältere Menschen ist \\\"sicher\\\" vielleicht: ausreichend beleuchtet, mit Sitzgelegenheiten und mit Polizeipräsenz. Für eine junge Frau ist \\\"sicher\\\" vielleicht: ohne Belästigung, mit Fluchtrouten und mit Möglichkeit, schnell Hilfe zu rufen. Für Menschen mit Behinderung ist \\\"sicher\\\" vielleicht: zugänglich, barrierefrei, mit Verständnis. Diese Perspektiven kollidieren manchmal und müssen daher in einem gemeinsamen Raum verhandelt werden.\",\"massnahmen\":[\"Der Beirat besteht aus Menschen, die für verschiedene Perspektiven stehen: Jugendparlament, Seniorenvertretung, Behindertenbeauftragte, Personen aus verschiedenen Communities und Verbänden, Hochschulvertretungen und Gewerkschaften\",\"Berufung durch die Stadtverordnetenversammlung für 3 Jahre\",\"Quartalsweise Sitzungen mit Beratungsrecht bei allen sicherheitsrelevanten Beschlüssen\",\"Alle Sicherheitsmaßnahmen werden vorab im Beirat diskutiert\",\"Veröffentlichung von anonymisierten Kriminalstatistiken als interaktive Dashboards (nach Wiener Vorbild)\",\"Begründungspflicht für Überwachungsmaßnahmen mit zeitlicher Befristung und Evaluierung\",\"Offene Veranstaltung für die gesamte Bevölkerung einmal pro Jahr\",\"Vorstellung der Kriminalstatistik und geplanter Maßnahmen\",\"Diskussionsrunden zu spezifischen Themen (z.B. Sicherheit im Bahnhofsviertel, Radverkehr, Nachtsicherheit)\",\"Sammlung von Anregungen und Beschwerden\"],\"path\":\"C:/Users/Slava/.gemini/antigravity/scratch/volt-giessen-website/assets/Whalprogramme/wahlprogramm/cluster3_innovation-wirtschaft/themenblock2_sicherheit/thema_sicherheitsbeirat.md\"},{\"slug\":\"thema_buergernahe-verwaltung\",\"title\":\"Bürgerzentrierte Verwaltung\",\"cluster\":\"cluster3_innovation-wirtschaft\",\"clusterTitle\":\"Innovation Wirtschaft\",\"themenblock\":\"themenblock3_digitalisierung\",\"themenblockTitle\":\"Digitalisierung\",\"tags\":[\"Verwaltungsmodernisierung\",\"Digitalisierung\",\"Barrierefreiheit\",\"Partizipation\"],\"links\":[\"thema_fruehkindliche-bildung\",\"thema_sportfoerderung\",\"thema_inklusive-sicherheit\",\"thema_kita-familienzentren\"],\"paragraph\":\"Viele Verwaltungsleistungen sind weiterhin papierbasiert, nur teilweise digital oder schwer zugänglich. Besonders häufig genutzte Alltagsleistungen wie Meldeangelegenheiten, Ausweis- und Passverfahren, Bau- und Sondernutzungsanträge, Kita-Anmeldungen oder Anwohnerparkausweise sind auch in Gießen und im Landkreis noch nicht vollständig digital oder nur mit Medienbrüchen nutzbar. Barrierefreie und mehrsprachige Angebote fehlen häufig, und BundID sowie digitale Unterschriften sind noch nicht durchgängig integriert.\",\"massnahmen\":[\"Digitales Rathaus ausbauen: Von 8 auf 49 Online-Verfahren in fünf Jahren – dieser Erfolg wird konsequent weitergeführt. Die meistgenutzten Verwaltungsleistungen sollen bis Ende 2026 medienbruchfrei und durchgängig digital unterstützt werden (OZG) – inklusive Terminvergabe, Bauleitverfahren und zentraler Antragsportale.\",\"BundID‑Integration: Die Online-Dienste von Stadt und Landkreis sollen vollständig an die BundID angebunden werden, damit Verwaltungsanträge einheitlich und sicher mit einem einzigen Login gestellt werden können.\",\"Barrierefreie, mehrsprachige Angebote: Websites und Formulare sollen nach dem Prinzip „E‑Government für alle\\\" gestaltet werden. Analoge Kanäle (Servicezentren, Telefon) bleiben bestehen, damit niemand durch Digitalisierung ausgeschlossen wird.\",\"Usability‑Tests und KI‑gestützte Dienste: Vor der Einführung neuer Online‑Verfahren werden Nutzerfreundlichkeit und Barrierefreiheit getestet. Chatbots und KI‑Assistenten unterstützen bei häufigen Anfragen, ohne persönliche Daten auszuwerten.\"],\"path\":\"C:/Users/Slava/.gemini/antigravity/scratch/volt-giessen-website/assets/Whalprogramme/wahlprogramm/cluster3_innovation-wirtschaft/themenblock3_digitalisierung/thema_buergernahe-verwaltung.md\"},{\"slug\":\"thema_digitale-infrastruktur\",\"title\":\"Digitale Infrastruktur\",\"cluster\":\"cluster3_innovation-wirtschaft\",\"clusterTitle\":\"Innovation Wirtschaft\",\"themenblock\":\"themenblock3_digitalisierung\",\"themenblockTitle\":\"Digitalisierung\",\"tags\":[\"Digitalisierung\",\"Wirtschaftsförderung\",\"Bildung\"],\"links\":[\"thema_oepnv\",\"thema_parkraum\",\"thema_energieverbrauch\",\"thema_finanzen\",\"thema_gruendungsfoerderung\",\"thema_wirtschaftsfoerderung\",\"thema_offene-daten\"],\"paragraph\":\"FTTC ist in Stadt und Landkreis Gießen die am meisten verbreitete Breitbandlösung, bringt Glasfaser aber nur bis zur Straße – die letzte Strecke zum Haus läuft über Kupfer und reicht damit nicht für Gigabit-Geschwindigkeiten aus. Nur echte Glasfaser bis ins Haus (FTTH) liefert stabile Verbindungen für Homeoffice, moderne Anwendungen, Wirtschaft und Verwaltung. Gleichzeitig fehlt in vielen Bereichen ein flächendeckendes 5G-Netz.\",\"massnahmen\":[\"Gigabit-Netz: Der Landkreis Gießen verfügt bereits über eine gute Grundversorgung mit schnellem Internet – rund 98 % der Haushalte sind über FTTC-Anschlüsse (Glasfaser bis zum Kabelverzweiger) erreichbar. Um zukünftige Anforderungen sicherzustellen, soll der flächendeckende Ausbau von Glasfaser bis in die Haushalte (FTTH) bis spätestens 2028 erreicht werden, sodass Gigabit-Geschwindigkeiten überall verfügbar sind.\",\"5G und LoRaWAN: Das Glasfasernetz soll mit 5G‑Funk und LoRaWAN für Smart‑City-Anwendungen kombiniert werden. Die Stadtwerke Gießen errichten seit 2022 LoRaWAN‑Gateways, um CO₂-Werte, Raumbelegung und Energieverbrauch zu messen und künftig intelligente Parkraumbewirtschaftung oder die Fernablesung von Wärmemengen zu ermöglichen.\",\"Offene Datenschnittstellen: Der Ausbau der Netzinfrastruktur soll offene und standardisierte Schnittstellen ermöglichen, damit Forschung, Start-ups und die Verwaltung digitale Innovationen leichter entwickeln können. Beispiele für offene Schnittstellen sind Echtzeitdaten zu Verkehr und ÖPNV oder Sensordaten aus LoRaWAN-Netzen, die über standardisierte APIs zugänglich sind.\"],\"path\":\"C:/Users/Slava/.gemini/antigravity/scratch/volt-giessen-website/assets/Whalprogramme/wahlprogramm/cluster3_innovation-wirtschaft/themenblock3_digitalisierung/thema_digitale-infrastruktur.md\"},{\"slug\":\"thema_digitale-souveraenitaet\",\"title\":\"Digitale Souveränität\",\"cluster\":\"cluster3_innovation-wirtschaft\",\"clusterTitle\":\"Innovation Wirtschaft\",\"themenblock\":\"themenblock3_digitalisierung\",\"themenblockTitle\":\"Digitalisierung\",\"tags\":[\"Digitalisierung\",\"Sicherheit\",\"Innovation\"],\"links\":[\"thema_schulbildung\",\"thema_it-sicherheit\"],\"paragraph\":\"Proprietäre Software und US-Clouds verursachen fortlaufende Lizenzkosten und Abhängigkeiten, während die Kommunikation weiterhin stark auf Plattformen wie Facebook basiert.\",\"massnahmen\":[\"Open-Source-Software: Viele Kommunen und einzelne Bundesländer setzen zunehmend auf freie Software, um ihre digitale Unabhängigkeit zu stärken und Kosten langfristig zu senken. Auch Gießen und der Landkreis sollen diesen Weg konsequent gehen: Wir fordern den Einsatz freier Software (z. B. LibreOffice, OpenDesk) und offener Standards in der Stadtverwaltung sowie an Schulen, um Abhängigkeiten von einzelnen Herstellern zu vermeiden.\",\"Gemeinsame Beschaffung: Durch koordinierte Beschaffung von Hard‑ und Software können Kosten gesenkt und die Qualität verbessert werden.\",\"Datenhoheit: Menschen müssen nachvollziehen können, wo ihre Daten gespeichert werden. Verwaltungsdaten sollten auf Servern innerhalb der EU liegen, um dauerhaft Datenschutz und digitale Souveränität zu gewährleisten.\",\"Digitale Kommunikation: Die Verwaltung sollte auf offene, datenschutzfreundliche Kommunikationswege setzen. Neben regionalen Apps wie „Dorffunk\\\" können auch eigene oder gemeinschaftlich betriebene Open-Source-Plattformen (z. B. Mastodon) genutzt werden, um Menschen in Gießen und im Landkreis sicher und direkt zu erreichen.\"],\"path\":\"C:/Users/Slava/.gemini/antigravity/scratch/volt-giessen-website/assets/Whalprogramme/wahlprogramm/cluster3_innovation-wirtschaft/themenblock3_digitalisierung/thema_digitale-souveraenitaet.md\"},{\"slug\":\"thema_digitale-teilhabe\",\"title\":\"Digitale Teilhabe und Kompetenz\",\"cluster\":\"cluster3_innovation-wirtschaft\",\"clusterTitle\":\"Innovation Wirtschaft\",\"themenblock\":\"themenblock3_digitalisierung\",\"themenblockTitle\":\"Digitalisierung\",\"tags\":[\"Digitalisierung\",\"Soziale-Gerechtigkeit\",\"Bildung\",\"Barrierefreiheit\"],\"links\":[\"thema_oepnv\",\"thema_schulbildung\",\"thema_hochschulbildung\",\"thema_ausserschulische-bildung\",\"thema_inklusive-sicherheit\"],\"paragraph\":\"Teile der Bevölkerung haben keinen Zugang zu digitalen Angeboten oder verfügen über wenig Medienkompetenz. Besonders ältere Menschen, Menschen mit Behinderungen und einkommensschwache Gruppen sind gefährdet, abgehängt zu werden.\",\"massnahmen\":[\"Digitale Lotsdienste und Digitalkümmernde: Angebote wie die offene Techniksprechstunde im Nordstadtzentrum zeigen, dass persönliche Unterstützung bei digitalen Fragen gut angenommen wird. Dieses bestehende Engagement soll durch ein strukturiertes Lotsen-Netzwerk nach dem Vorbild der hessenweiten „Di@-Lotsen\\\" ergänzt und professionalisiert werden. Ziel ist ein gebündeltes, stadtteilübergreifendes Angebot, das überall erreichbar ist – in allen Quartieren und im ländlichen Raum.\",\"Niederschwellige Bildungsangebote: Volkshochschulen, Bibliotheken und mobile Smart‑Busse bieten Kurse zu Internet, E‑Government und Künstlicher Intelligenz. Digitalwerkstätten (z. B. MAGIE MakerSpace, BERD) fördern praktische Erfahrung.\",\"Digitale Barrierefreiheit: Websites, Apps und Dokumente werden nach WCAG-Standards (Web Content Accessibility Guidelines) gestaltet. Menschen mit Behinderungen erhalten Zugang zu Assistenzsystemen.\",\"Lebenslanges Lernen: Für Mitarbeitende der Verwaltung sollen kontinuierliche Schulungen und Fortbildungen etabliert werden, damit digitale Kompetenzen dauerhaft ausgebaut und neue Technologien sicher angewendet werden können.\"],\"path\":\"C:/Users/Slava/.gemini/antigravity/scratch/volt-giessen-website/assets/Whalprogramme/wahlprogramm/cluster3_innovation-wirtschaft/themenblock3_digitalisierung/thema_digitale-teilhabe.md\"},{\"slug\":\"thema_gesamtstrategie\",\"title\":\"Gesamtstrategie\",\"cluster\":\"cluster3_innovation-wirtschaft\",\"clusterTitle\":\"Innovation Wirtschaft\",\"themenblock\":\"themenblock3_digitalisierung\",\"themenblockTitle\":\"Digitalisierung\",\"tags\":[\"Digitalisierung\",\"Verwaltungsmodernisierung\"],\"links\":[],\"paragraph\":\"Es gibt bereits Digitalisierungs- und Smart-City-Strukturen in Stadt und Landkreis. Was fehlt, ist eine verbindliche gemeinsame Steuerung von Stadt und Landkreis mit klarer politischer Verantwortung, transparenter Zielsteuerung und messbaren Ergebnissen.\",\"massnahmen\":[\"Gemeinsame Steuerung der Digitalisierung: Stadt und Landkreis verfügen bereits über unterschiedliche Digitalisierungsstrukturen und Kooperationsprojekte, unter anderem das vom Landkreis getragene Förderprojekt „Smartes Gießener Land\\\" und erste Arbeitsgemeinschaften. Diese sollen unter einer klaren gemeinsamen Steuerung von Stadt und Landkreis gebündelt und in einer verbindlich gemeinsam getragenen Stabsstelle zusammengeführt werden. Ziel ist es, Strategien, Projekte und Datenplattformen zusammenzuführen, Ressourcen effizient einzusetzen und eine zentrale Anlaufstelle für Verwaltung, Wirtschaft, Wissenschaft und Zivilgesellschaft zu schaffen.\",\"Monitoring & Transparenz: Digitale Dashboards, wie sie im Programm „Digitale Kommune@Hessen\\\" bereits eingesetzt werden, sollen Fortschritte bei Digitalisierungs- und Smart-City-Projekten transparent und öffentlich sichtbar machen. Die Bürgerschaft kann Projektstände nachvollziehen, während Politik und Verwaltung auf Basis klarer Kennzahlen steuern und nachsteuern können.\"],\"path\":\"C:/Users/Slava/.gemini/antigravity/scratch/volt-giessen-website/assets/Whalprogramme/wahlprogramm/cluster3_innovation-wirtschaft/themenblock3_digitalisierung/thema_gesamtstrategie.md\"},{\"slug\":\"thema_nachhaltige-digitalisierung\",\"title\":\"Nachhaltige Digitalisierung\",\"cluster\":\"cluster3_innovation-wirtschaft\",\"clusterTitle\":\"Innovation Wirtschaft\",\"themenblock\":\"themenblock3_digitalisierung\",\"themenblockTitle\":\"Digitalisierung\",\"tags\":[\"Digitalisierung\",\"Klimaschutz\",\"Innovation\"],\"links\":[\"thema_klimaresilienz\",\"thema_digitale-infrastruktur\",\"thema_offene-daten\",\"thema_europaeische-identitaet\"],\"paragraph\":\"Die größte Herausforderung bleibt: Pilotprojekte dauerhaft in den Regelbetrieb zu überführen. Fehlende Zuständigkeiten, Finanzierung und Wissenstransfer bremsen die Umsetzung. Bestehende digitale Anwendungen müssen nutzerfreundlicher gestaltet werden, um die Akzeptanz zu steigern.\",\"massnahmen\":[\"Pilotprojekte verstetigen: Erfolgreiche Projekte aus \\\"Digitale Kommune@Hessen\\\" und der Smart‑Region, wie der volldigitale Führerscheinumtausch, sollen nach Evaluierung dauerhaft in den Verwaltungsalltag überführt werden.\",\"KI- und Datenprojekte verstetigen: Die Ergebnisse des interkommunalen Projekts Smart KIKZ sollen konsequent in den Verwaltungsalltag überführt und das Projekt nach Ende der Förderung dauerhaft in der kommunalen Verwaltung verankert werden.\",\"Regionale Kooperation: Statt immer neue Anwendungen zu starten, sollten bestehende Lösungen gemeinsam verbessert, vereinheitlicht und weiterentwickelt werden, um Qualität und Nutzerfreundlichkeit zu erhöhen.\",\"Nachhaltigkeitsstandards: Digitale Dienste sollen ressourcenschonend gestaltet werden – durch energieeffiziente Software und Rechenzentren sowie einen verantwortungsvollen Umgang mit Hardware, etwa durch langlebige Geräte und faire Beschaffung.\",\"Vernetzung und Förderung: Gießen und der Landkreis sollen sich stärker in europäische Programme einbringen, die Kommunen bei Digitalisierung und Smart-City-Entwicklung unterstützen – etwa „Living-in.EU\\\" oder die „Intelligent Cities Challenge\\\". Auch eine Beteiligung an Horizon-Europe-Konsortien kann zusätzliche Impulse und Fördermittel ermöglichen. Das vom Bundesministerium für Wohnen, Stadtentwicklung und Bauwesen geförderte Projekt „Smartes Gießener Land\\\" ist dabei ein erster wichtiger Schritt, um solche Ansätze regional zu erproben und langfristig weiterzuentwickeln.\",\"Sensorik und Smart Mobility: Der Einsatz von Sensoren, etwa zur Messung von Wasserständen oder Luftqualität, schafft wichtige Datengrundlagen, um auf die Folgen des Klimawandels zu reagieren und die städtische Infrastruktur intelligent zu steuern. Auf dieser Basis können digitale Plattformen auch Mobilitätsangebote vernetzen – etwa On-Demand-Shuttle-Dienste, intelligentes Parkmanagement oder Verkehrslenkung in Echtzeit. Im nächsten Kapitel zeigt Volt, wie Demokratie gestärkt, die Beteiligung verbessert und die gesellschaftliche Vielfalt gefördert werden kann – von Europa bis in die eigene Nachbarschaft.\"],\"path\":\"C:/Users/Slava/.gemini/antigravity/scratch/volt-giessen-website/assets/Whalprogramme/wahlprogramm/cluster3_innovation-wirtschaft/themenblock3_digitalisierung/thema_nachhaltige-digitalisierung.md\"},{\"slug\":\"thema_offene-daten\",\"title\":\"Offene Daten\",\"cluster\":\"cluster3_innovation-wirtschaft\",\"clusterTitle\":\"Innovation Wirtschaft\",\"themenblock\":\"themenblock3_digitalisierung\",\"themenblockTitle\":\"Digitalisierung\",\"tags\":[\"Digitalisierung\",\"Transparenz\",\"Innovation\",\"Partizipation\"],\"links\":[\"thema_energieverbrauch\",\"thema_finanzen\",\"thema_it-sicherheit\",\"thema_europaeische-identitaet\"],\"paragraph\":\"Kommunale Daten werden selten offen und maschinenlesbar bereitgestellt. Klare Regeln zum Umgang mit Verwaltungsdaten (\\\"Data Governance\\\") fehlen, wodurch die tägliche Arbeit in Verwaltung und Projekten erschwert wird.\",\"massnahmen\":[\"Open by Default: Nach Vorbild der Hamburger Transparenzinitiative sollen Daten wie Verkehrsdichte, Energieverbrauch und Haushaltsausgaben standardmäßig als offene, maschinenlesbare Datensätze veröffentlicht werden. Die interkommunale Datenstrategie von Gießen, Fulda, Offenbach und Wetzlar sammelt bereits systematisch Daten. Diese Zusammenarbeit muss ausgebaut werden; offene Daten erleichtern Bürgerbeteiligung und fördern Innovation.\",\"GoDonu‑Plattform: Mit dem Projekt „GoDonu – Gemeinsam online Daten offen nutzen\\\" entsteht in Hessen eine gemeinsame Plattform für offene kommunale Daten. Gießen und der Landkreis sollen sich aktiv für den Ausbau und die langfristige Förderung dieser Initiative einsetzen, damit Datenanalysen, Vergleichswerte und offene Verwaltungsdaten allen Kommunen dauerhaft zugänglich bleiben.\",\"Ethik und Daten
