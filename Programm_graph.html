<script>
window.startGraph=()=>{if(window.__graphStarted)return;window.__graphStarted=true;const PROGRAMME_DATA=JSON.parse("{\"generatedAt\":\"2026-05-24T12:03:50.975Z\",\"topics\":[{\"slug\":\"thema_brandplatz\",\"title\":\"Brandplatz bis Marktplatz – Identität statt Beliebigkeit\",\"cluster\":\"cluster1_nachhaltige-region\",\"clusterTitle\":\"Nachhaltige Region\",\"themenblock\":\"themenblock1_wohnungsbau\",\"themenblockTitle\":\"Wohnungsbau\",\"tags\":[\"Wohnen-und-Stadtentwicklung\",\"Klimaschutz\",\"Klimaresilienz\",\"Kultur-und-Kreativität\",\"Partizipation\"],\"links\":[\"thema_klimaresilienz\",\"thema_brandplatz-wirtschaft\",\"thema_digitale-infrastruktur\"],\"paragraph\":\"Die Brandplatzumgestaltung ist bereits in der Planung – aber der Prozess stockt. Der Platz leidet unter fehlender Aufenthaltsqualität, Hitzebelastung und unklarer Identität. Marktbeschickende, Anwohnende und Gewerbetreibende kritisieren, dass ihre Anregungen aus 2023 nicht ausreichend berücksichtigt wurden. Lindenplatz, Kirchplatz und Marktplatz benötigen ebenfalls dringend klimaresiliente Umgestaltung, um ihrer Funktion als zentraler Begegnungsräume gerecht zu werden.\",\"massnahmen\":[\"Schwammstadt-Elemente: Versickerungsmulden, Retentionsflächen\",\"Schattenspender: Großkronige Bäume (Klimabaumarten wie Platane, Linde)\",\"Entsiegelung: Wasserdurchlässige Beläge statt Asphalt\",\"Denkmalverträgliche Gestaltung\",\"Geschichtsvermittlung anhand von Info-Stelen zur Stadtgeschichte\",\"Sichtachsen zu historischen Gebäuden erhalten\",\"Wochenmarkt vom Brandplatz bis zum Marktplatz: Optimierte Standplätze mit Strom-/Wasseranschluss und überdachten Bereichen\",\"Veranstaltungen: Flexibel nutzbare Flächen für Stadtfeste, Open-Air-Konzerte\",\"Aufenthalt: Sitzgelegenheiten, Barrierefreiheit, WLAN\",\"Zukunftswerkstatt mit allen Nutzendengruppen (Marktbeschickende, Anwohnende, Einzelhandel, Kulturszene)\",\"Testphasen: Temporäre Gestaltung vor Dauerlösung (Pop-up-Begrünung, mobile Sitzmöbel)\",\"Monitoring: Nutzendenzufriedenheit evaluieren und nachsteuern\"],\"path\":\"C:/Users/Slava/.gemini/antigravity/scratch/volt-giessen-website/assets/Whalprogramme/wahlprogramm/cluster1_nachhaltige-region/themenblock1_wohnungsbau/thema_brandplatz.md\"},{\"slug\":\"thema_digitaler-bauantrag-bim\",\"title\":\"Digitaler Bauantrag und Building Information Modeling BIM\",\"cluster\":\"cluster1_nachhaltige-region\",\"clusterTitle\":\"Nachhaltige Region\",\"themenblock\":\"themenblock1_wohnungsbau\",\"themenblockTitle\":\"Wohnungsbau\",\"tags\":[\"Digitalisierung\",\"Verwaltungsmodernisierung\",\"Klimaschutz\",\"Innovation\"],\"links\":[\"thema_energieverbrauch\",\"thema_schulbildung\",\"thema_hochschulbildung\",\"thema_gruendungsfoerderung\",\"thema_gesamtstrategie\",\"thema_offene-daten\"],\"paragraph\":\"Baugenehmigungsverfahren dauern häufig mehrere Monate durch papiergestützten Austausch zwischen Planenden, Behörden und Fachstellen. Der Landkreis Gießen hat Ende 2025 bekanntgegeben, den digitalen Bauantrag über das Bauportal Hessen Anfang 2026 einzuführen – ein wichtiger erster Schritt für die jährlich rund 1.500 Bauanträge. Doch digitaler Bauantrag allein reicht nicht: Es fehlen Building Information Modeling (BIM) als Standard, transparente Lebenszyklusanalysen (LCA) zur rationalen Entscheidung zwischen Sanierung und Neubau, und Materialrückverfolgbarkeit für Kreislaufwirtschaft. NRW erprobt BIM-Bauanträge bereits in sieben Kommunen, Hessen integriert BIM derzeit in das Bauportal Hessen.\",\"massnahmen\":[\"Alle Bauvorhaben ≥500 m² Nutzfläche nach BIM-Standard planen und dokumentieren\",\"Integriert: Lebenszykluskosten + CO₂-Emissionen über 40–50 Jahre (Entscheidungskriterium bei Genehmigung)\",\"Design for Disassembly: Rückbaubarkeit und Recyclingfähigkeit sind Teil des 3D-Modells\",\"BIM-Daten in herstellerneutralen, langzeitarchivbaren Formaten speichern (nicht proprietär)\",\"Materialrückverfolgbarkeit über 20–30 Jahre: Bei Rückbau/Sanierung kann auf digitale Materialsammlung zugegriffen werden – Kreislaufwirtschaft wird operativ\",\"IFC 4.3 integriert Nachhaltigkeitsdaten (CO₂, Recycling) direkt ins Modell\",\"Gießen an Bauportal Hessen (seit April 2025) vollständig anschließen – Planung, Genehmigung, Abnahme medienbruchfrei online\",\"Parallele Bearbeitung: Behörde + Planer arbeiten in integrierten digitalen Vorgangsräumen (Vorbild: Baden-Württemberg \\\"Virtuelles Bauamt\\\")\",\"Zeitersparnis: Postlaufzeiten entfallen, Fehlerreduktion durch Automatisierung = 20–30% schneller Genehmigungszeiten\",\"Transparenz: Antragsteller sehen Bearbeitungsstatus digital in Echtzeit\",\"Koordination BIM-Einführung bei städtischen Projekten\",\"Beratung Planer: BIM-Modellqualität, IFC-Standard-Einhaltung\",\"Fortbildung Verwaltung: Personal fit machen für digitale Bauprüfung\",\"Wissenstransfer zu Hochschulen, Start-ups, privaten Planern\",\"BIM-Datenplattformen + IFC-Datenmanagement sind Basis für Smart-City-Anwendungen (Energieeffizienz, Urban Mining, Sanierungsmanagement)\",\"Offene Datenstandards ermöglichen Nutzung für Forschung, Hochschulen, Start-ups\",\"Synergieeffekte: Gießen als Modellstadt für datengesteuerte, nachhaltige Stadtentwicklung\"],\"path\":\"C:/Users/Slava/.gemini/antigravity/scratch/volt-giessen-website/assets/Whalprogramme/wahlprogramm/cluster1_nachhaltige-region/themenblock1_wohnungsbau/thema_digitaler-bauantrag-bim.md\"},{\"slug\":\"thema_elefantenklo\",\"title\":\"Elefantenklo – Herausforderung für das Stadtentwicklungskonzept\",\"cluster\":\"cluster1_nachhaltige-region\",\"clusterTitle\":\"Nachhaltige Region\",\"themenblock\":\"themenblock1_wohnungsbau\",\"themenblockTitle\":\"Wohnungsbau\",\"tags\":[\"Wohnen-und-Stadtentwicklung\",\"Klimaresilienz\",\"Barrierefreiheit\"],\"links\":[\"thema_kuehlachsen\",\"thema_seltersweg\",\"thema_klimaresilienz\",\"thema_lebendige-innenstadt\"],\"paragraph\":\"Das Elefantenklo ist ein zentraler Zugang zur Innenstadt und verdichtet zentrale Zielkonflikte: versiegelter Betonbau statt klimaresilienter Freiräume, schwer zugängliche Ebenen trotz Anspruch auf Barrierefreiheit, streitige „Bausünde\\\" und zugleich Wahrzeichen. Die Debatte ist stark polarisiert: In sozialen Medien dominieren Abrissforderungen, JLU‑Passantenbefragungen (2008/2017) zeigen jedoch nur 6–9 % Zustimmung zu Abriss/Kreisverkehr, aber 56,5 % Wunsch nach Veränderungen wie Begrünung, Gestaltung und besserer Beleuchtung. Zugleich bleibt die Querungsfunktion für rund 12.000 Menschen täglich zentral und prägt Handel und Aufenthaltsqualität am Selterstor.\",\"massnahmen\":[\"Faktenbasis & Expertise: Systematische Auswertung von JLU‑Umfragen, Stadtklimaanalysen und Verkehrsdaten, ergänzt durch Gutachten aus Geografie, Verkehrsplanung, Barrierefreiheit, Denkmalschutz und Architektur.\",\"Variantenvergleich: Mindestens drei Szenarien – Sanierung/Begrünung, Teilrückbau mit Platzneugestaltung, vollständiger Rückbau mit alternativer Querung – werden nach einheitlichen Kriterien (CO₂‑Bilanz, Invest‑/Betriebskosten, Barrierefreiheit, verkehrliche Leistungsfähigkeit, Aufenthaltsqualität) bewertet.\",\"Pflichtenheft: Jede Lösung muss stufenfreie Querungen und Aufzüge bieten, ins Kühlachsen‑ und Begrünungskonzept passen (Entsiegelung, Verschattung, Begrünung), angstfreie, gut beleuchtete Unterbereiche schaffen, Raum für Kunst/Kultur eröffnen und einen messbaren Mehrwert für Seltersweg, Innenstadt und umliegenden Einzelhandel liefern.\",\"Bürgerschaftsrat „Zukunft Elefantenklo\\\": Ein geloster Bürgerschaftsrat bewertet die Szenarien und gibt eine Empfehlung, die Politik und Verwaltung öffentlich begründet berücksichtigen müssen. (siehe Kapitel Bürgerschaftsbeteiligung)\"],\"path\":\"C:/Users/Slava/.gemini/antigravity/scratch/volt-giessen-website/assets/Whalprogramme/wahlprogramm/cluster1_nachhaltige-region/themenblock1_wohnungsbau/thema_elefantenklo.md\"},{\"slug\":\"thema_kuehlachsen\",\"title\":\"Klimaresiliente Stadtentwicklung\",\"cluster\":\"cluster1_nachhaltige-region\",\"clusterTitle\":\"Nachhaltige Region\",\"themenblock\":\"themenblock1_wohnungsbau\",\"themenblockTitle\":\"Wohnungsbau\",\"tags\":[\"Klimaschutz\",\"Klimaresilienz\",\"Biodiversität\",\"Gesundheit\",\"Wohnen-und-Stadtentwicklung\"],\"links\":[\"thema_radverkehr\",\"thema_mobility-hubs\",\"thema_klimaresilienz\",\"thema_biodiversitaet\",\"thema_lebendige-innenstadt\"],\"paragraph\":\"Kühlachsen-System – Grüne Lungen gegen Hitzeinseln\",\"massnahmen\":[\"Bebauungsverbot in identifizierten Kaltluftentstehungsgebieten\",\"Biotopverbund zur Vernetzung der Freiräume\",\"Schwammstadt-Pilotprojekt: Regenwasserrückhaltung durch Versickerungsmulden, Rigolen und begrünte Retentionsflächen statt Kanalisation\",\"Schutz und Aufwertung der Freiflächen mit besonderer Bedeutung für die Kaltund Frischluftproduktion\",\"Fahrradschnellwege Uniklinikum–Schiffenberger Weg–Innenstadt (4–5 m breit, baulich getrennt, beleuchtet, möglichst kreuzungsfrei).\",\"Fußgängerfreundliche Querungen mit Zebrastreifen, Mittelinseln und verlängerten Grünphasen.\",\"Integration eines Mobility-Hubs am Erdkauterweg im Schiffenberger Tal als multimodaler Knoten (weitere Leuchtturmprojekte sind denkbar an zentralen Verkehrsknoten um die Stadt und in der Stadt, z.B. Bahnhof)\",\"Dach- und Fassadenbegrünung möglichst als Regelfall bei Neubauten und größeren Sanierungen vorsehen; wo technisch möglich, soll mindestens eine Gebäudeoberfläche (Dach oder Fassade) begrünt werden, ergänzt durch passende Förderangebote wie GrüneMitteGießen und gute lokale Beispiele wie die Sanierung des THM‑Hochhaus C10.\",\"Natürliche und CO₂-speichernde Baumaterialien (Holz, Lehm, Recyclingbeton, etc.) bevorzugen und fördern.\",\"Umbau vor Neubau: Bei allen größeren Vorhaben soll systematisch geprüft werden, ob eine Sanierung oder Umnutzung möglich ist, da aktuelle Studien zeigen, dass dies im Lebenszyklus in der Regel deutlich weniger Emissionen verursacht als Abriss und Neubau. Bis zu 75% weniger Emissionen durch Bestandserhalt und geringere Gesamtkosten unter Einbezug des Lebenszyklus.\",\"Reduktion der Oberflächenerwärmung durch Verwendung heller, reflektierender Oberflächen.\"],\"path\":\"C:/Users/Slava/.gemini/antigravity/scratch/volt-giessen-website/assets/Whalprogramme/wahlprogramm/cluster1_nachhaltige-region/themenblock1_wohnungsbau/thema_kuehlachsen.md\"},{\"slug\":\"thema_musterbauordnung\",\"title\":\"Nachhaltige Bauplanung & Digitale Standards\",\"cluster\":\"cluster1_nachhaltige-region\",\"clusterTitle\":\"Nachhaltige Region\",\"themenblock\":\"themenblock1_wohnungsbau\",\"themenblockTitle\":\"Wohnungsbau\",\"tags\":[\"Klimaschutz\",\"Innovation\",\"Wohnen-und-Stadtentwicklung\",\"Transparenz\"],\"links\":[\"thema_klimaneutral-2035\",\"thema_fruehkindliche-bildung\",\"thema_schulbildung\",\"thema_sportfoerderung\",\"thema_kita-familienzentren\"],\"paragraph\":\"Klimaneutrale Musterbauordnung\",\"massnahmen\":[\"Lebenszyklusanalyse (cradle-to-grave) verpflichtend für alle Bauvorhaben ≥500 m² Nutzfläche; langfristig cradle-to-cradle.\",\"Design for Disassembly: Schraubverbindungen statt Verklebung, sortenreine Materialien für gute Rückbaubarkeit.\",\"Recyclingmaterialien bevorzugt: Recyclingbeton, Sekundärrohstoffe, regionale Beschaffung (<150 km reduziert CO₂).\",\"Holzbau-Präferenz bei öffentlichen Gebäuden: Mindestens 50% der Tragstruktur aus Holz.\",\"Gebäudebegrünung als Standard: Mindestens 30% der Gebäudehülle (Dach oder Fassade).\",\"Unabhängige Gutachter prüfen vor jedem Abriss Sanierungsalternativen per LCA-Vergleich.\",\"Abriss nur, wenn Sanierung klar schlechter in der Ökobilanz ist, Klimaneutralität im Bestand nicht erreichbar oder Lebenszykluskosten >30% höher sind.\",\"Denkmalschutz und Klimaschutz verbinden, historische Quartiere priorisieren.\",\"Öffentliche Registrierung aller Abrissgenehmigungen mit Begründung.\",\"20% Förderbonus für innovative Sanierung (z.B. serielle Sanierung, Aufstockung).\",\"Serielle Sanierung mit vorgefertigten Fassaden-Modulen, 30–40% schneller, 15–50% KfW-Förderung.\",\"Material-Recycling-Bonus in Ausschreibungen verankern.\",\"KfW-BEG-Programme nutzen (Tilgungszuschüsse bis ca. 67.500 € für Effizienzhaus 40).\",\"Alle städtischen Neubauten werden ab 2027 DGNB-zertifiziert, Gold-Standard als Ziel.\",\"Portfoliozertifizierung für kommunale Wohnbaugesellschaften bis 2029 zur Kosteneffizienz.\",\"Zertifizierungsgebühren von ca. 15.000–50.000 € amortisieren sich über Wertbeständigkeit und 20–30% niedrigere Betriebskosten.\",\"Stadtverordneten- und Kreistagsbeschluss 2026 zur Verabschiedung der klimaneutralen Musterbauordnung.\",\"Beratungsstelle beim Landkreis (2 Vollzeitstellen) für LCA-Erstberatung, DGNB-Auditor-Vermittlung und KfW-Förderanträge – für Stadt und 18 Gemeinden.\",\"3–5 sanierte Referenzgebäude (Schulen, Kitas, Verwaltung) bis 2028 als sichtbare Pilotprojekte für serielle Sanierung und Aufstockung.\"],\"path\":\"C:/Users/Slava/.gemini/antigravity/scratch/volt-giessen-website/assets/Whalprogramme/wahlprogramm/cluster1_nachhaltige-region/themenblock1_wohnungsbau/thema_musterbauordnung.md\"},{\"slug\":\"thema_schwanenteich\",\"title\":\"Schwanenteich – Mediation statt Konfrontation\",\"cluster\":\"cluster1_nachhaltige-region\",\"clusterTitle\":\"Nachhaltige Region\",\"themenblock\":\"themenblock1_wohnungsbau\",\"themenblockTitle\":\"Wohnungsbau\",\"tags\":[\"Partizipation\",\"Biodiversität\",\"Klimaschutz\",\"Barrierefreiheit\"],\"links\":[\"thema_biodiversitaet\"],\"paragraph\":\"Die Bürgerinitiative \\\"Rettet die Bäume am Schwanenteich\\\" warnt vor dramatischen Folgen der geplanten Dammsanierung: Vier Jahre gesperrte Wege, Verlust wertvoller Altbäume (teilweise über 100 Jahre alt), fehlende Bürgerschaftsbeteiligung bei einem Projekt von erheblicher stadtklimatischer und ökologischer Bedeutung. Der Konflikt zwischen technischem Hochwasserschutz und ökologischer Aufwertung eskaliert.\",\"massnahmen\":[\"Externe, neutrale Mediation zwischen Stadt Gießen, Bürgerinitiative, Naturschutzverbänden und Fachplanern beauftragen.\",\"Schwammstadt-Sanierung: Naturnahe Dammbefestigung mit wasserundurchlässigen, begrünbaren Materialien und heimischen Stauden).\",\"Ökologische Aufwertung: Mindestens 1:1-Ersatz für gefällte Bäume durch Neupflanzungen von Klimabaumarten (Platane, Linde, Ulme); Wildblumenwiesen; Totholzhabitate; Insektenhotels.\",\"Barrierefreie Wegeführung mit taktilen Elementen, ausreichenden Ruhezonen und rollstuhlgerechten Erschließungen.\",\"Bürgerbeteiligung: Zukunftswerkstatt mit Anwohnern, Naturschutzverbänden und regelmäßigen Nutzergruppen (Spaziergehende, Eltern, Senioren).\"],\"path\":\"C:/Users/Slava/.gemini/antigravity/scratch/volt-giessen-website/assets/Whalprogramme/wahlprogramm/cluster1_nachhaltige-region/themenblock1_wohnungsbau/thema_schwanenteich.md\"},{\"slug\":\"thema_seltersweg\",\"title\":\"Seltersweg – Leerstandsreaktivierung und Branchenmix-Steuerung\",\"cluster\":\"cluster1_nachhaltige-region\",\"clusterTitle\":\"Nachhaltige Region\",\"themenblock\":\"themenblock1_wohnungsbau\",\"themenblockTitle\":\"Wohnungsbau\",\"tags\":[\"Wohnen-und-Stadtentwicklung\",\"Partizipation\"],\"links\":[\"thema_walltor\",\"thema_fruehkindliche-bildung\",\"thema_hochschulbildung\",\"thema_lebendige-innenstadt\",\"thema_kita-familienzentren\"],\"paragraph\":\"Der Seltersweg, Gießens Haupteinkaufsstraße, leidet unter strategischen Fehlentwicklungen und hohem Leerstand. Die Kita-Räume im Seltersweg 83-85 stehen seit Januar 2025 leer und kosten die Stadt monatliche Mietkosten in Höhe von 27.000 €. Weitere Großflächen (z.B. der ehemalige „The Sting\\\") werden nicht besetzt und können ihr Potenzial nicht entfalten. Der Fokus liegt auf reinem Einzelhandel statt Nutzungsmischung.\",\"massnahmen\":[\"Strikte Verträge mit Trägern – Freigabe nur bei tatsächlicher Nutzungsbereitschaft\",\"Fallback-Strategien gegen teure Leerstände (automatische Zwischennutzung statt Spekulation)\",\"Bestandsaufnahme: „The Sting\\\"-Gebäude und andere Großflächen kartieren und Umnutzungsoptionen entwickeln Phase 2: Mittelfristig – Branchenmix-Steuerung und Leerstandsreaktivierung\",\"BID-Leitbild aktualisieren: Wohnen, Bildung, Kultur explizit als Ziele verankern\",\"Gewerbe-Ansiedlung aktiv steuern (Anreize für Co-Working, Gastronomie mit Aufenthaltsqualität)\",\"The Sting und andere Großflächen umnutzen: z.B. als Markthalle mit regionalem Fokus oder als Räumlichkeiten der Universität (Co-Working, Bibliothek, studentisches Wohnen, Kulturräume) Phase 3: Nachhaltige Zukunft – Multifunktionale Innenstadt\",\"Stabile Mieten für Einzelhändler\",\"Pop-up-Formate für innovative Konzepte\",\"Wohnen, Bildung, Kultur als selbstverständlicher Teil einer lebendigen Innenstadt\",\"Sicherheit: LED-Beleuchtung, Waffenverbotszone, Streetwork (wie Walltor)\"],\"path\":\"C:/Users/Slava/.gemini/antigravity/scratch/volt-giessen-website/assets/Whalprogramme/wahlprogramm/cluster1_nachhaltige-region/themenblock1_wohnungsbau/thema_seltersweg.md\"},{\"slug\":\"thema_walltor\",\"title\":\"Innenstadt & Quartiere\",\"cluster\":\"cluster1_nachhaltige-region\",\"clusterTitle\":\"Nachhaltige Region\",\"themenblock\":\"themenblock1_wohnungsbau\",\"themenblockTitle\":\"Wohnungsbau\",\"tags\":[\"Wohnen-und-Stadtentwicklung\",\"Wirtschaftsförderung\",\"Kultur-und-Kreativität\",\"Soziale-Gerechtigkeit\"],\"links\":[\"thema_brandplatz\",\"thema_gesundheitsfoerderung-praevention\",\"thema_wirtschaftsfoerderung\",\"thema_lebendige-innenstadt\",\"thema_brandplatz-wirtschaft\",\"thema_ordnungspartnerschaft\"],\"paragraph\":\"Walltor-Quartier – Strategische Sanierung statt Abwärtsspirale\",\"massnahmen\":[\"Modernes LED-Beleuchtungskonzept mit Sichtachsen\",\"Public-Private-Partnership „Sauberes Quartier\\\": Gewerbetreibende (To-Go-Gastronomie) anteilig für Müllentsorgung verantwortlich Phase 2: Dauerhafte Präsenz – „Walltor-Kümmerer\\\"-Team\",\"Kommunaler Ordnungsdienst (fest für Walltor zuständig) – sichtbare, aber kommunikative Präsenz\",\"Professionelle Streetworker (Sozialarbeiter) für Drogenprävention und Hilfsangebote\",\"Runder Tisch Sicherheit: Regelmäßiger Austausch zwischen Polizei, Ordnungsamt, Sozialdiensten, Anwohnern, Gewerbetreibenden\",\"Aktives Quartiersmanagement (Vollzeitstelle) als zentrale Koordination\",\"Proaktive Gewerbeansiedlung: gezielt vielfältige Branchen (Handwerk, Kultur, Co-Working, inhabergeführte Gastronomie)\",\"Pop-up-Stores und Kulturveranstaltungen\",\"Wochenmarkt-Extension vom Brandplatz über Lindenplatz bis über den Marktplatz\"],\"path\":\"C:/Users/Slava/.gemini/antigravity/scratch/volt-giessen-website/assets/Whalprogramme/wahlprogramm/cluster1_nachhaltige-region/themenblock1_wohnungsbau/thema_walltor.md\"},{\"slug\":\"thema_wohnen-soziale-mischung\",\"title\":\"Wohnen & Soziale Mischung\",\"cluster\":\"cluster1_nachhaltige-region\",\"clusterTitle\":\"Nachhaltige Region\",\"themenblock\":\"themenblock1_wohnungsbau\",\"themenblockTitle\":\"Wohnungsbau\",\"tags\":[\"Wohnen-und-Stadtentwicklung\",\"Soziale-Gerechtigkeit\",\"Innovation\",\"Klimaschutz\"],\"links\":[\"thema_kuehlachsen\",\"thema_walltor\",\"thema_brandplatz\",\"thema_elefantenklo\",\"thema_digitaler-bauantrag-bim\",\"thema_klimaresilienz\",\"thema_fruehkindliche-bildung\",\"thema_schulbildung\",\"thema_pflege-alter\",\"thema_brandplatz-wirtschaft\",\"thema_kinderarmut-praeventionsketten\",\"thema_kita-familienzentren\"],\"paragraph\":\"Gießens Wohnungsmarkt braucht mehr bezahlbaren Wohnraum – aber nicht durch eine einzige Akteurin oder ein einziges Modell, sondern durch vielfältige gemeinwohlorientierte Ansätze. Während die Wohnbau Gießen GmbH mit 179 Wohnungen im Bau (Philosophenhöhe, Weserstraße, Am alten Flughafen) zeigt, dass kommunaler Wohnungsbau möglich ist, reicht dies allein nicht aus. Neubau allein ist ineffizient: Zwischen 2009–2019 verdoppelte sich der Neubau in Deutschland, doch Mieten explodierten parallel. Gleichzeitig droht Gentrifizierung bei großen Neubaugebieten wie dem Flussstraßenviertel (Stadt Gießen: 25,6% Kinderarmut) ohne Steuerungsinstrumente.\",\"massnahmen\":[\"Alle städtischen Grundstücke (Flussstraßenviertel, Gail-Areal) an bestes Konzept, nicht an Meistbietende\",\"Bewertungskriterien: Mindestens 30% Sozialwohnungen, Gemeinwohlorientierung (Genossenschaft/Mietshäuser-Syndikat/Baugemeinschaft), Energiestandards, soziale Infrastruktur (Kita, Co-Working, Reparaturcafé), Dauerhaftigkeit (Belegungsbindung/Selbstverwaltung)\",\"Offenheit für alle Rechtsformen: Kommunal, genossenschaftlich, privatwirtschaftlich – entscheidend ist das Konzept\",\"Vorbild: Tübingen Französisches Viertel: 25% Baugemeinschaften, 20% Sozialwohnungen\",\"Gemeinwohlorientiertes Wohnen: Mietshäuser-Syndikat (selbstverwaltete, bezahlbare Mieten dauerhaft), Genossenschaften, Baugemeinschaften, Wohnbau Gießen als Partnerin\",\"15-Minuten-Quartier: Kita, Schule, Arzt, Einkaufen fußläufig – Gießen hat beste Voraussetzungen\",\"Mobilität & Integration: Car-/Bikesharing, Lastenrad-Verleih, Repair-Café, Urban Gardening (interkulturell), Co-Working\",\"Finanzierung: KfW-Genossenschaftsförderung, Städtebauförderung, EFRE, Solidarfonds Mietshäuser-Syndikat\",\"Hessisches Potenzial: 31.541 zusätzliche Wohnungen durch Aufstockung/Dachausbau (realistisch aktivierbar)\",\"Systematische Erfassung geeigneter Mehrfamilienhäuser + vereinfachte Genehmigungen in Holzrahmenbauweise\",\"KfW-Förderung: Bis zu 30% Zuschuss für Sanierung + Aufstockung\",\"Energievorteil: Überbauung reduziert Energiebedarf darunter liegender Wohnungen um bis zu 50%\",\"Alle Akteure: Kommunale Bestände, Genossenschaften, private Vermieter, Eigentümergemeinschaften einbinden\",\"Kommunale Beratungsstelle + professionelle Koordination (Erfolgsfaktor: Dauerhaftfinanzierung!)\",\"Modell Köln: 1.000+ Wohnpartnerschaften seit 2009 (ältere Menschen + Studierende/Familien/Menschen mit Behinderung)\",\"Faustregel: 1 m² Wohnraum = 1 Stunde Hilfe/Monat (z.B. Einkaufen, Gartenarbeit, Kinderbetreuung – keine Pflegeleistungen)\",\"Effekt: Generationenübergreifend, Einsamkeit bekämpfen, günstigen Wohnraum schaffen, Nebenkosten Mietende\",\"Kommunale Beratungsstelle für Genossenschaftsgründung + Mietshäuser-Syndikat\",\"Städtische Bürgschaften für Finanzierung\",\"Bevorzugte Konzeptvergabe (alle gleichberechtigt)\",\"Vorbild: Freiburg Dietenbach: 50% Sozialwohnungen, Mietshäuser-Syndikat + Genossenschaften integriert\"],\"path\":\"C:/Users/Slava/.gemini/antigravity/scratch/volt-giessen-website/assets/Whalprogramme/wahlprogramm/cluster1_nachhaltige-region/themenblock1_wohnungsbau/thema_wohnen-soziale-mischung.md\"},{\"slug\":\"thema_ehrenamt-mobilitaet\",\"title\":\"Ehrenamt und Mobilität – Kostenfreier ÖPNV als Anerkennung\",\"cluster\":\"cluster1_nachhaltige-region\",\"clusterTitle\":\"Nachhaltige Region\",\"themenblock\":\"themenblock2_verkehr\",\"themenblockTitle\":\"Verkehr\",\"tags\":[\"Verkehrswende\",\"Soziale-Gerechtigkeit\",\"Partizipation\"],\"links\":[\"thema_oepnv\",\"thema_notfallversorgung\",\"thema_brandschutz\"],\"paragraph\":\"Freiwillige Feuerwehrkräfte, THW-Mitglieder, Rettungsdienstpersonal – sie riskieren ihre Gesundheit für die Gemeinschaft. Gleichzeitig zeigen die Debatten im Stadtparlament: Wertschätzung muss praxistauglich sein und an den Bedarfen der Ehrenamtlichen ausgerichtet werden. Viele sind für Einsätze auf das Auto angewiesen, andere hätten im Alltag einen echten Gewinn durch ein ÖPNV-Angebot. Auch Auszubildende in Freiwilligendiensten (FSJ, FÖJ, BFD) verfügen oft nur über ein geringes Einkommen und können sich ÖPNV-Tickets kaum leisten. Hier braucht es Lösungen, die gemeinsam mit den Betroffenen entwickelt werden und wirklich ankommen.\",\"massnahmen\":[\"Dialog mit den Ehrenamtlichen & kostenfreie SWG-Tickets als Pilotprojekt Vor der Einführung neuer Angebote werden Freiwillige Feuerwehr, THW, Rettungsdienste und ihre Vertretungen systematisch beteiligt: Die Stadt fragt ausdrücklich, ob kostenfreie bzw. vergünstigte ÖPNV-Nutzung, höhere Aufwandsentschädigungen oder andere Formen der Unterstützung als sinnvollste Anerkennung gesehen werden. Auf dieser Basis startet ein Pilotprojekt: Aktive Mitglieder der Freiwilligen Feuerwehr können auf Wunsch kostenlos auf SWG-Bussen fahren. Der Nachweis erfolgt über den Mitgliedsausweis und ein digitales Ticket in der SWG-App. Die Stadt Gießen würdigt damit das Ehrenamt konkret, sichtbar und bedarfsorientiert – ergänzend zu guter Ausstattung, Ausbildung und Infrastruktur.\",\"Ausweitung auf weitere Gruppen (2027–2031) Auf Grundlage der Evaluation des Pilotprojekts wird das Angebot schrittweise ausgebaut: THW-Mitglieder erhalten kostenlose Tickets, Rettungsdienste und Notfallseelsorge werden einbezogen, für Freiwilligendienste (FSJ, FÖJ, BFD) werden vergünstigte RMV-Jahrestickets bereitgestellt. Langfristig wird mit dem Landkreis koordiniert, damit auch Buslinien im Umland einbezogen werden und Ehrenamtliche dort kostenfrei oder stark vergünstigt fahren können.\",\"Ehrenamtskarte Plus Hessen – Forderung an die Landesebene Volt unterstützt die Forderung nach einer landesweit gültigen „Ehrenamtskarte Plus\\\" mit integriertem ÖPNV-Bonus in allen Verkehrsverbünden (RMV, NVV, VRR). Das Ziel: Eine Karte, überall gültig, unbürokratisch. Best-Practice-Beispiele zeigen, dass das funktioniert – etwa Kommunen wie Ansbach (Bayern), die kostenfreie Busfahrten für Ehrenamtliche testen.\",\"Integration mit der Mobilitäts-App Die geplante regionale Mobilitäts-App erkennt Ehrenamtliche nach einmaliger, datensparsamer Registrierung über die jeweilige Organisation oder den Verein automatisch an. So werden kostenfreie oder vergünstigte Tickets digital, niedrigschwellig und ohne Papierkram bereitgestellt.\",\"Verbindung zur RegioTram Wenn die RegioTram realisiert wird, gilt: Kostenfreie oder vergünstigte Tickets auch dort für alle anerkannten Ehrenamtlichen. Das ist kein unverbindlicher Wunsch, sondern eine klare politische Forderung an Bund, Land und RMV, Mobilität und Ehrenamt konsequent zusammenzudenken.\"],\"path\":\"C:/Users/Slava/.gemini/antigravity/scratch/volt-giessen-website/assets/Whalprogramme/wahlprogramm/cluster1_nachhaltige-region/themenblock2_verkehr/thema_ehrenamt-mobilitaet.md\"},{\"slug\":\"thema_mobility-hubs\",\"title\":\"Mobility-Hubs – Knotenpunkte der 15Minuten-Stadt\",\"cluster\":\"cluster1_nachhaltige-region\",\"clusterTitle\":\"Nachhaltige Region\",\"themenblock\":\"themenblock2_verkehr\",\"themenblockTitle\":\"Verkehr\",\"tags\":[\"Verkehrswende\",\"Soziale-Gerechtigkeit\",\"Partizipation\"],\"links\":[\"thema_oepnv\",\"thema_radverkehr\",\"thema_parkraum\",\"thema_schulbildung\",\"thema_hochschulbildung\",\"thema_lebendige-innenstadt\"],\"paragraph\":\"Gießen hat einzelne Mobilitätsangebote – NextBike-Stationen an der Uni, Hochschule und vielen innerstädtischen Orten zeigen, dass Infrastruktur vorhanden ist. Doch es gibt keine vernünftig integrierten Angebote zur Weiterreise in einer Komplettlösung. Wer mit dem Zug ankommt, findet zwar ein Leihrad, aber keine Garantie auf einen Parkplatz danach, kein Car-Sharing für die letzte Meile, keine App, die alle Optionen zusammendenkt. Busse, Bahn, Rad und Auto sind separate Welten – wer umsteigen will, muss mehrere Apps öffnen, mehrere Tickets kaufen, mehrere Infrastrukturen suchen. Zudem überfordert das Ullner Dreieck – ein Verkehrsengpass – die vorhandene Infrastruktur. Ein dezentralisiertes Mobility-Hub-Netzwerk könnte diesen Knoten entlasten, indem es Menschen bereits im Umland zum Umstieg bewegt, statt dass alle ins Auto steigen. Multimodale Mobilität gelingt nur, wenn die nötige Infrastruktur nicht nur vorhanden ist, sondern auch nahtlos ineinandergreift – und das Auto nicht die attraktivste Alternative bleibt.\",\"massnahmen\":[\"150 sichere Fahrradabstellplätze (überdacht)\",\"Reparaturwerkstatt\",\"Bike-Sharing (Anbindung NextBike oder ähnliche Systeme)\",\"Car-Sharing-Zone\",\"Warteanlage mit Fahrgastinformation\",\"E-Ladesäulen (Autos und E-Bikes)\",\"Service-Center: Beratung zu Ticketing, Routen, Mobilitätsbudgets. (Digital und analog zusammen) Nach erfolgreicher Realisierung des Pilot-Hubs entstehen weitere Hubs an strategischen Orten (z.B. Hauptbahnhof, Westanlage, Licher Straße) – Standorte und Umfang werden aus den Erkenntnissen des Pilot-Hubs abgeleitet. Eine zentrale App für Gießen und das Umland, die bestehende Angebote wie NextBike zum ersten Mal nahtlos verbindet:\",\"Routenplanung (Auto, Rad, ÖPNV, zu Fuß, Kombinationen)\",\"Echtzeit-Fahrgastinformation und Alternativrouten\",\"Ticketing (alle Verkehrsmittel in einer App)\",\"Live-Status von Hub-Services (Parkplätze, E-Ladestationen, Fahrrad-Verfügbarkeit, NextBike-Stationen)\",\"Integration mit Mobilitätsbudgets. Diese App macht erstmals aus Einzelangeboten eine echte Alternative zum Auto. Entwicklung zusammen mit RMV, Stadtwerken Gießen und der Uni Gießen.\"],\"path\":\"C:/Users/Slava/.gemini/antigravity/scratch/volt-giessen-website/assets/Whalprogramme/wahlprogramm/cluster1_nachhaltige-region/themenblock2_verkehr/thema_mobility-hubs.md\"},{\"slug\":\"thema_oepnv\",\"title\":\"ÖPNVZuverlässigkeit als Voraussetzung der Verkehrswende\",\"cluster\":\"cluster1_nachhaltige-region\",\"clusterTitle\":\"Nachhaltige Region\",\"themenblock\":\"themenblock2_verkehr\",\"themenblockTitle\":\"Verkehr\",\"tags\":[\"Digitalisierung\",\"Soziale-Gerechtigkeit\",\"Transparenz\",\"Klimaschutz\"],\"links\":[\"thema_radverkehr\",\"thema_sportfoerderung\",\"thema_digitale-infrastruktur\",\"thema_livestream-stadtverordnetenversammlung\",\"thema_europaeische-identitaet\"],\"paragraph\":\"Die aktuelle Situation ist für eine Hochschul- und Pendeldenstadt wie Gießen nicht hinnehmbar: Auf der RB46 (Lahn-Kinzig-Bahn) erleben Pendelnde regelmäßig Ausfälle, weil Stellwerke – etwa in Hungen – nicht besetzt werden können. Die Hessische Landesbahn (HLB) kämpft mit Personalengpässen, überalterter Stellwerkstechnik und unzureichender Fahrgastinformation: Züge werden oft erst am Tag selbst gestrichen, Menschen fahren zu einer nicht existierenden Verbindung, stehen im Regen und kommen zu spät zur Arbeit, zur Uni oder nach Hause. Die Folgen sind Frust, Wochenendausfälle über Wochen hinweg, Schienenersatzverkehr ohne Fahrradmitnahme und lange Umwege zu Ersatzhaltestellen. Viele steigen deshalb wieder aufs Auto um – ein Rückschritt für Klima, Lebensqualität und soziale Gerechtigkeit. Für Studierende, Auszubildende und Menschen ohne Auto wird Mobilität zur Zumutung statt zur Teilhabechance.\",\"massnahmen\":[\"Anträge im RMV-Verwaltungsrat für Baden-Württemberg-ähnliche Qualitätsverträge\",\"Transparente KPIs: Pünktlichkeit, Ausfallquoten, Fahrgastzufriedenheit (monatliche Berichte)\",\"Qualitätsscouts, die unabhängig die Standards überwachen\",\"Eskalationsmechanismen: Bei wiederholten Mängeln sofortiger Wechsel des Betreibers Elektronische und digitale Stellwerke (ESTW/DSTW) benötigen weniger Personal vor Ort, sind zuverlässiger und lassen sich zentral überwachen. Für die Region Gießen ist der Umstieg auf digitale Technik entscheidend, um Personalengpässe zu entschärfen und Ausfälle zu vermeiden.\",\"eine gemeinsame Resolution in Stadtverordnetenversammlung und Kreistag beschließen an Bundesverkehrsminister, DB-Vorstand und Bundesnetzagentur\",\"Ausfälle systematisch dokumentiert, öffentlich macht und gemeinsam mit Initiativen wie Pro Bahn Hessen politischen Druck aufbaut\",\"im RMV auf eine priorisierte Umsetzung digitaler Stellwerke für die Zulaufstrecken nach Gießen drängt. Wenn Personal oder Infrastruktur knapp sind, ist ein reduzierter, aber verlässlicher Fahrplan besser als ein dichter Takt, der ständig ausfällt. Volt fordert, dass RMV und HLB für besonders störanfällige Zulaufstrecken nach Gießen Stabilisierungsfahrpläne vereinbaren, die klar kommuniziert werden: lieber ein Stunden‑Takt, der funktioniert, als ein halbstündlicher Takt mit ständigen Ausfällen.\",\"RMV und HLB vereinbaren Stabilisierungsfahrpläne für alle Strecken mit chronischem Personalmangel\",\"Diese sind transparent kommuniziert: „Wir fahren weniger, aber zuverlässig\\\"\",\"Lieber 1 Stunde Takt verlässlich als 30 Minuten mit 20% Ausfällen Fällt ein Zug aus, braucht es einen professionellen Mobilitätsservice statt eines Notbehelfs.\",\"eine verlässliche Fahrradmitnahme (z.B. Anhänger oder separate Radtransporte)\",\"zentrale, gut erreichbare SEV-Haltestellen im Stadtgebiet\",\"komfortable Busse mit Echtzeitinformation\",\"gesicherte Anschlüsse an Stadtbusse und weitere Linien.\"],\"path\":\"C:/Users/Slava/.gemini/antigravity/scratch/volt-giessen-website/assets/Whalprogramme/wahlprogramm/cluster1_nachhaltige-region/themenblock2_verkehr/thema_oepnv.md\"},{\"slug\":\"thema_parkraum\",\"title\":\"Parkraumbewirtschaftung – Sozial gerecht und klimafreundlich\",\"cluster\":\"cluster1_nachhaltige-region\",\"clusterTitle\":\"Nachhaltige Region\",\"themenblock\":\"themenblock2_verkehr\",\"themenblockTitle\":\"Verkehr\",\"tags\":[\"Verkehrswende\",\"Soziale-Gerechtigkeit\",\"Klimaschutz\",\"Finanzpolitik\"],\"links\":[\"thema_oepnv\",\"thema_radverkehr\",\"thema_mobility-hubs\",\"thema_finanzen\",\"thema_lebendige-innenstadt\"],\"paragraph\":\"Gießens Innenstadt ist voll mit parkenden Autos, die wertvollen öffentlichen Raum blockieren. Gleichzeitig sind die Parkgebühren der Bewohnerschaft derzeit bei 30 € bis 120 € pro Jahr – je nach Stadtteil. Das ist deutschlandweit eines der günstigsten Angebote. Manche fordern eine pauschale Erhöhung auf 240 €, um den Parkdruck zu reduzieren.\",\"massnahmen\":[\"Kleinwagen (<4m) → 60€\",\"Kompaktklasse (4 bis 4,5m) → 90€\",\"Mittelklasse (4,5 bis 5m) → 120€\",\"SUV/Van (>5m oder >1.800kg) → 240€\",\"Alternative Antriebe → -30€ Die Stadt erhebt reguläre Parkgebühren (nach Größe), gibt aber 50% zurück an Menschen mit nachgewiesener Bedürftigkeit.\",\"Wohngeldempfangende\",\"Bürgergeld-Beziehende\",\"Sozialpass-Inhabende\",\"BAföG-Empfangende\",\"Finanzierung aus städtischem Haushalt (Ehrenamtsförderung + ÖPNV-Klimabudget)\",\"Rechtlich abgesichert: Keine direkte Staffelung (Bundesrecht), sondern nachträgliche Rückerstattung\",\"RMV-Jahresticket kostet normal ~700 €\",\"Mit Verzicht auf Parkausweis: 450 € (Ersparnis 250 €)\",\"Zusätzlich: 100 € Car-Sharing-Guthaben (Book-n-Drive, Stadtmobil)\",\"Oder: Deutschlandticket-Besitzende fahren kostenlos auf Park+Ride-Plätzen (Freiburger Modell)\",\"Erstes Auto: Reguläre Gebühr (60-240 €)\",\"Zweites Auto: +100% (z.B. 120 € → 240 €)\",\"Drittes Auto: +200% (z.B. 120 € → 360 €) 2. Radinfrastruktur: Radwegenetze, Raststationen (25%) 3. Mobility-Hubs: Car-Sharing, E-Ladestationen, sichere Fahrradabstellplätze (20%) 4. Soziale Abfederung: Rückerstattungen für Geringverdienende (10%) 5. Quartiersgaragen: Am Stadtrand mit ÖPNV-Anbindung (5%)\"],\"path\":\"C:/Users/Slava/.gemini/antigravity/scratch/volt-giessen-website/assets/Whalprogramme/wahlprogramm/cluster1_nachhaltige-region/themenblock2_verkehr/thema_parkraum.md\"},{\"slug\":\"thema_radverkehr\",\"title\":\"Radverkehr als Rückgrat der Mobilität\",\"cluster\":\"cluster1_nachhaltige-region\",\"clusterTitle\":\"Nachhaltige Region\",\"themenblock\":\"themenblock2_verkehr\",\"themenblockTitle\":\"Verkehr\",\"tags\":[\"Verkehrswende\",\"Klimaschutz\",\"Klimaresilienz\",\"Gesundheit\",\"Barrierefreiheit\",\"Sicherheit\"],\"links\":[\"thema_mobility-hubs\",\"thema_klimaresilienz\",\"thema_energieverbrauch\",\"thema_sportfoerderung\",\"thema_gesundheitsfoerderung-praevention\",\"thema_lebendige-innenstadt\"],\"paragraph\":\"Gießen ist eine Fahrradstadt in der Theorie, aber in der Praxis fehlen sichere, durchgehende Verbindungen. Wer von außerhalb per Rad zum Bahnhof Gießen fahren will, muss Angst vor Autos haben. Es gibt Inseln von sauberer Infrastruktur, aber keine durchgehenden, sicheren Radwegeketten von der Stadt ins Umland. Zudem sind Gießens Fahrradwege nicht durchgehend barrierefrei – Bordsteine ohne Absenkung, schlechte Beleuchtung, fehlende Rastplätze und E-Bike-Ladestationen. Für ältere Menschen, Menschen mit Behinderungen und Pendelnde mit Lasten wird Radverkehr damit unrealistisch. Das Ergebnis: Menschen steigen wieder ins Auto, obwohl sie gerne mit dem Rad fahren würden.\",\"massnahmen\":[\"Frankfurter Straße – Innenstadt (Leuchtturmprojekt)\",\"Schiffenberger Tal / Schiffenberger Weg – Innenstadt (direkte Anbindung an den Mobility Hub Erdkauter Weg)\",\"Marburger Straße – Innenstadt\",\"Wiesecker Weg\",\"Grünberger Straße – Innenstadt\",\"Licher Straße – Innenstadt\",\"Mindestbreite von 3,0–3,5 m, physisch vom Autoverkehr getrennt\",\"Umgestaltung der Fahrbahnquerschnitte für alle städtischen Verkehrsteilnehmenden\",\"Grünstreifen und Baumpflanzungen zur Hitzeminderung und Wasserspeicherung\",\"durchgehende, energiesparende Beleuchtung\",\"barrierefreie Übergänge zu Haltestellen und wichtigen Querungen\",\"kleinere Rastpunkte (Sitzgelegenheiten, Anlehnbügel) entlang der Achsen. Neben starken innerstädtischen Achsen braucht es verlässliche, sichere Radverbindungen in die Nachbargemeinden. Gießen soll dabei der Knoten eines regionalen Netzes werden, das gemeinsam mit den Kommunen im Umland sowie dem direkt angrenzenden Lahn-Dill-Kreis und der Stadt Wetzlar geplant und über Förderprogramme finanziert wird.\",\"sichere Radverbindungen aus Richtung der angrenzenden Kommunen nach Gießen\",\"Anbindung von Ortsteilen an die Gießener Zubringer-Achsen\",\"durchgängige, einheitlich beschilderte Routen mit klaren Wegweisern und Beleuchtung\",\"Bike+Ride-Angebote an Bahnhöfen und wichtigen Umsteigepunkten (überdachte Stellplätze, ggf. Radboxen). Fahrgästen/Jahr Radverkehrspolitik muss alle Menschen mitdenken, nicht nur sportliche Radfahrende.\",\"Glatte, rutschfeste Oberflächen, gut befahrbar für Rollstühle, Handbikes und Lastenräder\",\"Abgesenkte Bordsteine und klare Querungshilfen an allen wichtigen Knotenpunkten\",\"Raststationen etwa alle fünf Kilometer an zentralen Routen mit E‑Bike-Ladestationen (mindestens vier Ladepunkte), Basis‑Reparaturausstattung (Pumpe, Werkzeug), Trinkwasserspendern, Sitzplätzen im Schatten, sicheren Fahrradabstellanlagen\",\"Durchgehende Beleuchtung und taktile Elemente, wo es sinnvoll ist, für mehr Sicherheit und Orientierung\"],\"path\":\"C:/Users/Slava/.gemini/antigravity/scratch/volt-giessen-website/assets/Whalprogramme/wahlprogramm/cluster1_nachhaltige-region/themenblock2_verkehr/thema_radverkehr.md\"},{\"slug\":\"thema_biodiversitaet\",\"title\":\"Biodiversität\",\"cluster\":\"cluster1_nachhaltige-region\",\"clusterTitle\":\"Nachhaltige Region\",\"themenblock\":\"themenblock3_klima-energie\",\"themenblockTitle\":\"Klima Energie\",\"tags\":[\"Biodiversität\",\"Transparenz\",\"Innovation\",\"Partizipation\"],\"links\":[\"thema_klimaresilienz\",\"thema_pflege-alter\",\"thema_gesamtstrategie\"],\"paragraph\":\"Der Schutz und die Förderung der Biodiversität sind zentrale Aufgaben kommunaler Politik. In einer dicht bebauten Stadt wie Gießen stehen Grünflächen, Gewässer und Wälder unter besonderem Druck. Gleichzeitig kommt der Stadt eine wichtige Vorbildfunktion zu: durch die Gestaltung und Pflege öffentlicher Flächen, durch planerische Entscheidungen und durch die Einbindung der Stadtgesellschaft. Volt setzt sich dafür ein, Biodiversität als Querschnittsaufgabe in der Stadtentwicklung zu verankern und vorhandene Lebensräume zu sichern, zu vernetzen und nachhaltig zu stärken.\",\"massnahmen\":[\"Entwicklung und regelmäßige Fortschreibung einer kommunalen Biodiversitätsstrategie auf Grundlage der Hessischen Biodiversitätsstrategie\",\"Aufbau eines regelmäßigen Überwachung des Zustands der Artenvielfalt, einschließlich der Erfassung invasiver Tier- und Pflanzenarten\"],\"path\":\"C:/Users/Slava/.gemini/antigravity/scratch/volt-giessen-website/assets/Whalprogramme/wahlprogramm/cluster1_nachhaltige-region/themenblock3_klima-energie/thema_biodiversitaet.md\"},{\"slug\":\"thema_energieverbrauch\",\"title\":\"Innovativer Energieverbrauch\",\"cluster\":\"cluster1_nachhaltige-region\",\"clusterTitle\":\"Nachhaltige Region\",\"themenblock\":\"themenblock3_klima-energie\",\"themenblockTitle\":\"Klima Energie\",\"tags\":[\"Klimaschutz\",\"Digitalisierung\",\"Innovation\"],\"links\":[\"thema_stromerzeugung\"],\"paragraph\":\"Die Stadt Gießen hat grundsätzlich die gleiche Situation wie in ganz Deutschland, dass Stromzähler weitestgehend nicht digitalisiert sind und Verbräuche nicht alle Viertelstunde online übertragen werden können. Neben dem Ausbau von Speichern und Stromerzeugern, die auf wenig Wind und Sonne optimiert sind, ist der dynamische Verbrauch ein besonderes Mittel, um erneuerbare Energien optimal zu nutzen und sich unabhängig von fossilen Brennstoffen zu machen.\",\"massnahmen\":[\"Die Hürden zum Umstieg auf dynamische Stromtarife nehmen, indem die Kosten der Anschaffung und Installation von intelligenten Messsystemen (iMSys) übernommen werden. iMSys beinhalten nicht nur einen digitalen Stromzähler, sondern auch ein Kommunikationsmodul. Durch die Anschaffung vieler iMSys Systeme können diese vergünstigt gekauft werden.\",\"Verbraucher netzdienlich steuern, um so Spitzen im Netz zu regulieren und den Strompreis für Verbrauchende zu senken. Dazu sollen iMSys Geräte proaktiv Kunden angeboten werden, die eine steuerbare Einrichtung (z.B. Wallbox zum Laden des Autos oder eine Wärmepumpe) anmelden.\",\"Förderung von Stromspeichern und bidirektionalen Wallboxen, um bei Dunkelflauten in Zukunft mehr Stromreserven zu haben.\"],\"path\":\"C:/Users/Slava/.gemini/antigravity/scratch/volt-giessen-website/assets/Whalprogramme/wahlprogramm/cluster1_nachhaltige-region/themenblock3_klima-energie/thema_energieverbrauch.md\"},{\"slug\":\"thema_klimaneutral-2035\",\"title\":\"Klimaneutral bis 2035\",\"cluster\":\"cluster1_nachhaltige-region\",\"clusterTitle\":\"Nachhaltige Region\",\"themenblock\":\"themenblock3_klima-energie\",\"themenblockTitle\":\"Klima Energie\",\"tags\":[\"Klimaschutz\",\"Transparenz\",\"Finanzpolitik\",\"Soziale-Gerechtigkeit\"],\"links\":[\"thema_finanzen\",\"thema_livestream-stadtverordnetenversammlung\"],\"paragraph\":\"Die Stadt Gießen hat mit dem Beschluss der Stadtverordnetenversammlung bereits den Antrag von 2035null.de Gießen Klimaneutral in 2019 angenommen. Bei aktueller Geschwindigkeit der Reduktion der Treibhausgas-Emissionen ist das Ziel, die Klimaneutralität bis zum Jahr 2035 zu erreichen, ist auch laut Klimaschutz- und Energiebericht 2024 der Stadt Gießen (siehe 3.3 Zwischenfazit und Pfad zur Klimaneutralität) nicht realistisch.\",\"massnahmen\":[\"Klimawirkungsprüfung, um die Auswirkungen auf unser Klima immer zu berücksichtigen: Politische Entscheidungen unterliegen verpflichtenden Prüfungen, um negative Auswirkungen auf das Klima frühzeitig zu verhindern. Entsprechend ist auch in unserem Wahlprogramm Klimaschutz in allen Themen berücksichtigt worden, siehe dazu auch Kapitel, die mit Klimaschutz markiert wurden.\",\"Ab 2035 dürfen keine fossilen Energieträger in kommunalen Ver- und Entsorgungsanlagen mehr eingesetzt werden und neue Anlagen mit ausschließlich klimaneutralen Energieträgern nutzen.\",\"Beitritt zu Initiativen wie klimabuendnis.org, localZero.net, klimaweg.net und european-energy-award.org.\",\"Ressourcen effizienter nutzen ○ Senkung des spezifischen Trinkwasserverbrauchs durch Tarifstaffelung nach Verbrauch ○ Stromsparwissen verbreiten, wie bereits mit Stromspar check der ZAUG gGmbH ○ Abwasser mit neuester Ozonierung und Aktivkohlefiltration wie in Ried (Hessen) reinigen, um Gewässer zu schützen\"],\"path\":\"C:/Users/Slava/.gemini/antigravity/scratch/volt-giessen-website/assets/Whalprogramme/wahlprogramm/cluster1_nachhaltige-region/themenblock3_klima-energie/thema_klimaneutral-2035.md\"},{\"slug\":\"thema_klimaresilienz\",\"title\":\"Klimaresilienz\",\"cluster\":\"cluster1_nachhaltige-region\",\"clusterTitle\":\"Nachhaltige Region\",\"themenblock\":\"themenblock3_klima-energie\",\"themenblockTitle\":\"Klima Energie\",\"tags\":[\"Klimaschutz\",\"Klimaresilienz\",\"Innovation\",\"Soziale-Gerechtigkeit\"],\"links\":[\"thema_kuehlachsen\",\"thema_schulbildung\",\"thema_hochschulbildung\",\"thema_gesundheitsfoerderung-praevention\",\"thema_finanzen\",\"thema_lebendige-innenstadt\"],\"paragraph\":\"Die Stadt Gießen hat bereits eine Karte namens CoolerStadtplan, der beispielsweise kühle Plätze und kostenlose Trinkwasser-Nachfüllstationen anzeigt. Zusätzlich fördert das Programm GrüneMitteGießen die Begrünung von Eigentum im Innenstadtbereich. Dennoch erleben wir bereits jetzt, wie sehr die Zunahme extremer und gefährlicher Wetterereignisse wie Starkregen, Überflutungen oder Dürren uns in der Stadt belastet. Diese wird sich in Zukunft noch weiter beschleunigen.\",\"massnahmen\":[\"Innovation durch Ausweitung der Kooperationen mit lokalen Hochschulen, die bereits eine beispiellose Begrünung wie am THM-Hochhaus C10 umsetzen und einen Masterkurs „Nachhaltiges Bauen\\\" anbieten, siehe dazu auch Klimaresiliente Stadtentwicklung, Kühlachsen-System, Schwammstadt-Pilotprojekt, Klimaangepasste Bebauung im Kapitel Stadtentwicklung.\",\"Programm zum Erhalt und zur Neupflanzung von klimaresistenten Bäumen, siehe dazu auch Wald- und Naturflächen konsequent schützen im Kapitel Wirtschaft.\",\"Hochwasserschutz ○ Neben technischen Anlagen steht die Renaturierung von Ufern im Vordergrund, um natürliche Rückhalteräume zu schaffen ○ Biber an der Wieseck schützen, da dadurch der Wasserhaushalt stabilisiert wird. ○ Netto Null Versiegelung, sodass für jede neue versiegelte Fläche eine andere Entsiegelt werden muss.\",\"Landesverbot zur Neuanlage von Schottergärten strikt umsetzen.\",\"Schutz vor Überhitzung neben Begrünung von Gebäuden und Straßen durch Hitzepräventionspläne, Ausweitung des Gießener \\\"Coolen Standplans\\\" und Förderung von innovativen Kühlgeräten wie z.B. die kalte Nahwärme.\"],\"path\":\"C:/Users/Slava/.gemini/antigravity/scratch/volt-giessen-website/assets/Whalprogramme/wahlprogramm/cluster1_nachhaltige-region/themenblock3_klima-energie/thema_klimaresilienz.md\"},{\"slug\":\"thema_stromerzeugung\",\"title\":\"Optimale Stromerzeugung\",\"cluster\":\"cluster1_nachhaltige-region\",\"clusterTitle\":\"Nachhaltige Region\",\"themenblock\":\"themenblock3_klima-energie\",\"themenblockTitle\":\"Klima Energie\",\"tags\":[\"Klimaschutz\",\"Innovation\",\"Wirtschaftsförderung\",\"Partizipation\"],\"links\":[\"thema_radverkehr\",\"thema_finanzen\",\"thema_wirtschaftsfoerderung\"],\"paragraph\":\"In Zukunft wird Gießen durch die Elektrifizierung von Wärme und Verkehr mehr Strom verbrauchen: Immer mehr elektrische Fahrzeuge und Wärmeerzeuger wie Großwärmepumpen sowie viele Wärmepumpen für einzelne Haushalte.\",\"massnahmen\":[\"Dass möglichst viele Flächen für Wind- und Solarenergie zur Verfügung stehen. Die Kommune sollte Flächen bereitstellen (z.B. Vorranggebiete & Agri-PV in Bebauungsplan), Netzanschlusskapazitäten für PV-Vorranggebiete, Dächer von öffentlichen Gebäuden selbst nutzen oder verpachten, und auch vertikale Flächen wie beispielsweise Lärmschutzwände für PV-Anlagen freigeben – selbst Fahrrad- und Gehwege sind Flächen, die für Photovoltaik genutzt werden können.\",\"Dass die Bürgerschaft ein Vorkaufsrecht an Anteilen der erneuerbaren Energie-Projekte haben und hessische Förderung von Energiegenossenschaften ausgeschöpft werden\",\"Mieterstrom: Dass mehr Mietende Strom vom eigenen Dach beziehen können. Projekte ähnlich dem \\\"FlexQuatier\\\" auf der Philosophenhöhe/Weserstraße sollen umgesetzt werden.\",\"Netzentgelte reduzieren für die Nutzung von lokal erzeugtem Strom, da dieser auch weniger Last auf das Stromnetz verursacht.\"],\"path\":\"C:/Users/Slava/.gemini/antigravity/scratch/volt-giessen-website/assets/Whalprogramme/wahlprogramm/cluster1_nachhaltige-region/themenblock3_klima-energie/thema_stromerzeugung.md\"},{\"slug\":\"thema_waerme-kaelte\",\"title\":\"Wärme- und Kälteversorgung\",\"cluster\":\"cluster1_nachhaltige-region\",\"clusterTitle\":\"Nachhaltige Region\",\"themenblock\":\"themenblock3_klima-energie\",\"themenblockTitle\":\"Klima Energie\",\"tags\":[\"Klimaschutz\",\"Klimaresilienz\",\"Innovation\",\"Gesundheit\"],\"links\":[\"thema_kuehlachsen\",\"thema_klimaneutral-2035\",\"thema_klimaresilienz\",\"thema_stromerzeugung\",\"thema_regionale-wertschoepfung\"],\"paragraph\":\"In der Stadt Gießen und im Landkreis erleben wir die Energiewende bereits als Chance: Die Stadt Pohlheim hat eine Photovoltaik-Strategie und geht damit aktiv die Stromwende an. Die Stadtwerke Gießen (SWG) bringen die Wärmewende voran, indem sie das Fernwärmenetz in der Stadt ausbauen. Über das Stromnetz der Oberhessischen Versorgungsbetriebe wurde bereits die Ladeleistung eines Elektroautos verändert. Dieser erfolgreiche Versuch zeigt, wie in Zukunft unser Strom optimal genutzt werden kann. Die Elektrifizierung des Verkehrs (Verkehrswende) und der Wärme wird den Strombedarf erhöhen, da nur über Strom aus erneuerbaren Energiequellen unser Ziel der Klimaneutralität in der Stadt Gießen bis 2035 erreicht werden kann.\",\"massnahmen\":[\"Neue Wärmenetze bauen und Bestehende verdichten, da diese uns auf lokaler Ebene viel Flexibilität sowie durch Skaleneffekte Effizienz bieten und ohne weiteres Zutun von Eigentumsinhabenden und Vermietenden mit zukünftigen Innovationen betrieben werden können.\",\"Im Sommer überschüssige Energie in Form von warmem Wasser speichern. Solche Erdspeicher gibt es nicht nur in Dänemark, sondern auch in Bracht (Rauschenberg). Wie in Bracht soll die Stadt Gießen Genossenschaftsanteile, die Anschlussrechte ans Wärmenetz beinhalten, kaufen und dann mit Ihren Grundstücken weiterverkaufen.\",\"Öffentliche Gebäude standardmäßig an Wärmenetze anschließen.\"],\"path\":\"C:/Users/Slava/.gemini/antigravity/scratch/volt-giessen-website/assets/Whalprogramme/wahlprogramm/cluster1_nachhaltige-region/themenblock3_klima-energie/thema_waerme-kaelte.md\"},{\"slug\":\"thema_hundesteuer-tierheim\",\"title\":\"Hundesteuer für Tierheim-Hunde aussetzen\",\"cluster\":\"cluster1_nachhaltige-region\",\"clusterTitle\":\"Nachhaltige Region\",\"themenblock\":\"themenblock4_tierschutz\",\"themenblockTitle\":\"Tierschutz\",\"tags\":[\"Tierschutz\",\"Soziale-Gerechtigkeit\",\"Finanzpolitik\"],\"links\":[\"thema_tierheime\",\"thema_finanzen\"],\"paragraph\":\"Tierheime bemühen sich intensiv, Hunde in gute Hände zu vermitteln. Potenzielle Adoptionswillige schrecken jedoch oft vor den laufenden Kosten zurück, zu denen auch die Hundesteuer gehört. Diese finanzielle Hürde erschwert die Vermittlung und führt dazu, dass Hunde länger im Tierheim verbleiben. Eine Steuerbefreiung für Tierheim-Hunde würde die Adoption erleichtern, Tierheime entlasten und gleichzeitig ein positives Signal für Tierschutz setzen.\",\"massnahmen\":[],\"path\":\"C:/Users/Slava/.gemini/antigravity/scratch/volt-giessen-website/assets/Whalprogramme/wahlprogramm/cluster1_nachhaltige-region/themenblock4_tierschutz/thema_hundesteuer-tierheim.md\"},{\"slug\":\"thema_igelschutz\",\"title\":\"Igelschutz und Regulierung von Mährobotern\",\"cluster\":\"cluster1_nachhaltige-region\",\"clusterTitle\":\"Nachhaltige Region\",\"themenblock\":\"themenblock4_tierschutz\",\"themenblockTitle\":\"Tierschutz\",\"tags\":[\"Tierschutz\",\"Biodiversität\",\"Klimaschutz\"],\"links\":[\"thema_biodiversitaet\",\"thema_wildtier-vogelschutz\"],\"paragraph\":\"Tausende Igel sterben jährlich durch Mähroboter in der Dämmerung; zudem fehlt es an Durchgängen in modernen Zäunen.\",\"massnahmen\":[\"Betriebsverbot: Allgemeinverfügung zum Verbot von Mährobotern zwischen Sonnenuntergang und Sonnenaufgang.\",\"\\\"Igelfreundliches Gießen\\\": Kampagne zur Förderung naturnaher Gärten, Totholzhaufen und \\\"Igeldurchlässen\\\" (13x13 cm) in Zäunen.\",\"Sicherung öffentlicher Bauten: Nachrüstung von Lichtschächten und Kellertreppen an städtischen Gebäuden gegen das Hineinstürzen von Wildtieren.\",\"Vorbildfunktion: Naturnahe Gestaltung kommunaler Flächen und Aufnahme von Schutzkriterien in städtebauliche Verträge.\"],\"path\":\"C:/Users/Slava/.gemini/antigravity/scratch/volt-giessen-website/assets/Whalprogramme/wahlprogramm/cluster1_nachhaltige-region/themenblock4_tierschutz/thema_igelschutz.md\"},{\"slug\":\"thema_katzenschutz\",\"title\":\"Katzenschutzverordnung\",\"cluster\":\"cluster1_nachhaltige-region\",\"clusterTitle\":\"Nachhaltige Region\",\"themenblock\":\"themenblock4_tierschutz\",\"themenblockTitle\":\"Tierschutz\",\"tags\":[\"Tierschutz\",\"Biodiversität\",\"Gesundheit\"],\"links\":[\"thema_biodiversitaet\",\"thema_tierheime\",\"thema_inklusive-sicherheit\"],\"paragraph\":\"Tausende freilebende Katzen leiden unter Krankheiten, Hunger und Parasiten. Die unkontrollierte Vermehrung ist die Hauptursache für dieses Elend. Ohne kommunale Steuerung wachsen die Populationen weiter an, was auch die Belastung für die Tierheime durch \\\"verwilderte\\\" Katzen kontinuierlich erhöht.\",\"massnahmen\":[\"Kennzeichnungs- & Registrierungspflicht: Verpflichtende Mikrochips und Datenbank-Registrierung für alle Freigängerkatzen.\",\"Kastrationspflicht: Einführung einer Kastrationspflicht für fortpflanzungsfähige Katzen mit Freigang (mit Ausnahmen für kontrollierte Zucht).\",\"Soziale Unterstützung: Bereitstellung von Kastrationsgutscheinen für einkommensschwache Tierhaltende und Unterstützung von Vereinen bei \\\"Trap-Neuter-Return\\\"-Programmen.\",\"Vollzug: Etablierung eines Kontrollsystems in Kooperation mit Ordnungs- und Veterinäramt inklusive regelmäßiger Evaluierung.\"],\"path\":\"C:/Users/Slava/.gemini/antigravity/scratch/volt-giessen-website/assets/Whalprogramme/wahlprogramm/cluster1_nachhaltige-region/themenblock4_tierschutz/thema_katzenschutz.md\"},{\"slug\":\"thema_pestizidfreie-gruenflaechen\",\"title\":\"Pestizidfreie kommunale Grünflächen\",\"cluster\":\"cluster1_nachhaltige-region\",\"clusterTitle\":\"Nachhaltige Region\",\"themenblock\":\"themenblock4_tierschutz\",\"themenblockTitle\":\"Tierschutz\",\"tags\":[\"Tierschutz\",\"Biodiversität\",\"Gesundheit\",\"Klimaschutz\"],\"links\":[\"thema_biodiversitaet\",\"thema_pflege-alter\",\"thema_regionale-landwirtschaft\"],\"paragraph\":\"Pestizide belasten das Ökosystem und tragen massiv zum Insekten- und Artenschwund bei.\",\"massnahmen\":[\"Pestizidverbot ab 2026: Verbindlicher Beschluss zum Verzicht auf Herbizide auf Plätzen, Friedhöfen und Grünanlagen.\",\"Ökologische Pflege: Umstellung auf mechanische und thermische Methoden sowie Einsatz von Bodendeckern zur Unkrautunterdrückung.\",\"Landwirtschaft: Integration von Pestizidverzicht in Pachtverträge für städtische landwirtschaftliche Flächen.\",\"Vernetzung: Beitritt zum Bündnis „Pestizidfreie Kommune\\\" zum Austausch über alternative Pflegemethoden.\"],\"path\":\"C:/Users/Slava/.gemini/antigravity/scratch/volt-giessen-website/assets/Whalprogramme/wahlprogramm/cluster1_nachhaltige-region/themenblock4_tierschutz/thema_pestizidfreie-gruenflaechen.md\"},{\"slug\":\"thema_stadttauben\",\"title\":\"Tierschutzgerechtes Stadttaubenmanagement\",\"cluster\":\"cluster1_nachhaltige-region\",\"clusterTitle\":\"Nachhaltige Region\",\"themenblock\":\"themenblock4_tierschutz\",\"themenblockTitle\":\"Tierschutz\",\"tags\":[\"Tierschutz\",\"Gesundheit\",\"Innovation\"],\"links\":[],\"paragraph\":\"Stadttauben werden oft als Ärgernis wahrgenommen. Herkömmliche Methoden wie Netze oder Spikes führen jedoch nur dazu, dass die Tiere unter Schmerzen verdrängt werden, ohne dass die Population sinkt. Stadttauben sind auf menschliche Hilfe angewiesene Nachfahren von Haustauben; ihr Hunger und ihre Krankheiten sind ein menschengemachtes Problem.\",\"massnahmen\":[\"Betreute Taubenschläge: Errichtung von Taubenschlägen an Hotspots zur artgerechten Versorgung und Reinigung durch geschultes Personal.\",\"Eiaustausch: Konsequente Populationskontrolle durch den Austausch echter Eier gegen Gipsattrappen.\",\"Verzicht auf Vergrämung: Vorrang für Ansiedlung in Taubenschlägen statt Netzen/Spikes an öffentlichen Gebäuden.\",\"Kooperation: Beteiligung von Hausverwaltungen an der Finanzierung und intensive Öffentlichkeitsarbeit gegen unkontrollierte Fütterung.\"],\"path\":\"C:/Users/Slava/.gemini/antigravity/scratch/volt-giessen-website/assets/Whalprogramme/wahlprogramm/cluster1_nachhaltige-region/themenblock4_tierschutz/thema_stadttauben.md\"},{\"slug\":\"thema_tierheime\",\"title\":\"Finanzielle Unterstützung von Tierheimen und Tierschutzvereinen\",\"cluster\":\"cluster1_nachhaltige-region\",\"clusterTitle\":\"Nachhaltige Region\",\"themenblock\":\"themenblock4_tierschutz\",\"themenblockTitle\":\"Tierschutz\",\"tags\":[\"Tierschutz\",\"Finanzpolitik\",\"Partizipation\"],\"links\":[\"thema_finanzen\",\"thema_gefluechtete-unterbringung\"],\"paragraph\":\"Tierheime leisten einen unverzichtbaren Beitrag zur öffentlichen Sicherheit, arbeiten aber oft am Rande ihrer finanziellen Kapazitäten, da Fundtierkostenerstattungen selten deckend sind.\",\"massnahmen\":[\"Fundtierpauschale: Einführung einer Pauschale von ca. 1 Euro pro Einwohnerin zur stabilen Grundfinanzierung.\",\"Kostendeckende Tagessätze: Erhöhung der Sätze unter Berücksichtigung tatsächlicher Personal-, Veterinär- und Unterbringungskosten.\",\"Investitions- & Projektförderung: Kommunale Mittel für bauliche Modernisierungen sowie für spezifische Aktionen wie Kastrationsprogramme.\",\"Planungssicherheit: Abschluss langfristiger Förderverträge (mind. 3 Jahre) und Förderung von Fachpersonal für die sozialpädagogische Begleitung bei Tiervermittlungen.\"],\"path\":\"C:/Users/Slava/.gemini/antigravity/scratch/volt-giessen-website/assets/Whalprogramme/wahlprogramm/cluster1_nachhaltige-region/themenblock4_tierschutz/thema_tierheime.md\"},{\"slug\":\"thema_wildtier-vogelschutz\",\"title\":\"Wildtier- und Vogelschutz im Siedlungsbereich\",\"cluster\":\"cluster1_nachhaltige-region\",\"clusterTitle\":\"Nachhaltige Region\",\"themenblock\":\"themenblock4_tierschutz\",\"themenblockTitle\":\"Tierschutz\",\"tags\":[\"Tierschutz\",\"Biodiversität\",\"Wohnen-und-Stadtentwicklung\"],\"links\":[\"thema_biodiversitaet\"],\"paragraph\":\"Gebäudebrüter wie Mauersegler oder Fledermäuse verlieren durch moderne, fugendichte Bauweisen zunehmend ihre Nistplätze.\",\"massnahmen\":[\"Artenschutz-Check: Verpflichtende Prüfung auf Nistplätze bei allen Sanierungsund Abbruchvorhaben.\",\"Ausgleichsquote: Schaffung von mindestens zwei neuen künstlichen Nisthilfen für jeden verlorenen Nistplatz.\",\"Kommunaler Standard: Integration von Niststeinen und Fledermausquartieren in alle städtischen Neubauten.\",\"Monitoring: Aufbau eines Nistkasten-Katasters und Unterstützung privater Bauherren durch Beratung und kostenlose Kästen.\",\"Privates Feuerwerk nicht gestatten, damit Tiere im Winter nicht aufgeschreckt werden und ihr Winterquartier nicht verlassen.\"],\"path\":\"C:/Users/Slava/.gemini/antigravity/scratch/volt-giessen-website/assets/Whalprogramme/wahlprogramm/cluster1_nachhaltige-region/themenblock4_tierschutz/thema_wildtier-vogelschutz.md\"},{\"slug\":\"thema_wildtierfreie-zirkusse\",\"title\":\"Wildtierfreie Zirkusse\",\"cluster\":\"cluster1_nachhaltige-region\",\"clusterTitle\":\"Nachhaltige Region\",\"themenblock\":\"themenblock4_tierschutz\",\"themenblockTitle\":\"Tierschutz\",\"tags\":[\"Tierschutz\",\"Biodiversität\",\"Transparenz\"],\"links\":[\"thema_katzenschutz\",\"thema_wildtier-vogelschutz\",\"thema_sportfoerderung\",\"thema_gefluechtete-unterbringung\"],\"paragraph\":\"Die Haltung von Wildtieren in Zirkussen steht seit Jahren in der Kritik, da artgerechte Unterbringung, ausreichende Bewegungsmöglichkeiten und tiergerechter Transport praktisch unmöglich sind. Elefanten, Großkatzen, Bären und andere Wildtiere leiden unter den beengten Verhältnissen, dem ständigen Transport und den unnatürlichen Lebensbedingungen. Die Stadt Gießen hat bereits im November 2016 einen Beschluss gefasst, keine städtischen Flächen mehr an Zirkusse mit Wildtieren zu vergeben. Dieser Beschluss muss konsequent umgesetzt und ggf. verstärkt werden.\",\"massnahmen\":[\"Striktes Verbot: Keine Vergabe städtischer Flächen an Zirkusse mit Wildtieren (Elefanten, Bären, Großkatzen etc.).\",\"Erweiterung: Prüfung der Verbotsliste um weitere sensible Arten (z.B. Robben) gemäß wissenschaftlicher Gutachten.\",\"Transparenz: Regelmäßige Berichterstattung über die Umsetzung des Beschlusses im zuständigen Ausschuss.\"],\"path\":\"C:/Users/Slava/.gemini/antigravity/scratch/volt-giessen-website/assets/Whalprogramme/wahlprogramm/cluster1_nachhaltige-region/themenblock4_tierschutz/thema_wildtierfreie-zirkusse.md\"},{\"slug\":\"thema_ausserschulische-bildung\",\"title\":\"Außerschulische Bildung, Sprachförderung und Integration\",\"cluster\":\"cluster2_bildung-gesundheit\",\"clusterTitle\":\"Bildung Gesundheit\",\"themenblock\":\"themenblock1_bildung\",\"themenblockTitle\":\"Bildung\",\"tags\":[\"Bildung\",\"Integration-und-Diversität\",\"Soziale-Gerechtigkeit\"],\"links\":[\"thema_ehrenamt-mobilitaet\",\"thema_schulbildung\",\"thema_hochschulbildung\",\"thema_inklusive-sicherheit\",\"thema_kita-familienzentren\",\"thema_gefluechtete-unterbringung\"],\"paragraph\":\"Vereine, Sprachkurse und außerschulische Lernorte sind wichtige Stätten des sozialen Zusammenhalts und der Integration. Fundierte Deutschkenntnisse sind der Grundstein für erfolgreiche Integration, Bildungsaufstieg, Teilhabe am Arbeitsmarkt und gesellschaftlichen Zusammenhalt. Die Förderung und der Ausbau bestehender Deutschkurse für alle Bevölkerungsgruppen – Geflüchtete, qualifizierte Fachkräfte und Familien – sind Kernanliegen. Die Angebote sollen besser vernetzt, barrierefrei und inklusiv gestaltet werden. Besonderes Augenmerk gilt der Familienintegration und der Bereitstellung von niedrigschwelliger Beratung und Unterstützung.\",\"massnahmen\":[\"Ausbau eines niedrigschwelligen Angebots an Integrationskursen Volt Gießen fordert den Ausbau von niedrigschwelligen Integrationskursen, um Menschen möglichst schnell in Gesellschaft und Arbeitsleben zu integrieren.\",\"Ausbau des Angebots bestehender Deutschkurse Volt Gießen fordert den Ausbau des bestehenden Angebots an kostenlosen Deutschkursen für Menschen, die keinen Anspruch auf finanzielle Förderung haben.\",\"Kostenlose Deutschförderung für Kinder und Jugendliche jeden Alters Volt Gießen fordert die kostenlose Deutschförderung für Kinder und Jugendliche jeden Alters, um sie schnellstmöglich in den regulären Schulunterricht integrieren zu können und eine Bildungskarriere zu fördern.\",\"Ausbau von Kinderbetreuung im Rahmen von Deutschkursen Volt Gießen fordert den Ausbau von Kinderbetreuung im Rahmen von Deutschkursen, um die Teilnahme an Deutschkursen für Menschen mit (Klein-) Kindern zu erleichtern.\",\"Willkommenskultur stärken Volt Gießen fordert die finanzielle und strukturelle Förderung von Gießener Vereinen, die Integration und gesellschaftliche Teilhabe durch Deutschkurse fördern und so einen wichtigen Beitrag zur Willkommenskultur in Gießen leisten.\",\"Kooperation mit Studiengang Deutsch als Zweitsprache der JLU Volt Gießen fordert eine Kooperation zwischen Bildungsträgern und dem Studiengang \\\"Deutsch als Zweitsprache\\\", der seit 2025 an der JLU angeboten wird. Studierende können sich ehrenamtlich oder vergütet als assistierende Lehrkräfte für Integrations- und Deutschkurse engagieren und so ihre Praxiskompetenz stärken.\",\"Familienzentren als integrative Anlaufstellen Volt Gießen fordert die strukturelle Stärkung von Familienzentren als integrative Anlaufstellen für Betreuung und Bildung in Kooperation mit Vereinen, Elternarbeit und interkulturellen Projekten.\"],\"path\":\"C:/Users/Slava/.gemini/antigravity/scratch/volt-giessen-website/assets/Whalprogramme/wahlprogramm/cluster2_bildung-gesundheit/themenblock1_bildung/thema_ausserschulische-bildung.md\"},{\"slug\":\"thema_fruehkindliche-bildung\",\"title\":\"Frühkindliche Bildung\",\"cluster\":\"cluster2_bildung-gesundheit\",\"clusterTitle\":\"Bildung Gesundheit\",\"themenblock\":\"themenblock1_bildung\",\"themenblockTitle\":\"Bildung\",\"tags\":[\"Bildung\",\"Soziale-Gerechtigkeit\",\"Generationengerechtigkeit\"],\"links\":[\"thema_schulbildung\",\"thema_arbeit-industrie-gerecht\",\"thema_kita-familienzentren\"],\"paragraph\":\"Kindertagesstätten und Kindergärten leisten einen entscheidenden Beitrag zur Chancengerechtigkeit, Integration und Sprachentwicklung. Gießen ist gesetzlich verpflichtet, für jedes Kind ab dem 1. Lebensjahr einen Betreuungsplatz zu stellen. Leider fehlen ausreichende Plätze und Fachkräfte, was lange Wartelisten und eine hohe Belastung des pädagogischen Personals zur Folge hat. Rückläufige Geburtenzahlen werden die Situation jedoch langfristig verändern und stellen die Kommunen vor neue Herausforderungen, die flexible Lösungsansätze erfordern.\",\"massnahmen\":[\"Verbesserung der Strukturqualität der Kitas Volt will die Strukturqualität der Kindertagesstätten durch Reduzierung der Gruppengröße und Erhöhung des Personalschlüssels langfristig erhöhen.\",\"Systematische Sprachförderung Volt fordert die systematische Sprachförderung von Kindern bereits in der Kita. Das gilt sowohl für die deutsche Sprache als Vorbereitung auf den Schuleinstieg, als auch für den spielerischen Umgang mit den Muttersprachen des pädagogischen Fachpersonals und der betreuten Kinder.\",\"Verbesserung der Arbeitsbedingungen für pädagogisches Fachpersonal Volt setzt sich dafür ein, pädagogische Berufe durch eine erhöhte Vergütung, Mobilitätszuschüsse und unbefristete Arbeitsverträge attraktiver zu gestalten.\",\"Quereinstieg durch gezielte Qualifizierung Volt fordert eine enge Kooperation mit dem Jobcenter, um einen unkomplizierten Quereinstieg durch gezielte Qualifizierungen zu ermöglichen.\",\"Anerkennung ausländischer Abschlüsse Volt fordert eine schnelle, unkomplizierte Anerkennung ausländischer Abschlüsse, um den Berufseinstieg für pädagogisches Fachpersonal aus dem Ausland zu erleichtern. Sprachkurse und gezielte Weiterqualifizierungen sollen in Kooperation mit dem Jobcenter intensiv gefördert werden.\",\"Unterstützung des pädagogischen Fachpersonals durch nicht-pädagogisches Personal Volt setzt sich für einen erhöhten Personalschlüssel für nicht-pädagogisches Personal in den Kindertagesstätten ein, um das pädagogische Fachpersonal zu entlasten und die Qualität der pädagogischen Arbeit zu erhöhen.\",\"Einbindung von pädagogischem Personal in kommunalpolitische Entscheidungen Volt fordert die Einbindung von pädagogischem Personal in kommunalpolitische Entscheidungen. Ihre Expertise bezüglich der Herausforderungen und Chancen sowie der Bedürfnisse der verschiedenen Stakeholder (Pädagogisches Personal, nicht-pädagogisches Personal, Erziehungsberechtigte, Kinder) ist unerlässlich, um die Betreuungsstruktur in der Stadt Gießen und im Landkreis langfristig zu verbessern.\",\"Flexibilität des Betreuungsangebots Volt möchte die Flexibilität des Betreuungsangebots durch längere Öffnungszeiten und gleitende Betreuungszeiten verbessern, um die Vereinbarkeit von Familie und Beruf zu fördern.\",\"Einsatz digitaler Tools Volt fordert die Weiterentwicklung von digitalen Tools wie dem \\\"Little Bird\\\"-Portal, um eine transparente Wartelistenverwaltung zu gewährleisten.\",\"Datengestützte Kapazitätsanalysen Volt fordert den Einsatz von datengestützten Kapazitätsanalysen, um den Betreuungsbedarf besser prognostizieren zu können.\"],\"path\":\"C:/Users/Slava/.gemini/antigravity/scratch/volt-giessen-website/assets/Whalprogramme/wahlprogramm/cluster2_bildung-gesundheit/themenblock1_bildung/thema_fruehkindliche-bildung.md\"},{\"slug\":\"thema_hochschulbildung\",\"title\":\"Hochschulbildung\",\"cluster\":\"cluster2_bildung-gesundheit\",\"clusterTitle\":\"Bildung Gesundheit\",\"themenblock\":\"themenblock1_bildung\",\"themenblockTitle\":\"Bildung\",\"tags\":[\"Bildung\",\"Wirtschaftsförderung\",\"Innovation\"],\"links\":[\"thema_oepnv\",\"thema_schulbildung\",\"thema_wirtschaftsfoerderung\",\"thema_soziokultur-stadtteile\"],\"paragraph\":\"Der Hochschulstandort Gießen profitiert von seiner zentralen Lage, der engen Verankerung in der Region Mittelhessen und der Nähe zur Metropolregion Frankfurt/Rhein-Main. Gießen zählt als Wissenschaftsstadt und hat mit rund 36.000 eingeschriebenen Studierenden an zwei Hochschulen deutschlandweit die höchste Studierendendichte. Die Justus-Liebig-Universität (JLU) und die Technische Hochschule Mittelhessen (THM) decken als Volluniversität und Hochschule an der angewandten Wissenschaften gemeinsam ein breites Spektrum von Geisteswissenschaftlichen, Naturwissenschaften und Ingenieurwissenschaften ab. Die Vielfalt der Studiengänge zieht Studieninteressierte und Promovierende aus ganz Deutschland an. Dazu kommt die steigende Zahl der internationalen Studierenden, die ihren Hochschulabschluss (Bachelor, Master, Staatsexamen oder Promotion) an der JLU oder THM vollenden. Volt Gießen möchte die Lebensbedingungen für alle Studierenden nachhaltig verbessern, um sie langfristig auch nach dem Abschluss als akademische Fachkräfte für die Region zu gewinnen.\",\"massnahmen\":[\"Sanierung und Ausbau der Wohnheime Volt Gießen fordert die Sanierung und den Ausbau der bestehenden Wohnheime als Lern-, Erholungs- und Sozialzentren mit soziokulturellem Angebot.\",\"Stärkung des Campuslebens Volt Gießen fordert eine gezielte Stärkung des Campuslebens mithilfe von multifunktionalen Treffpunkten wie Lerncafés und Maker-Spaces, die in bestehende Raumkonzepte integriert werden können.\"],\"path\":\"C:/Users/Slava/.gemini/antigravity/scratch/volt-giessen-website/assets/Whalprogramme/wahlprogramm/cluster2_bildung-gesundheit/themenblock1_bildung/thema_hochschulbildung.md\"},{\"slug\":\"thema_schulbildung\",\"title\":\"Schulbildung\",\"cluster\":\"cluster2_bildung-gesundheit\",\"clusterTitle\":\"Bildung Gesundheit\",\"themenblock\":\"themenblock1_bildung\",\"themenblockTitle\":\"Bildung\",\"tags\":[\"Bildung\",\"Soziale-Gerechtigkeit\",\"Digitalisierung\",\"Innovation\"],\"links\":[\"thema_oepnv\",\"thema_biodiversitaet\",\"thema_fruehkindliche-bildung\",\"thema_hochschulbildung\",\"thema_sportfoerderung\",\"thema_gesundheitsfoerderung-praevention\",\"thema_inklusive-sicherheit\",\"thema_queeres-zentrum\",\"thema_kita-familienzentren\"],\"paragraph\":\"Gießen verfügt über eine vielfältige Schullandschaft mit zahlreichen Grundschulen, weiterführenden Schulen (Gymnasien, Gesamtschulen, Realschulen), Förderschulen sowie Berufsschulen, Berufsschulzentren und Jugendwerkstätten. Diese Vielfalt sichert individuelle Bildungswege und unterstützt frühe Berufsorientierung in enger Kooperation mit lokalen Betrieben und Hochschulen.\",\"massnahmen\":[\"Mehr pädagogisches Personal als Unterstützung für Lehrkräfte Volt Gießen fordert mehr pädagogisches Personal in Schulen als Unterstützung für Lehrkräfte und schlägt eine EU-weite Fachkräfterekrutierung mit vereinfachten Anerkennungsverfahren vor.\",\"Ausbau der Kooperationen mit Hochschulen und Ausbildungsstätten Volt Gießen fordert den Ausbau von bestehenden Kooperationen mit Hochschulen und Ausbildungsstätten, um der Schülerschaft ein breites Spektrum an Berufseinstiegsmöglichkeiten zu eröffnen und akademische wie praktische Angebote in die Ganztagsbetreuung zu integrieren.\",\"Digitale Bildung und Einsatz von KI Volt Gießen fordert die systematische Förderung von digitaler Bildung ab der Grundschule, um die Medien- und Digitalkompetenz der Kinder zu stärken. Für den Unterricht werden Leih-Tablets zur Verfügung gestellt, um die Familien der Kinder nicht finanziell zu belasten. Die Lehrkräfte werden dabei von digitalen Ansprechpersonen nach finnischem Vorbild unterstützt. Auf diese Weise soll die Medien- und Digitalkompetenz der gesamten Schule (Schülerschaft und Lehrkörper) nachhaltig gefördert und gestärkt werden.\",\"Mehrsprachigkeit als Chance Volt Gießen fordert die Integration von den Herkunftssprachen eines Klassenverbandes inklusive Lehrkraft in bestehende Bildungskonzepte. Teile der Schülerschaft mit Migrationshintergrund wächst mit mindestens zwei Sprachen auf. Diese Sprachkompetenz soll als wertvoll gewürdigt und im Rahmen von Sprach-AGs weiter gefördert werden.\",\"Niedrigschwellige, flächendeckende Sprachförderung Volt Gießen fordert eine niedrigschwellige, flächendeckende Sprachförderung von Schul- und Vorschulkindern in Vorlaufklassen, Sprach-Kitas und mittels digitaler Tools.\",\"Pilotprojekt Späterer Schulstart Volt Gießen setzt sich für einen späteren Schulstart zur 2. Stunde ein, um die Aufmerksamkeit und das Wohlbefinden der Kinder und Jugendlichen zu fördern. Für Eltern, die früher mit der Arbeit beginnen, soll es eine verlässliche Schülerbetreuung geben, die den Zeitraum zwischen Schulbeginn und Arbeitsbeginn überbrückt. Diese Betreuung umfasst auch ein kostenloses, gesundes Frühstücksangebot, das den Schulalltag optimal unterstützt.\",\"Ausbau der Ganztagsbetreuung Volt Gießen fordert den Ausbau der bereits bestehenden Angebote in der Ganztagsbetreuung bis 17 Uhr sowie Ferienbetreuung an Schulen, damit alle Familien bestmöglich entlastet werden.\",\"Kostenlose Nachhilfe Volt Gießen fordert kostenlose Nachhilfe und Präventionsangebote als integraler Teil der Ganztagsbetreuung, um die Schülerschaft individuell fördern zu können und Schulabbrüche aufgrund von Bildungslücken zu vermeiden.\",\"Förderung der integrativen Gesamtschule Volt Gießen fordert die Förderung der integrativen Gesamtschule, um Bildungskarrieren durchlässig zu gestalten und Kinder je nach Entwicklungsgeschwindigkeit bestmöglich fördern zu können.\",\"Sicherer Schulweg Volt Gießen fordert den Einsatz von ausreichend Schulbussen und getrennte Rad- und Fußwege, damit Kinder und Jugendliche sicher und selbstständig den Schulweg meistern können.\",\"Gesunde, kostenlose Schulverpflegung Volt Gießen fordert eine gesunde kostenlose Schulverpflegung (Frühstück und Mittagessen), die unter Beteiligung der Schülerschaft nach Vorbild von \\\"Schüler kochen für Schüler\\\" der Gesamtschule Gießen Ost bereitgestellt wird. Frei zugängliche Trinkwasserbrunnen sollen auf den Schulgeländen in Stadt und Kreis installiert werden, um die Trinkwasserversorgung in den Pausen und bei sportlichen Aktivitäten, auch nach dem Unterricht, zu gewährleisten. Zudem sollen Sauerstoffmessgeräte standardmäßig in allen Klassenzimmern eingesetzt werden, um den Sauerstoffgehalt in der Luft zu prüfen und regelmäßiges Lüften zu etablieren.\",\"Pädagogisch wertvolle Raumkonzepte Volt Gießen fordert die Umsetzung von modernen, lernfreundlichen Raumkonzepten, die den verschiedenen Anforderungen des Schulalltags entsprechen. Grünflächen und Gärten bieten Raum für Lernangebote im Freien sowie Erholung in den Pausen und tragen maßgeblich zu einem besseren Klima bei.\",\"Safe Space Schule Volt fordert den verstärkten Schutz des Schulgeländes als sicheren Lernort. Nur in einem angstfreien Raum können Bildungsinhalte erfolgreich vermittelt und aufgenommen werden. Volt Gießen lehnt daher Abschiebungen auf dem Schulgelände grundsätzlich ab, da sie die Schüler- wie die Lehrerschaft nachhaltig traumatisieren können und das Lernklima nachhaltig schädigen.\",\"Progressive Sexualerziehung Volt Gießen fordert eine qualifizierte, externe Sexualerziehung an den Schulen, die Diversität, LGBTQ+-Rechte und Vielfalt als selbstverständlichen Bestandteil vermittelt. Sexualerziehung soll aus Perspektiven unterschiedlicher Identitäten und Lebensmodelle stattfinden und somit inklusiv, aufklärend und respektvoll sein. Das Angebot soll von qualifizierten externen Fachkräften in Kooperation mit dem regulären Lehrpersonal durchgeführt werden.\",\"Suchtprävention nach Zürcher Modell Volt Gießen fordert die Integration einer zielgruppengerechten Aufklärung über Drogenkonsum auf Basis des Zürcher Vier-Säulen-Modells (siehe Kapitel Gesundheit) in den Unterricht, um die Schülerschaft bestmöglich vor riskantem Konsum zu schützen und sie im verantwortungsvollen Umgang mit Drogen zu stärken.\",\"Demokratiebildung Volt Gießen fordert eine erhöhte Mitsprache der Schülerschaft bei Bildungsangeboten, um Schule als Ort der Partizipation und Selbstwirksamkeit erfahrbar zu machen.\"],\"path\":\"C:/Users/Slava/.gemini/antigravity/scratch/volt-giessen-website/assets/Whalprogramme/wahlprogramm/cluster2_bildung-gesundheit/themenblock1_bildung/thema_schulbildung.md\"},{\"slug\":\"thema_sportfoerderung\",\"title\":\"Sportförderung\",\"cluster\":\"cluster2_bildung-gesundheit\",\"clusterTitle\":\"Bildung Gesundheit\",\"themenblock\":\"themenblock1_bildung\",\"themenblockTitle\":\"Bildung\",\"tags\":[\"Soziale-Gerechtigkeit\",\"Gesundheit\"],\"links\":[\"thema_ehrenamt-mobilitaet\",\"thema_schulbildung\",\"thema_hochschulbildung\",\"thema_gesundheitsfoerderung-praevention\",\"thema_inklusive-sicherheit\"],\"paragraph\":\"Sport und körperliche sowie geistige Bewegung sind ein zentraler gesellschaftlicher Faktor zur Förderung der Gesundheit, Stärkung der Gemeinschaft und des sozialen Zusammenhalts. Sportvereine und Bewegungsangebote leisten einen entscheidenden Beitrag zur Integration verschiedener Bevölkerungsgruppen. In der Stadt Gießen tragen Sportvereine, der Unisport, frei zugängliche Sportstätten im öffentlichen Raum sowie kommunale Angebote wie Schwimmbäder, Hallenbäder und Bewegungsflächen wesentlich zur Vielfalt des sportlichen Angebots bei. Als kostengünstige oder kostenlose Bewegungs- und Aufenthaltsangebote für verschiedene Alters- und Zielgruppen sind sie Orte der Begegnung, werten den öffentlichen Raum auf und leisten einen wertvollen Beitrag zur Demokratie.\",\"massnahmen\":[\"Verbesserung des Informations- und Austauschsystems für Förder- und Organisationsfragen und eine Förderung der Zusammenarbeit zwischen Vereinen, Stadtverwaltung und Politik zur Sportentwicklung.\",\"Förderung barrierefreier, inklusiver Sportangebote, um Menschen mit Behinderung und anderen benachteiligten Gruppen gleichberechtigte Teilhabe zu ermöglichen.\",\"Förderung dualer Karrierewege für Leistungssportlerinnen in Kooperation mit den Gießener Hochschulen\",\"Förderung digitaler Anwendungen zur flexiblen und dennoch verlässlich
