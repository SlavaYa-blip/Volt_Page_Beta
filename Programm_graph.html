schutz: Durch klare Regeln für den Umgang mit Daten sowie verständliche Datenschutzhinweise soll die Bevölkerung nachvollziehen können, wie Daten verwendet werden. Kommunale Datenräume (Mobilität, Klima, Verwaltung) werden so gestaltet, dass sie sich an europäischen Vorgaben für offene, interoperable und souveräne Datenökosysteme orientieren.\"],\"path\":\"C:/Users/Slava/.gemini/antigravity/scratch/volt-giessen-website/assets/Whalprogramme/wahlprogramm/cluster3_innovation-wirtschaft/themenblock3_digitalisierung/thema_offene-daten.md\"},{\"slug\":\"thema_beteiligungsleitlinien\",\"title\":\"Verbindliche Beteiligungsstandards\",\"cluster\":\"cluster4_demokratie-teilhabe\",\"clusterTitle\":\"Demokratie Teilhabe\",\"themenblock\":\"themenblock1_beteiligung\",\"themenblockTitle\":\"Beteiligung\",\"tags\":[\"Partizipation\",\"Transparenz\",\"Innovation\"],\"links\":[\"thema_klimaresilienz\",\"thema_schulbildung\",\"thema_livestream-stadtverordnetenversammlung\"],\"paragraph\":\"Beteiligungsleitlinien mit Qualitätssicherung\",\"massnahmen\":[\"Verbindliche Anlassfälle: Größere Bau- und Infrastrukturprojekte (z.B. ab 1 Mio. EUR Investitionsvolumen), Schulentwicklungsplanung, Verkehrskonzepte, Klimaanpassungsmaßnahmen\",\"Stufenmodell der Beteiligung: Informieren (niedrigste Stufe), Konsultieren (Anhörung), Ko-Kreieren (gemeinsame Entwicklung), Mitentscheiden (höchste Stufe bei Bürgerbudgets)\",\"Rollenklärung: Präzise Definition, was die Bürgerschaft entscheiden darf und was als Beratung dient\",\"Rückkopplungspflicht: Verwaltung und Politik müssen öffentlich dokumentieren und begründen, wie Beteiligungsergebnisse berücksichtigt wurden\",\"Beteiligungscheck in Beschlussvorlagen: Jede Vorlage für Stadtverordnetenversammlung/Kreistag muss erläutern, ob und wie Beteiligung stattfand\",\"Jährlicher Beteiligungsbericht: Anzahl der Verfahren, erreichte Gruppen, Ergebnisse, Umsetzungsstand\"],\"path\":\"C:/Users/Slava/.gemini/antigravity/scratch/volt-giessen-website/assets/Whalprogramme/wahlprogramm/cluster4_demokratie-teilhabe/themenblock1_beteiligung/thema_beteiligungsleitlinien.md\"},{\"slug\":\"thema_buergerraete\",\"title\":\"Pilot-Bürgerräte - geloste Stadtgesellschaft entscheidet mit\",\"cluster\":\"cluster4_demokratie-teilhabe\",\"clusterTitle\":\"Demokratie Teilhabe\",\"themenblock\":\"themenblock1_beteiligung\",\"themenblockTitle\":\"Beteiligung\",\"tags\":[\"Partizipation\",\"Transparenz\",\"Innovation\"],\"links\":[\"thema_elefantenklo\",\"thema_klimaresilienz\",\"thema_digitale-infrastruktur\",\"thema_livestream-stadtverordnetenversammlung\",\"thema_beteiligungsleitlinien\"],\"paragraph\":\"Komplexe und emotional aufgeladene Projekte – wie die Zukunft des Elefantenklos am Selterstor – lassen sich mit klassischen Formaten wie Infoabenden oder Online‑Umfragen nur begrenzt bearbeiten. Oft beteiligen sich vor allem besonders laute Gruppen, während viele Stadtteile und Bevölkerungsgruppen unterrepräsentiert bleiben.\",\"massnahmen\":[\"Pilot „Bürgerschaftsrat Zukunft Elefantenklo\\\": 30–50 per Los ausgewählte Personen aus der Einwohnerschaft beraten auf Basis von Input von Fachleuten. Varianten zu Erhalt, Umbau oder Rückbau des Elefantenklos, einschließlich Barrierefreiheit, Stadtbild, Verkehr und möglicher kultureller Nutzung. Ihre Empfehlung wird in der Stadtverordnetenversammlung öffentlich beraten und begründet entschieden.\",\"Standard für Großprojekte: Nach dem Piloten sollen Bürgerschaftsräte bei weiteren größeren Bau‑ und Infrastrukturprojekten, Verkehrskonzepten und Klimaanpassungsmaßnahmen als mögliches Beteiligungsformat im Stufenmodell verankert werden.\",\"Repräsentative Besetzung und unabhängige Moderation: Zusammensetzung nach Kriterien wie Alter, Geschlecht, Stadtteil und Migrationsgeschichte; professionelle, neutrale Prozessbegleitung.\",\"Verbindliche Rückkopplung: Politik und Verwaltung legen öffentlich dar, welche Empfehlungen des Bürgerschaftsrats übernommen werden und warum gegebenenfalls davon abgewichen wird – eingebettet in die allgemeine Rückkopplungspflicht der Beteiligungsleitlinien.\"],\"path\":\"C:/Users/Slava/.gemini/antigravity/scratch/volt-giessen-website/assets/Whalprogramme/wahlprogramm/cluster4_demokratie-teilhabe/themenblock1_beteiligung/thema_buergerraete.md\"},{\"slug\":\"thema_consul-plattform\",\"title\":\"Moderne Beteiligungsplattform mit CONSUL\",\"cluster\":\"cluster4_demokratie-teilhabe\",\"clusterTitle\":\"Demokratie Teilhabe\",\"themenblock\":\"themenblock1_beteiligung\",\"themenblockTitle\":\"Beteiligung\",\"tags\":[\"Partizipation\",\"Digitalisierung\",\"Transparenz\",\"Innovation\"],\"links\":[\"thema_buergernahe-verwaltung\",\"thema_beteiligungsleitlinien\",\"thema_europaeische-identitaet\"],\"paragraph\":\"Beteiligung darf keine Frage des Terminkalenders sein. Die aktuelle Plattform „Gießen DIREKT\\\" ist technologisch veraltet und bietet kaum echte Mitgestaltung. Zudem schließen Präsenzveranstaltungen am Abend oft ganze Gruppen aus: Eltern, Schichtarbeitende oder Menschen mit Mobilitätseinschränkungen. Gießen benötigt eine zentrale, niedrigschwellige Anlaufstelle, auf der die Bürgerschaft nicht nur Mängel melden, sondern aktiv die Stadtpolitik mitgestalten kann – vom Bürgerbudget bis zur Meldung von Angsträumen.\",\"massnahmen\":[\"Plattform-Einführung: Implementierung der Open-Source-Software CONSUL (nach Vorbild erfolgreicher europäischer Metropolen). Die Software ist kostenfrei, DSGVO-konform und wird durch regionalen Support (z. B. aus Darmstadt) zukunftssicher aufgestellt.\",\"Erweiterte Funktionen:\",\"Interaktives Mapping: Meldung von punktuellen Problemen wie defekter Beleuchtung, Barrieren oder Angsträumen direkt auf einer digitalen Stadtkarte.\",\"Mitgestaltung: Systematische Integration von Bürgerbudgets, Online-Abstimmungen und Konsultationsverfahren für Großprojekte.\",\"Transparente Rückkopplung: Einführung verbindlicher Feedback-Schleifen. Die Verwaltung muss auf der Plattform dokumentieren: Was wurde umgesetzt? Was nicht – und warum?\",\"Inklusion & Barrierefreiheit:\",\"Volle Einhaltung der Standards WCAG 2.1 AA und BITV 2.0.\",\"Mehrsprachigkeit: Bereitstellung der Inhalte in den wichtigsten Gießener Alltagssprachen (mind. DE, EN, TR, AR, UK).\",\"Analoge Verzahnung: Aufstellung von Beteiligungsterminals in Bürgerbüros und Stadtteilzentren für Menschen ohne eigenes Endgerät.\",\"Moderation & Qualität: Professionelle Moderation zum Schutz vor Diskriminierung und Hass sowie eine verbindliche Verankerung in den Beteiligungsleitlinien (ab wann ist ein Projekt beteiligungspflichtig?).\"],\"path\":\"C:/Users/Slava/.gemini/antigravity/scratch/volt-giessen-website/assets/Whalprogramme/wahlprogramm/cluster4_demokratie-teilhabe/themenblock1_beteiligung/thema_consul-plattform.md\"},{\"slug\":\"thema_informationsfreiheitssatzung\",\"title\":\"Transparenz und Informationsfreiheit\",\"cluster\":\"cluster4_demokratie-teilhabe\",\"clusterTitle\":\"Demokratie Teilhabe\",\"themenblock\":\"themenblock1_beteiligung\",\"themenblockTitle\":\"Beteiligung\",\"tags\":[\"Transparenz\",\"Partizipation\",\"Verwaltungsmodernisierung\"],\"links\":[\"thema_finanzen\",\"thema_it-sicherheit\"],\"paragraph\":\"Informationsfreiheitssatzung für Stadt und Landkreis\",\"massnahmen\":[\"Erarbeitung von Informationsfreiheitssatzungen Volt Gießen fordert die Erarbeitung von Informationsfreiheitssatzungen nach Vorbild der Mustersatzung Kassel (29.10.2018) oder dem Marburg-Biedenkopf-Modell\",\"Gebührenfreiheit Volt Gießen fordert Gebührenfreiheit für mündliche und einfache schriftliche Auskünfte sowie Akteneinsicht vor Ort; Kopien ca. 0,20 EUR/Seite\",\"Proaktive Veröffentlichung Volt Gießen fordert die proaktive Veröffentlichung von Haushalten, Verträgen ab 10.000 EUR, Gutachten, Umwelt- und Planungsdaten sowie Sitzungsvorlagen.\",\"Aufbau eines Open-Data-Portals mit maschinenlesbaren Formaten (CSV, JSON, XML)\",\"Fristenregelung: Antwortfrist von 1 Monat, Begründungspflicht bei Ablehnung\"],\"path\":\"C:/Users/Slava/.gemini/antigravity/scratch/volt-giessen-website/assets/Whalprogramme/wahlprogramm/cluster4_demokratie-teilhabe/themenblock1_beteiligung/thema_informationsfreiheitssatzung.md\"},{\"slug\":\"thema_livestream-stadtverordnetenversammlung\",\"title\":\"Livestream der Stadtverordnetenversammlung\",\"cluster\":\"cluster4_demokratie-teilhabe\",\"clusterTitle\":\"Demokratie Teilhabe\",\"themenblock\":\"themenblock1_beteiligung\",\"themenblockTitle\":\"Beteiligung\",\"tags\":[\"Transparenz\",\"Partizipation\",\"Digitalisierung\",\"Barrierefreiheit\"],\"links\":[\"thema_consul-plattform\"],\"paragraph\":\"Der Landkreis Gießen überträgt Kreistagssitzungen bereits seit Jahren live auf YouTube - ein transparentes, niedrigschwelliges und barrierearmes Angebot. Die Stadt Gießen verfügt im Jahr 2025 noch immer nicht über einen vergleichbaren Service. Dies schränkt die Möglichkeit zur politischen Teilhabe erheblich ein, insbesondere für Menschen mit eingeschränkter Mobilität, Eltern mit Betreuungspflichten oder Berufstätige.\",\"massnahmen\":[\"Professionelle Streaming-Technik Volt Gießen fordert die Anschaffung von professioneller Streaming-Technik (Kameras, Mikrofone, Mischpult, Software) für den Sitzungssaal.\",\"YouTube-Kanal Volt Gießen fordert die Einrichtung eines YouTube-Kanals „Stadtverordnetenversammlung Gießen\\\" nach Vorbild des Landkreises.\",\"Barrierefreiheit Volt Gießen fordert die automatische Generierung und spätere manuelle Nachbearbeitung von Untertiteln, um Barrierefreiheit bei der Übertragung zu gewährleisten.\",\"Archiv Volt fordert die dauerhafte Archivierung aller Mitschnitte mit Verlinkung zu Tagesordnungspunkten und Beschlüssen.\",\"Persönlichkeitsrechte Volt Gießen fordert die rechtliche Anpassung der Geschäftsordnung zum Umgang mit Persönlichkeitsrechten, um die Übertragung umsetzen zu können.\"],\"path\":\"C:/Users/Slava/.gemini/antigravity/scratch/volt-giessen-website/assets/Whalprogramme/wahlprogramm/cluster4_demokratie-teilhabe/themenblock1_beteiligung/thema_livestream-stadtverordnetenversammlung.md\"},{\"slug\":\"thema_aktionsplan-haeusliche-gewalt\",\"title\":\"Kommunaler Aktionsplan gegen häusliche Gewalt\",\"cluster\":\"cluster4_demokratie-teilhabe\",\"clusterTitle\":\"Demokratie Teilhabe\",\"themenblock\":\"themenblock2_plurale-gesellschaft\",\"themenblockTitle\":\"Plurale Gesellschaft\",\"tags\":[\"Sicherheit\",\"Geschlechtergerechtigkeit\",\"Gesundheit\",\"Transparenz\"],\"links\":[\"thema_schulbildung\",\"thema_gesundheitsfoerderung-praevention\",\"thema_ordnungspartnerschaft\",\"thema_livestream-stadtverordnetenversammlung\",\"thema_frauenhausplaetze\"],\"paragraph\":\"Häusliche Gewalt bleibt oft im Verborgenen. In Gießen gibt es mit dem SkF Frauenhaus und der Interventionsstelle gegen häusliche Gewalt Gießen wichtige Anlaufstellen, jedoch fehlt ein koordinierter, kommunaler Aktionsplan zur Prävention, Sensibilisierung und systematischen Bekämpfung. Hessen hat einen 3. Landesaktionsplan – Volt Gießen fordert, diesen auf kommunaler Ebene zu konkretisieren und umzusetzen.\",\"massnahmen\":[\"Anschluss an den 3. Landesaktionsplan Hessen mit kommunaler Umsetzungsstrategie\",\"Finanzierung regionaler Runder Tisch gegen häusliche Gewalt (vierteljährlich) mit Polizei, Jugendamt, Frauenhäusern, Interventionsstelle, Gesundheitsamt (Landkreis)\",\"Verpflichtende Fortbildungen für kommunale Mitarbeitende (Ordnungsamt, Sozialamt) und Kooperation mit Polizei für deren Schulung\",\"Öffentlichkeitskampagnen an Schulen, in Arztpraxen, Apotheken und öffentlichen Gebäuden\",\"Etablierung eines effizienten Meldesystems mit digitaler Meldeplattform für Verdachtsfälle\",\"Jährlicher Bericht über häusliche Gewalt in Gießen für Stadtverordnetenversammlung\"],\"path\":\"C:/Users/Slava/.gemini/antigravity/scratch/volt-giessen-website/assets/Whalprogramme/wahlprogramm/cluster4_demokratie-teilhabe/themenblock2_plurale-gesellschaft/thema_aktionsplan-haeusliche-gewalt.md\"},{\"slug\":\"thema_antidiskriminierungskonzept\",\"title\":\"Kommunales Antidiskriminierungskonzept\",\"cluster\":\"cluster4_demokratie-teilhabe\",\"clusterTitle\":\"Demokratie Teilhabe\",\"themenblock\":\"themenblock2_plurale-gesellschaft\",\"themenblockTitle\":\"Plurale Gesellschaft\",\"tags\":[\"Integration-und-Diversität\",\"Soziale-Gerechtigkeit\",\"Partizipation\"],\"links\":[\"thema_gesundheitsfoerderung-praevention\",\"thema_praeventionsrat\",\"thema_hasskriminalitaet\"],\"paragraph\":\"Betroffene von Diskriminierung benötigen niedrigschwellige und vertrauenswürdige Anlaufstellen, die rechtliche, emotionale und psychologische Unterstützung bieten. In Gießen existiert mit dem WIR-Vielfaltszentrum bereits eine gute Integrationsinfrastruktur, jedoch keine eigenständige, zentrale Antidiskriminierungsstelle für alle Diskriminierungsformen. 25% der Gießener Bevölkerung haben einen Migrationshintergrund aus 159 Nationen – Diskriminierung ist eine relevante Alltagserfahrung vieler Menschen in unserer Stadt.\",\"massnahmen\":[\"Einrichtung einer unabhängigen kommunalen Antidiskriminierungs-\",\"beauftragten (1,0 VZÄ) als Stabsstelle oder angesiedelt im WIR-Vielfaltszentrum\",\"Sicherstellung eines niedrigschwelligen, barrierefreien Zugangs mit verschiedenen Kommunikationswegen (persönlich, telefonisch, online)\",\"Vertrauliche Beratung, Falleinschätzung und Vermittlung an spezialisierte Stellen\",\"Aufbau einer Online-Meldeplattform für Diskriminierungsvorfälle auf giessen.de\",\"Enge Zusammenarbeit mit dem Kommunalen Präventionsrat bei Fällen von Hasskriminalität\"],\"path\":\"C:/Users/Slava/.gemini/antigravity/scratch/volt-giessen-website/assets/Whalprogramme/wahlprogramm/cluster4_demokratie-teilhabe/themenblock2_plurale-gesellschaft/thema_antidiskriminierungskonzept.md\"},{\"slug\":\"thema_antidiskriminierungstrainings\",\"title\":\"Systematische Antidiskriminierungstrainings für die Verwaltung\",\"cluster\":\"cluster4_demokratie-teilhabe\",\"clusterTitle\":\"Demokratie Teilhabe\",\"themenblock\":\"themenblock2_plurale-gesellschaft\",\"themenblockTitle\":\"Plurale Gesellschaft\",\"tags\":[\"Integration-und-Diversität\",\"Bildung\",\"Verwaltungsmodernisierung\"],\"links\":[\"thema_antidiskriminierungskonzept\"],\"paragraph\":\"In Gießen existiert bereits eine Diversity-Steuergruppe, jedoch fehlen verpflichtende, systematische Fortbildungen zu interkultureller Kompetenz und diskriminierungssensiblem Handeln. Fehlende Sensibilisierung kann zu institutioneller Diskriminierung führen, besonders in Bereichen mit hohem Publikumsverkehr.\",\"massnahmen\":[\"Verpflichtende Basis-Schulung für städtischen Beschäftigten zu Diskriminierungsformen, rechtlichen Grundlagen (AGG) und diskriminierungssensibler Sprache\",\"Vertiefungsworkshops für Führungskräfte zu Diversity Management und diskriminierungssensiblen Handlungsstrategien\",\"Spezielle Schulungen für Angestellte in Ordnungsdienst, Jobcenter und Sozialamt zu interkultureller Kompetenz und Deeskalation\",\"Implementierung in die reguläre Personalentwicklung mit jährlicher Auffrischung\",\"Evaluation durch Bürgerfeedback und Diversity-Monitoring\"],\"path\":\"C:/Users/Slava/.gemini/antigravity/scratch/volt-giessen-website/assets/Whalprogramme/wahlprogramm/cluster4_demokratie-teilhabe/themenblock2_plurale-gesellschaft/thema_antidiskriminierungstrainings.md\"},{\"slug\":\"thema_barrierefreie-kommunikation\",\"title\":\"Barrierefreie Kommunikation und Digitalisierung\",\"cluster\":\"cluster4_demokratie-teilhabe\",\"clusterTitle\":\"Demokratie Teilhabe\",\"themenblock\":\"themenblock2_plurale-gesellschaft\",\"themenblockTitle\":\"Plurale Gesellschaft\",\"tags\":[\"Barrierefreiheit\",\"Digitalisierung\",\"Verwaltungsmodernisierung\",\"Integration-und-Diversität\"],\"links\":[],\"paragraph\":\"Die Webseite der Stadt Gießen und kommunale Informationen sind nicht durchgehend barrierefrei gestaltet. Menschen mit Sehbehinderungen oder kognitiven Einschränkungen haben Schwierigkeiten, Verwaltungsdienstleistungen zu nutzen. Die EU-Richtlinie 2016/2102 verpflichtet Kommunen zur digitalen Barrierefreiheit – diese wird jedoch oft nur minimal erfüllt.\",\"massnahmen\":[\"Vollständige Überarbeitung von giessen.de nach WCAG 2.1 Standard (Web Content Accessibility Guidelines)\",\"Bereitstellung aller wichtigen kommunalen Informationen in leichter Sprache (insbesondere Anträge, Bescheide, Krisenkommunikation)\",\"Nutzung von KI-Tools zur kostengünstigen Übersetzung von Verwaltungstexten in einfache Sprache\",\"Schulungsangebot für Mitarbeitende in Grundlagen der Gebärdensprache (mindestens für Bürgerservice)\",\"Einrichtung eines Gebärdensprach-Video-Dolmetscherdienstes für das Rathaus\"],\"path\":\"C:/Users/Slava/.gemini/antigravity/scratch/volt-giessen-website/assets/Whalprogramme/wahlprogramm/cluster4_demokratie-teilhabe/themenblock2_plurale-gesellschaft/thema_barrierefreie-kommunikation.md\"},{\"slug\":\"thema_barrierefreie-stadtplanung\",\"title\":\"Menschen mit Behinderung\",\"cluster\":\"cluster4_demokratie-teilhabe\",\"clusterTitle\":\"Demokratie Teilhabe\",\"themenblock\":\"themenblock2_plurale-gesellschaft\",\"themenblockTitle\":\"Plurale Gesellschaft\",\"tags\":[\"Barrierefreiheit\",\"Soziale-Gerechtigkeit\",\"Partizipation\"],\"links\":[\"thema_oepnv\",\"thema_hochschulbildung\",\"thema_diskriminierungsmonitoring\"],\"paragraph\":\"Barrierefreie Stadtplanung für öffentliche Räume und Verkehrsmittel\",\"massnahmen\":[\"Sofortmaßnahme: Anpassung aller Ampelschaltungen auf ausreichende Grünphasen für Menschen mit Mobilitätseinschränkungen (geringe Kosten, hohe Wirkung)\",\"Stadttheater: Endlich rollstuhlgerechten Zugang schaffen (seit Jahren überfällig)\",\"ÖPNV-Offensive: Systematische Bestandsaufnahme und Priorisierung beim Ausbau von Haltestellen und Bahnhöfen (Benchmark: Offenbach 90% barrierefrei)\",\"Installation von akustischen und visuellen Informationssystemen für Menschen mit Sinnesbeeinträchtigungen\",\"Systematische Berücksichtigung von Barrierefreiheit bei allen Neubauten und Sanierungen\",\"Schulung aller relevanten Mitarbeitenden (Stadtplanung, Bauamt, Verkehrsplanung) zu DIN 18040\",\"Digitale Karte mit allen Parkplätzen für schwerbehinderte Menschen und barrierefrei zugänglichen Parkplätzen\"],\"path\":\"C:/Users/Slava/.gemini/antigravity/scratch/volt-giessen-website/assets/Whalprogramme/wahlprogramm/cluster4_demokratie-teilhabe/themenblock2_plurale-gesellschaft/thema_barrierefreie-stadtplanung.md\"},{\"slug\":\"thema_barrierefreier-wohnraum\",\"title\":\"Barrierefreien Wohnraum fördern\",\"cluster\":\"cluster4_demokratie-teilhabe\",\"clusterTitle\":\"Demokratie Teilhabe\",\"themenblock\":\"themenblock2_plurale-gesellschaft\",\"themenblockTitle\":\"Plurale Gesellschaft\",\"tags\":[\"Barrierefreiheit\",\"Wohnen-und-Stadtentwicklung\",\"Soziale-Gerechtigkeit\"],\"links\":[\"thema_musterbauordnung\"],\"paragraph\":\"In Gießen herrscht akuter Wohnraummangel bei gleichzeitig steigendem Bedarf an barrierefreiem Wohnraum. Die Hessische Bauordnung schreibt vor, dass 20% aller Neubauwohnungen barrierefrei sein müssen – diese Quote wird jedoch oft nicht erreicht oder nur minimal erfüllt.\",\"massnahmen\":[\"Konsequente Durchsetzung der 20%-Quote der Hessischen Bauordnung bei allen Neubauprojekten\",\"Freiwillige Umsetzung des höheren Standards DIN 18040-2 R (rollstuhlgerecht) statt nur barrierearm\",\"Barrierefreiheit als verbindliches Kriterium bei der Vergabe kommunaler Grundstücke\",\"Einrichtung eines kommunalen Beratungs- und Förderprogramms für barrierefreie Umbaumaßnahmen in Bestandsgebäuden\",\"Kooperation mit Wohnbau Gießen GmbH zur Schaffung barrierefreier Wohnungen im kommunalen Bestand\"],\"path\":\"C:/Users/Slava/.gemini/antigravity/scratch/volt-giessen-website/assets/Whalprogramme/wahlprogramm/cluster4_demokratie-teilhabe/themenblock2_plurale-gesellschaft/thema_barrierefreier-wohnraum.md\"},{\"slug\":\"thema_diskriminierungsmonitoring\",\"title\":\"Diskriminierungsmonitoring\",\"cluster\":\"cluster4_demokratie-teilhabe\",\"clusterTitle\":\"Demokratie Teilhabe\",\"themenblock\":\"themenblock2_plurale-gesellschaft\",\"themenblockTitle\":\"Plurale Gesellschaft\",\"tags\":[\"Integration-und-Diversität\",\"Transparenz\",\"Innovation\"],\"links\":[\"thema_hochschulbildung\",\"thema_gesundheitsfoerderung-praevention\",\"thema_praeventionsrat\",\"thema_livestream-stadtverordnetenversammlung\",\"thema_antidiskriminierungskonzept\",\"thema_hasskriminalitaet\"],\"paragraph\":\"Ohne systematische Datenerfassung bleibt Diskriminierung unsichtbar und kann nicht gezielt bekämpft werden. In Gießen fehlt bislang ein systematisches Monitoring.\",\"massnahmen\":[\"Einrichtung eines Diskriminierungsmonitorings zur Zusammenführung von Erkenntnissen verschiedener Beratungsstellen (WIR-Vielfaltszentrum, ADiNet Mittelhessen, Antidiskriminierungsstelle, AIDS-Hilfe Gießen)\",\"Kooperation mit der JLU Gießen (Institut für Soziologie, Politikwissenschaft) zur regelmäßigen wissenschaftlichen Analyse\",\"Jährlicher Antidiskriminierungsbericht für die Stadtverordnetenversammlung\",\"Anonymisierte Veröffentlichung von Daten zur Transparenz\",\"Datenaustausch mit dem Kommunalen Präventionsrat zur Identifikation von Trends bei Hasskriminalität\"],\"path\":\"C:/Users/Slava/.gemini/antigravity/scratch/volt-giessen-website/assets/Whalprogramme/wahlprogramm/cluster4_demokratie-teilhabe/themenblock2_plurale-gesellschaft/thema_diskriminierungsmonitoring.md\"},{\"slug\":\"thema_frauenhausplaetze\",\"title\":\"Geschlechtergerechtigkeit und Schutz vor Gewalt\",\"cluster\":\"cluster4_demokratie-teilhabe\",\"clusterTitle\":\"Demokratie Teilhabe\",\"themenblock\":\"themenblock2_plurale-gesellschaft\",\"themenblockTitle\":\"Plurale Gesellschaft\",\"tags\":[\"Geschlechtergerechtigkeit\",\"Sicherheit\",\"Soziale-Gerechtigkeit\",\"Gesundheit\"],\"links\":[\"thema_gefluechtete-unterbringung\"],\"paragraph\":\"Ausbau von Frauenhausplätzen\",\"massnahmen\":[\"Bedarfsanalyse: Transparente Erhebung der aktuellen Kapazitäten und Auslastung in Gießen\",\"Schrittweise Erhöhung der Frauenhausplätze auf mindestens 9 Familienzimmer (Istanbul-Konvention)\",\"Prüfung einer Aufstockung auf 18 Plätze (realistischer Bedarf)\",\"Einführung einer Pauschalfinanzierung pro Platz und Jahr statt Tagessätzen zur Planungssicherheit\",\"Schaffung zusätzlicher Schutzplätze für besondere Bedarfsgruppen (Frauen mit Behinderungen, geflüchtete Frauen)\",\"Vorbereitung auf Rechtsanspruch ab 2032 (Hessisches Gewalthilfegesetz)\"],\"path\":\"C:/Users/Slava/.gemini/antigravity/scratch/volt-giessen-website/assets/Whalprogramme/wahlprogramm/cluster4_demokratie-teilhabe/themenblock2_plurale-gesellschaft/thema_frauenhausplaetze.md\"},{\"slug\":\"thema_hasskriminalitaet\",\"title\":\"Dialog und Vernetzung gegen Hasskriminalität\",\"cluster\":\"cluster4_demokratie-teilhabe\",\"clusterTitle\":\"Demokratie Teilhabe\",\"themenblock\":\"themenblock2_plurale-gesellschaft\",\"themenblockTitle\":\"Plurale Gesellschaft\",\"tags\":[\"Integration-und-Diversität\",\"Sicherheit\",\"Partizipation\"],\"links\":[\"thema_schulbildung\",\"thema_hochschulbildung\",\"thema_gesundheitsfoerderung-praevention\",\"thema_jugendparlament\"],\"paragraph\":\"Hasskriminalität und Diskriminierung erfordern koordinierte Maßnahmen verschiedener Fachbereiche und Institutionen. In Gießen fehlt bislang ein systematisches, behördenübergreifendes Gremium, das Polizei, Bildungssektor, Sozialarbeit, Wissenschaft und Zivilgesellschaft vernetzt. Die Justus-Liebig-Universität mit 25.000 Studierenden und die kulturelle Vielfalt der Stadt bieten jedoch großes Potenzial für innovative Präventionsansätze.\",\"massnahmen\":[\"Einrichtung eines Runden Tisches gegen Diskriminierung und Hasskriminalität unter Beteiligung von Polizeipräsidium Mittelhessen, JLU Gießen, Schulen, Sozialarbeit, WIR-Vielfaltszentrum, Jugendparlament und Zivilgesellschaft\",\"Koordination mit dem Hessischen Landesprogramm aktiv für Demokratie und gegen Extremismus\",\"Etablierung systematischer Austauschformate (vierteljährlich) zur Früherkennung und Bekämpfung von Hasskriminalität\",\"Kooperationsvereinbarung zwischen Stadt Gießen und Polizeipräsidium Mittelhessen\",\"Entwicklung eines kommunalen Präventionsplans mit messbaren Zielen\"],\"path\":\"C:/Users/Slava/.gemini/antigravity/scratch/volt-giessen-website/assets/Whalprogramme/wahlprogramm/cluster4_demokratie-teilhabe/themenblock2_plurale-gesellschaft/thema_hasskriminalitaet.md\"},{\"slug\":\"thema_juedisches-leben\",\"title\":\"Jüdisches Leben fördern und schützen\",\"cluster\":\"cluster4_demokratie-teilhabe\",\"clusterTitle\":\"Demokratie Teilhabe\",\"themenblock\":\"themenblock2_plurale-gesellschaft\",\"themenblockTitle\":\"Plurale Gesellschaft\",\"tags\":[\"Integration-und-Diversität\",\"Sicherheit\",\"Kultur-und-Kreativität\"],\"links\":[\"thema_schulbildung\",\"thema_hochschulbildung\",\"thema_pflege-alter\",\"thema_gesundheitsfoerderung-praevention\",\"thema_hasskriminalitaet\",\"thema_erinnerungskultur\"],\"paragraph\":\"Jüdisches Leben erhalten, Gemeinde unterstützen und Gedenken fördern\",\"massnahmen\":[\"Sofortige Sicherheitsmaßnahmen für die Synagoge, z.B. durch bessere Videoüberwachung, Beleuchtung und Polizei-Präsenz in Kooperation mit der Gemeinde\",\"Verbesserung der Barrierefreiheit der Synagoge, insbesondere Zugänglichkeit von Bibliothek und Empore\",\"Regelmäßige Gedenkveranstaltungen in Kooperation mit der jüdischen Gemeinde\",\"Integration jüdischer Geschichte in Stadtführungen, Museen und Schulcurricula\",\"Zusammenarbeit mit der Justus-Liebig-Universität bei Forschung zur jüdischen Geschichte Gießens und zu Prävention von Antisemitismus\",\"Unterstützung gemeindlicher Projekte\"],\"path\":\"C:/Users/Slava/.gemini/antigravity/scratch/volt-giessen-website/assets/Whalprogramme/wahlprogramm/cluster4_demokratie-teilhabe/themenblock2_plurale-gesellschaft/thema_juedisches-leben.md\"},{\"slug\":\"thema_queer-sensible-verwaltung\",\"title\":\"Verwaltungspraxis konsequent queer-sensibel gestalten\",\"cluster\":\"cluster4_demokratie-teilhabe\",\"clusterTitle\":\"Demokratie Teilhabe\",\"themenblock\":\"themenblock2_plurale-gesellschaft\",\"themenblockTitle\":\"Plurale Gesellschaft\",\"tags\":[\"Geschlechtergerechtigkeit\",\"Integration-und-Diversität\",\"Verwaltungsmodernisierung\",\"Partizipation\"],\"links\":[\"thema_pflege-alter\",\"thema_juedisches-leben\"],\"paragraph\":\"Es mangelt oft an strukturierter Zusammenarbeit zwischen Kommunen und queeren Verbänden. Verwaltungsmitarbeitende sind nicht immer ausreichend sensibilisiert für die Bedürfnisse von LGBTIQA+-Personen, was zu Diskriminierung und Missverständnissen führen kann.\",\"massnahmen\":[\"Systematische Einbindung des Hans-Peter-Hauschild-Hauses und anderer LGBTIQA+-Organisationen in kommunale Entscheidungsprozesse (z.B. Beirat)\",\"Schulung von Verwaltungsmitarbeitende (insbesondere Standesamt, Bürgerservice, Personalwesen) zu geschlechtlicher Vielfalt und diskriminierungsfreier Kommunikation\",\"Implementierung geschlechtsneutraler Formulare und Ansprachen in der Verwaltung\",\"Kontaktperson für LGBTIQA+-Belange in der Verwaltung benennen\",\"Regelmäßiger Austausch (halbjährlich) zwischen Stadtspitze und queerer Community\"],\"path\":\"C:/Users/Slava/.gemini/antigravity/scratch/volt-giessen-website/assets/Whalprogramme/wahlprogramm/cluster4_demokratie-teilhabe/themenblock2_plurale-gesellschaft/thema_queer-sensible-verwaltung.md\"},{\"slug\":\"thema_queere-bildungsarbeit\",\"title\":\"Bildungsarbeit zu queeren Lebensweisen\",\"cluster\":\"cluster4_demokratie-teilhabe\",\"clusterTitle\":\"Demokratie Teilhabe\",\"themenblock\":\"themenblock2_plurale-gesellschaft\",\"themenblockTitle\":\"Plurale Gesellschaft\",\"tags\":[\"Bildung\",\"Geschlechtergerechtigkeit\",\"Integration-und-Diversität\"],\"links\":[\"thema_schulbildung\",\"thema_hochschulbildung\",\"thema_ausserschulische-bildung\",\"thema_gesundheitsfoerderung-praevention\"],\"paragraph\":\"Im schulischen Kontext werden Themen wie sexuelle und geschlechtliche Vielfalt oft unzureichend behandelt, was zu Unwissenheit, Vorurteilen und Diskriminierung beiträgt. Gießen als Universitätsstadt mit über 39.000 Studierenden hat besondere Verantwortung und Möglichkeiten für progressive Bildungsarbeit.\",\"massnahmen\":[\"Finanzierung von Bildungsprojekten zu LGBTIQA+-Themen über kommunales Jugendamt und Bildungsbüro\",\"Kooperation mit Schulen zur Integration queerer Themen in den Unterricht (z.B. SCHLAU Hessen)\",\"Unterstützung von Schulen bei Schule ohne Rassismus – Schule mit Courage mit LGBTIQA+-Schwerpunkt\",\"Förderung von Aufklärungsprojekten durch außerschulische Bildungsträger (z.B. AIDS-Hilfe Gießen, Hans-Peter-Hauschild-Haus)\",\"Fortbildungen für Lehrkräfte zu geschlechtlicher und sexueller Vielfalt (Kooperation mit Land Hessen/APAV 2.0)\"],\"path\":\"C:/Users/Slava/.gemini/antigravity/scratch/volt-giessen-website/assets/Whalprogramme/wahlprogramm/cluster4_demokratie-teilhabe/themenblock2_plurale-gesellschaft/thema_queere-bildungsarbeit.md\"},{\"slug\":\"thema_queeres-zentrum\",\"title\":\"Vielfalt sexueller Orientierungen und Geschlechtsidentitäten\",\"cluster\":\"cluster4_demokratie-teilhabe\",\"clusterTitle\":\"Demokratie Teilhabe\",\"themenblock\":\"themenblock2_plurale-gesellschaft\",\"themenblockTitle\":\"Plurale Gesellschaft\",\"tags\":[\"Geschlechtergerechtigkeit\",\"Integration-und-Diversität\",\"Soziale-Gerechtigkeit\"],\"links\":[\"thema_hochschulbildung\"],\"paragraph\":\"Queeres Zentrum stärken und Sichtbarkeit erhöhen\",\"massnahmen\":[\"Verstetigung und Aufstockung der Förderung für das Hans-Peter-Hauschild-Haus\",\"Ausbau als regionales LGBTIQA+-Kompetenzzentrum mit Bildungsangeboten, Beratung und Community-Treffpunkt\",\"Aktive Bewerbung als Austragungsort für den CSD Mittelhessen mit kommunaler Unterstützung (Genehmigungen, Infrastruktur, Sicherheit)\",\"Öffentlichkeitskampagne Gießen ist bunt zur Sichtbarmachung queerer Lebensrealitäten\",\"Regelmäßige queere Kulturveranstaltungen und Filmreihen in städtischen Einrichtungen\"],\"path\":\"C:/Users/Slava/.gemini/antigravity/scratch/volt-giessen-website/assets/Whalprogramme/wahlprogramm/cluster4_demokratie-teilhabe/themenblock2_plurale-gesellschaft/thema_queeres-zentrum.md\"},{\"slug\":\"thema_gefluechtete-unterbringung\",\"title\":\"Dezentrale Unterbringung von Geflüchteten beschleunigen\",\"cluster\":\"cluster4_demokratie-teilhabe\",\"clusterTitle\":\"Demokratie Teilhabe\",\"themenblock\":\"themenblock3_soziales\",\"themenblockTitle\":\"Soziales\",\"tags\":[\"Integration-und-Diversität\",\"Soziale-Gerechtigkeit\"],\"links\":[\"thema_housing-first\"],\"paragraph\":\"Gießen beherbergt die Erstaufnahmeeinrichtung des Landes Hessen (EAEH) mit bis zu 1.000 Plätzen. Zentrale Massenunterkünfte fördern jedoch Isolation und erschweren Integration. Gießen hat mit einem innovativen Holzbau-Konzept bereits Modellcharakter gezeigt – jetzt muss die dezentrale Unterbringung in Wohnungen systematisch beschleunigt werden.\",\"massnahmen\":[\"Dezentralisierungsoffensive: Systematische Vermittlung anerkannter Geflüchteter aus der EAEH in Wohnungen (Zielquote 50% in 6 Monaten)\",\"Wohnraumakquise: Kooperation mit Wohnbau Gießen GmbH und privaten Vermieterinnen, kommunale Anmietung bei Bedarf\",\"Integration der Unterbringung von Geflüchteten in Stadt- und Bauplanung mit flexiblen, multifunktionalen Einrichtungen (Nachnutzung bei sinkenden Zahlen)\",\"Umstellung des kommunalen Leistungssystems von Sach- auf Geldleistungen zur Förderung von Selbstbestimmung\",\"Einführung der elektronischen Gesundheitskarte für alle Geflüchteten\"],\"path\":\"C:/Users/Slava/.gemini/antigravity/scratch/volt-giessen-website/assets/Whalprogramme/wahlprogramm/cluster4_demokratie-teilhabe/themenblock3_soziales/thema_gefluechtete-unterbringung.md\"},{\"slug\":\"thema_housing-first\",\"title\":\"Housing First: Gießener Modell ausbauen\",\"cluster\":\"cluster4_demokratie-teilhabe\",\"clusterTitle\":\"Demokratie Teilhabe\",\"themenblock\":\"themenblock3_soziales\",\"themenblockTitle\":\"Soziales\",\"tags\":[\"Soziale-Gerechtigkeit\",\"Wohnen-und-Stadtentwicklung\",\"Gesundheit\",\"Innovation\"],\"links\":[\"thema_finanzen\"],\"paragraph\":\"Gießen ist mit dem Projekt ZuHAuSE (Zukunft Haushalte für alle Sozial Eingebundenen) bereits Vorreiter beim Housing-First-Ansatz in Hessen. Seit 2016 werden wohnungslose Menschen direkt in eigene Wohnungen vermittelt – mit einer beeindruckenden Erfolgsquote von 80%! Die Staatssekretärin besuchte 2024 das Projekt. Es ist im hessischen Koalitionsvertrag erwähnt. Jetzt gilt es, diesen Erfolg zu verstetigen, auszubauen und Gießen als Modellkommune für ganz Hessen zu positionieren.\",\"massnahmen\":[\"Housing First langfristig sichern: Finanzierung über 2026 (Ende EHAP-Förderung) hinaus durch Aufnahme in kommunale Regelfinanzierung\",\"Ausbau: +50 Housing-First-Wohnungen in den nächsten 3 Jahren (aktuell ca. 20-30)\",\"Wohnraumoffensive: Systematische Kooperation mit Wohnbau Gießen GmbH und privaten Vermietern zur Bereitstellung geeigneter Wohnungen\",\"Zweckentfremdungssatzung gegen Leerstand und missbräuchliche Ferienwohnungen zur Mobilisierung von Wohnraum\",\"Modellkommune: Gießen als Best-Practice-Standort für Hospitationen anderer Kommunen etablieren, Wissenstransfer organisieren\",\"Begleitforschung: Kooperation mit JLU Gießen zur wissenschaftlichen Evaluation und Weiterentwicklung\"],\"path\":\"C:/Users/Slava/.gemini/antigravity/scratch/volt-giessen-website/assets/Whalprogramme/wahlprogramm/cluster4_demokratie-teilhabe/themenblock3_soziales/thema_housing-first.md\"},{\"slug\":\"thema_jugendparlament\",\"title\":\"Jugendparlament einrichten\",\"cluster\":\"cluster4_demokratie-teilhabe\",\"clusterTitle\":\"Demokratie Teilhabe\",\"themenblock\":\"themenblock3_soziales\",\"themenblockTitle\":\"Soziales\",\"tags\":[\"Generationengerechtigkeit\",\"Bildung\",\"Soziale-Gerechtigkeit\",\"Partizipation\"],\"links\":[\"thema_oepnv\",\"thema_schulbildung\",\"thema_arbeit-industrie-gerecht\",\"thema_livestream-stadtverordnetenversammlung\",\"thema_jugendzentren\"],\"paragraph\":\"Gießen hat zwar ein eigenes Jugendamt und 8 Jugendzentren, aber kein Jugendparlament. Junge Menschen haben kaum institutionalisierte Möglichkeiten zur Mitbestimmung in der Kommunalpolitik. Dabei ist Gießen mit einem Durchschnittsalter von 38 Jahren die jüngste Stadt Hessens und Hochschulstandort – junge Stimmen müssen gehört werden!\",\"massnahmen\":[\"Jugendparlament für Gießen: Demokratisch gewähltes Gremium für 12-21-Jährige mit zweijähriger Amtszeit\",\"Echte Mitbestimmung: Rede- und Antragsrecht in der Stadtverordnetenversammlung\",\"Eigenes Budget: Jährliches Budget von 20.000 € zur eigenständigen Verfügung für Jugendprojekte\",\"Professionelle Koordination: 0,5 Vollzeitäquivalente zur Unterstützung und Organisation\",\"Vernetzung: Kooperation mit Schulen, Jugendzentren, Studierendenvertretung (AStA)\",\"Vorbild: Orientierung an erfolgreichen Modellen wie Vogelsbergkreis, Buseck (seit 20 Jahren etabliert)\"],\"path\":\"C:/Users/Slava/.gemini/antigravity/scratch/volt-giessen-website/assets/Whalprogramme/wahlprogramm/cluster4_demokratie-teilhabe/themenblock3_soziales/thema_jugendparlament.md\"},{\"slug\":\"thema_jugendzentren\",\"title\":\"Jugendzentren und niedrigschwellige Angebote ausbauen\",\"cluster\":\"cluster4_demokratie-teilhabe\",\"clusterTitle\":\"Demokratie Teilhabe\",\"themenblock\":\"themenblock3_soziales\",\"themenblockTitle\":\"Soziales\",\"tags\":[\"Generationengerechtigkeit\",\"Bildung\",\"Soziale-Gerechtigkeit\",\"Partizipation\"],\"links\":[\"thema_oepnv\",\"thema_ehrenamt-mobilitaet\",\"thema_hochschulbildung\",\"thema_sportfoerderung\",\"thema_gesundheitsfoerderung-praevention\",\"thema_kulturelle-infrastruktur\"],\"paragraph\":\"Gießen verfügt über 8 Jugendzentren – eine gute Basis. In sozial benachteiligten Stadtteilen besteht jedoch besonderer Bedarf an niedrigschwelligen Angeboten zur Freizeitgestaltung, Bildungsförderung und Gewaltprävention. Als Universitätsstadt sollte Gießen zudem studentisches Engagement für Jugendarbeit systematisch einbinden.\",\"massnahmen\":[\"Bedarfsanalyse für weitere Jugendzentren in Weststadt, Nordstadt und anderen Stadtteilen\",\"Kostenlose oder stark vergünstigte Angebote für Kinder und Jugendliche aus sozial schwachen Familien (Sport, Musik, Kunst, Theater)\",\"Lernpatinnen-Projekt: Kooperation mit JLU Gießen zur Vermittlung von Studierenden als Lernpatinnen (ehrenamtlich, ggf. mit Aufwandsentschädigung)\",\"Juleica aufwerten: Attraktive Vergünstigungen für Jugendleiterinnen-Card-Inhaberinnen (ÖPNV, Kultureinrichtungen)\",\"Ausbau von mobiler Jugendarbeit und Streetwork\"],\"path\":\"C:/Users/Slava/.gemini/antigravity/scratch/volt-giessen-website/assets/Whalprogramme/wahlprogramm/cluster4_demokratie-teilhabe/themenblock3_soziales/thema_jugendzentren.md\"},{\"slug\":\"thema_kinderarmut-praeventionsketten\",\"title\":\"Strukturelle Armutsbekämpfung\",\"cluster\":\"cluster4_demokratie-teilhabe\",\"clusterTitle\":\"Demokratie Teilhabe\",\"themenblock\":\"themenblock3_soziales\",\"themenblockTitle\":\"Soziales\",\"tags\":[\"Soziale-Gerechtigkeit\",\"Generationengerechtigkeit\",\"Bildung\",\"Gesundheit\"],\"links\":[\"thema_fruehkindliche-bildung\",\"thema_schulbildung\",\"thema_gesundheitsfoerderung-praevention\",\"thema_kita-familienzentren\"],\"paragraph\":\"Präventionsketten gegen Kinderarmut\",\"massnahmen\":[\"Bewerbung für das Landesprogramm \\\"Präventionsketten Hessen\\\" mit West- und Nordstadt als priorisierte Stadtteile\",\"Implementierung vernetzter Präventionsangebote von der Geburt bis zum Berufseinstieg (frühe Hilfen, Kitas, Schulen, Jugendberufshilfe)\",\"Ausbau des Quartiersmanagements auf weitere belastete Stadtteile\",\"Etablierung niedrigschwelliger Angebote: interkulturelle Spielgruppen, kostenloses Frühstück in Kitas, Lernpatenschaften\",\"Aktualisierung der Sozialraumanalyse (letzter Armutsbericht von 2021) mit Fokus auf Kinderarmut\",\"Bewerbung für ESF+ Akti(F) Plus zur Förderung von Familien im SGB II/XII-Bezug\",\"Sorgfältiges Quartiersmanagement zur Vermeidung von Ghettoisierung\"],\"path\":\"C:/Users/Slava/.gemini/antigravity/scratch/volt-giessen-website/assets/Whalprogramme/wahlprogramm/cluster4_demokratie-teilhabe/themenblock3_soziales/thema_kinderarmut-praeventionsketten.md\"},{\"slug\":\"thema_kita-familienzentren\",\"title\":\"Kita-Ausbau und Familienzentren stärken\",\"cluster\":\"cluster4_demokratie-teilhabe\",\"clusterTitle\":\"Demokratie Teilhabe\",\"themenblock\":\"themenblock3_soziales\",\"themenblockTitle\":\"Soziales\",\"tags\":[\"Generationengerechtigkeit\",\"Wirtschaftsförderung\"],\"links\":[\"thema_fruehkindliche-bildung\",\"thema_wirtschaftsfoerderung\"],\"paragraph\":\"Die Vereinbarkeit von Familie und Beruf ist eine der größten Herausforderungen für Menschen mit Kindern. Gießen ist hier bereits vorbildlich: Von 11 städtischen Kitas sind 9-10 als Familienzentren ausgebaut – eine herausragende Quote! Dennoch gibt es Handlungsbedarf bei Betreuungsquoten, Wartelisten und flexiblen Öffnungszeiten für Schichtarbeitende und Studierende.\",\"massnahmen\":[\"Transparenz schaffen: Systematische Erhebung und Veröffentlichung von Betreuungsquoten und Wartelisten\",\"Familienzentren langfristig sichern: Verstetigung der Landesförderung (18.000 €/Jahr pro Einrichtung)\",\"Flexible Öffnungszeiten: Pilotprojekt für Randzeiten-Betreuung (vor 7 Uhr, nach 17 Uhr) und Wochenend-Betreuung für Schichtarbeitende\",\"Studierendenfreundlich: Flexible Betreuungsangebote für studierende Eltern (über 39.000 Studierende in Gießen!)\",\"Digitales Kita-Portal: Entwicklung einer benutzerfreundlichen Plattform für Platzvergabe mit mehr Transparenz über Wartelisten\",\"Bedarfsgerechter Ausbau: Bei der Stadtplanung neuer Quartiere Kindergärten bedarfsgerecht mit einplanen, um familienfreundliche Strukturen zu schaffen. Wo nötig, weitere Kita-Plätze schaffen, Förderung über Kleine Bauförderung Hessen (50%)\"],\"path\":\"C:/Users/Slava/.gemini/antigravity/scratch/volt-giessen-website/assets/Whalprogramme/wahlprogramm/cluster4_demokratie-teilhabe/themenblock3_soziales/thema_kita-familienzentren.md\"},{\"slug\":\"thema_mehrgenerationenhaeuser\",\"title\":\"Mehrgenerationenhäuser\",\"cluster\":\"cluster4_demokratie-teilhabe\",\"clusterTitle\":\"Demokratie Teilhabe\",\"themenblock\":\"themenblock3_soziales\",\"themenblockTitle\":\"Soziales\",\"tags\":[\"Generationengerechtigkeit\",\"Soziale-Gerechtigkeit\",\"Wohnen-und-Stadtentwicklung\"],\"links\":[\"thema_fruehkindliche-bildung\",\"thema_kita-familienzentren\"],\"paragraph\":\"Gießen hat aktuell kein Mehrgenerationenhaus im Bundesprogramm. ABER: Mit 9-10 Familienzentren von 11 städtischen Kitas erfüllt Gießen bereits viele Funktionen von Mehrgenerationenhäusern (Beratung, Begegnung, Angebote für verschiedene Generationen).\",\"massnahmen\":[\"Familienzentren erweitern: Öffnung für ältere Menschen und andere Altersgruppen (bislang primär Fokus auf Familien mit Kleinkindern)\",\"Generationen-Projekte: Kooperation zwischen Kitas/Familienzentren und Seniorinneneinrichtungen (z.B. Lesepatinnen, gemeinsame Feste)\",\"Infrastruktur nutzen: Familienzentren als Orte der Begegnung für alle Generationen etablieren\",\"Falls dennoch Bedarf: Prüfung einer Bewerbung für Bundesprogramm Mehrgenerationenhaus (50.000 €/Jahr: 40.000 € Bund + 10.000 € Kommune)\"],\"path\":\"C:/Users/Slava/.gemini/antigravity/scratch/volt-giessen-website/assets/Whalprogramme/wahlprogramm/cluster4_demokratie-teilhabe/themenblock3_soziales/thema_mehrgenerationenhaeuser.md\"},{\"slug\":\"thema_welcome-center\",\"title\":\"Migration und Integration\",\"cluster\":\"cluster4_demokratie-teilhabe\",\"clusterTitle\":\"Demokratie Teilhabe\",\"themenblock\":\"themenblock3_soziales\",\"themenblockTitle\":\"Soziales\",\"tags\":[\"Integration-und-Diversität\",\"Soziale-Gerechtigkeit\",\"Bildung\",\"Wirtschaftsförderung\"],\"links\":[\"thema_hochschulbildung\",\"thema_wirtschaftsfoerderung\",\"thema_gefluechtete-unterbringung\"],\"paragraph\":\"Willkommenskultur: Welcome Center etablieren\",\"massnahmen\":[\"Welcome Center Gießen: Gemeinsame Anlaufstelle von Stadt Gießen, Landkreis Gießen, JLU Gießen, BAMF und Jobcenter\",\"Zwei spezialisierte Welcome Desks: Für EU-Bürgerinnen und internationale Studierende / Für Drittstaatsangehörige und Geflüchtete\",\"Umfassende Beratung zu: Wohnungssuche, Jobvermittlung, Sprachkurse, Anerkennung von Abschlüssen, Kinderbetreuung, Gesundheit\",\"Mehrsprachiges Personal (mindestens Deutsch, Englisch, Arabisch, Ukrainisch)\",\"Dolmetscherpool für weitere Sprachen\",\"Online-Informationsplattform mit mehrsprachigen Materialien\"],\"path\":\"C:/Users/Slava/.gemini/antigravity/scratch/volt-giessen-website/assets/Whalprogramme/wahlprogramm/cluster4_demokratie-teilhabe/themenblock3_soziales/thema_welcome-center.md\"},{\"slug\":\"thema_welcome-to-ausbildung\",\"title\":\"Welcome to Ausbildung – Brücke in den Arbeitsmarkt\",\"cluster\":\"cluster4_demokratie-teilhabe\",\"clusterTitle\":\"Demokratie Teilhabe\",\"themenblock\":\"themenblock3_soziales\",\"themenblockTitle\":\"Soziales\",\"tags\":[\"Soziale-Gerechtigkeit\",\"Wirtschaftsförderung\"],\"links\":[\"thema_hochschulbildung\",\"thema_ausserschulische-bildung\"],\"paragraph\":\"Viele zugewanderte Menschen verfügen über Qualifikationen und Motivation, finden aber schwer Zugang zum deutschen Arbeitsmarkt. Gleichzeitig klagen Gießener Unternehmen über Fachkräftemangel. Als Universitäts- und Wirtschaftsstandort hat Gießen das Potenzial, diese Lücke zu schließen.\",\"massnahmen\":[\"Initiative Welcome to Ausbildung: Kampagne zur Gewinnung von Unternehmen für Ausbildung von Menschen mit Migrationshintergrund\",\"Beratung für Unternehmen zu Fördermöglichkeiten (z.B. Assistierte Ausbildung, ESF-Förderung)\",\"Matching-Plattform zwischen Bewerberinnen und Unternehmen über Welcome Center und Jobcenter\",\"Ausbau der Sprachkurse mit Fachvokabular in Kooperation mit VHS und anderen Bildungsträgern\",\"Anerkennung ausländischer Abschlüsse beschleunigen (Beratung im Welcome Center)\",\"Mentorinnen-Programm: Jede Auszubildende mit Migrationshintergrund bekommt Mentorin im Unternehmen\"],\"path\":\"C:/Users/Slava/.gemini/antigravity/scratch/volt-giessen-website/assets/Whalprogramme/wahlprogramm/cluster4_demokratie-teilhabe/themenblock3_soziales/thema_welcome-to-ausbildung.md\"},{\"slug\":\"thema_erinnerungskultur\",\"title\":\"Erinnerungskultur neu denken\",\"cluster\":\"cluster4_demokratie-teilhabe\",\"clusterTitle\":\"Demokratie Teilhabe\",\"themenblock\":\"themenblock4_kultur\",\"themenblockTitle\":\"Kultur\",\"tags\":[\"Kultur-und-Kreativität\",\"Bildung\",\"Integration-und-Diversität\",\"Partizipation\"],\"links\":[\"thema_brandplatz\",\"thema_brandplatz-wirtschaft\"],\"paragraph\":\"Erinnerungskultur darf sich nicht auf Gedenktafeln und Denkmäler beschränken. Eine zeitgemäße Geschichtsvermittlung muss pluralistisch, gendersensibel, postmigrantisch und partizipativ sein. Gießens historische Plätze erzählen vielschichtige Geschichten, die mit digitalen Mitteln erlebbar gemacht werden können. Zugleich fehlen Formate, die verschiedene Perspektiven einbeziehen und zur aktiven Auseinandersetzung mit der Stadtgeschichte einladen.\",\"massnahmen\":[\"Digitale Geschichtsvermittlung QR-Codes an historischen Orten führen zu multimedialen Erläuterungen – Texte, Fotos, Audio, Video. Historische Informationen werden nach Wuppertaler Vorbild direkt im Stadtbild zugänglich gemacht.\",\"Gießen History App Nach dem Modell der Frankfurt History App entsteht eine interaktive Stadtgeschichts-App, die Orte mit persönlichen Geschichten, historischen Aufnahmen und Audio-Rundgängen verbindet. Nutzende können eigene Inhalte ergänzen und Rundgänge kuratieren.\",\"Geschichtswerkstätten und Stadtteilarchive Partizipative Formate ermöglichen der Bürgerschaft, lokale Geschichte zu erforschen und zu dokumentieren – von Oral-History-Projekten über Stadtteilarchive bis zu künstlerischen Auseinandersetzungen.\",\"Info-Stelen an historischen Plätzen Am Brandplatz, Lindenplatz und anderen zerstörten Plätzen visualisieren Info-Stelen die historische Bebauung und erzählen die Geschichte der Orte und ihrer Menschen.\",\"Pluralistische Erinnerungskultur Bei Straßenbenennungen, Denkmälern und Gedenkveranstaltungen werden systematisch marginalisierte Perspektiven einbezogen – etwa von Frauen, Migrantinnen und anderen von Verfolgung Betroffenen.\"],\"path\":\"C:/Users/Slava/.gemini/antigravity/scratch/volt-giessen-website/assets/Whalprogramme/wahlprogramm/cluster4_demokratie-teilhabe/themenblock4_kultur/thema_erinnerungskultur.md\"},{\"slug\":\"thema_freie-kulturszene\",\"title\":\"Freie Kulturszene stärken und Experimentierräume schaffen\",\"cluster\":\"cluster4_demokratie-teilhabe\",\"clusterTitle\":\"Demokratie Teilhabe\",\"themenblock\":\"themenblock4_kultur\",\"themenblockTitle\":\"Kultur\",\"tags\":[\"Kultur-und-Kreativität\",\"Innovation\",\"Soziale-Gerechtigkeit\"],\"links\":[\"thema_inklusive-sicherheit\"],\"paragraph\":\"Die freie Kulturszene ist ein essenzieller Teil einer lebendigen Kulturlandschaft. Hier werden neue Formen erprobt, experimentiert und interkulturelle sowie politische Ideen entwickelt – von Off-Spaces über kleine Festivals bis hin zu kollektiven Projekträumen. Gleichzeitig arbeitet die freie Szene oft am Existenzminimum, wurde von der Corona-Krise besonders hart getroffen und kämpft mit bürokratischen Hürden bei Förderanträgen. Die städtische Projektförderung (60.000 Euro jährlich, Einzelförderung bis 3.000 Euro) reicht nicht aus, um Vielfalt, Experimentierfreude und neue Formate – auch im Bereich Nachtkultur – angemessen zu unterstützen.\",\"massnahmen\":[\"Experimentierbudget in Höhe von 20.000 Euro jährlich für unkonventionelle Kulturprojekte ohne aufwendige Antragsbürokratie – Förderentscheidungen erfolgen schnell und unkompliziert nach Wuppertaler Vorbild.\",\"Erhöhung des Kulturfonds Gießen auf 50.000 Euro jährlich für Projekte im öffentlichen Raum und in Stadtteilen. Der gemeinsame Kulturfonds Gießen–Wetzlar (derzeit 11.000 Euro) wird deutlich aufgestockt und stärker auf lokale Initiativen und freie Szene ausgerichtet.\",\"Vereinfachte, transparente und inklusive Förderverfahren ○ Anträge kleiner Initiativen bis 5.000 Euro werden auf maximal zwei Seiten begrenzt, Förderentscheidungen innerhalb von vier Wochen getroffen. ○ Förderkriterien, Jurybesetzungen und Entscheidungen werden transparent veröffentlicht; Ablehnungen enthalten konstruktives Feedback. ○ Die Stadt gestaltet Förderaufrufe barrierearm (klare Sprache, digitale Zugänge, ggf. Übersetzungen) und adressiert ausdrücklich marginalisierte Perspektiven (postmigrantische Initiativen, BIPoC‑Communities, queere Gruppen, Menschen mit Behinderung).\",\"Faire Honorare strukturell verankern: Öffentliche Mittel werden so eingesetzt, dass künstlerische Arbeit nicht unter Mindesthonoraren stattfindet. In Richtlinien und Ausschreibungen werden faire Honorare explizit als Fördervoraussetzung benannt.\"],\"path\":\"C:/Users/Slava/.gemini/antigravity/scratch/volt-giessen-website/assets/Whalprogramme/wahlprogramm/cluster4_demokratie-teilhabe/themenblock4_kultur/thema_freie-kulturszene.md\"},{\"slug\":\"thema_kulturelle-bildung\",\"title\":\"Kulturelle Bildung für alle\",\"cluster\":\"cluster4_demokratie-teilhabe\",\"clusterTitle\":\"Demokratie Teilhabe\",\"themenblock\":\"themenblock4_kultur\",\"themenblockTitle\":\"Kultur\",\"tags\":[\"Kultur-und-Kreativität\",\"Bildung\",\"Soziale-Gerechtigkeit\",\"Generationengerechtigkeit\"],\"links\":[\"thema_schulbildung\",\"thema_ausserschulische-bildung\",\"thema_lebendige-innenstadt\",\"thema_arbeit-industrie-gerecht\",\"thema_kulturelle-infrastruktur\",\"thema_kulturgewerbehof-walltor\",\"thema_soziokultur-stadtteile\",\"thema_nachtleben-clubkultur\",\"thema_kunst-oeffentlicher-raum\",\"thema_erinnerungskultur\"],\"paragraph\":\"Kulturelle Bildung ist essentiell für Persönlichkeitsentwicklung, Kreativität und demokratische Teilhabe. Sie darf nicht vom Elternhaus, vom Geldbeutel oder von der Schulform abhängen. Kooperationen zwischen Schulen, Kunstschaffenden und Kultureinrichtungen öffnen solche Zugänge – doch in Gießen sind sie noch nicht systematisch verankert. Kulturelle Bildung wird in Schul- und Jugendhilfeplanung bislang eher als Zusatz denn als Querschnittsaufgabe behandelt, und viele Kinder und Jugendliche erreichen Kulturangebote im Alltag kaum, insbesondere in sozial benachteiligten Quartieren.\",\"massnahmen\":[\"Bildungspartner Gießen Nach dem erfolgreichen Modell „Bildungspartner NRW\\\" wird ein systematisches Kooperationsprogramm zwischen Schulen und kommunalen Bildungs- und Kultureinrichtungen aufgebaut – mit Archiven, Bibliotheken, Museen, Musikschulen, Theatern, Vereinen und freien Initiativen.\",\"Kulturelle Bildung im Schulprogramm verankern Jede Schule entwickelt mindestens drei verbindliche Kooperationen mit Kultureinrichtungen, die im Schulprogramm festgeschrieben werden. Die Stadt unterstützt durch Koordination und Förderung von Fahrtkosten, Eintritt und Honoraren.\",\"Außerschulische Lernorte stärken Museen, Theater, Bibliotheken und Kreativwerkstätten entwickeln gezielte Angebote für Schulklassen und Jugendgruppen. Die Stadt bezuschusst Eintrittsgelder und Workshops, damit finanzielle Hürden kein Ausschlusskriterium sind.\",\"Kulturrucksack Gießen Kostenfreie oder stark vergünstigte Kulturangebote für 10- bis 14-Jährige in Ferienzeiten und am Wochenende – z.B. Tanz, Theater, Musik, Film, Schreiben, Medien und Bildende Kunst. Startbudget: 50.000 Euro jährlich, mit klarer sozialer Schwerpunktsetzung in unterversorgten Quartieren.\",\"Kulturelle Bildung als Pflichtthema in Planung und Verwaltung Kulturelle Bildung wird systematisch in Schul- und Jugendhilfeplanung berücksichtigt. Ein kommunaler Koordinierungskreis Kulturelle Bildung vernetzt Akteurinnen aus Schulen, Verwaltung und Kulturbereich, entwickelt gemeinsame Strategien und sorgt für Transparenz zu Angeboten und Fördermitteln.\"],\"path\":\"C:/Users/Slava/.gemini/antigravity/scratch/volt-giessen-website/assets/Whalprogramme/wahlprogramm/cluster4_demokratie-teilhabe/themenblock4_kultur/thema_kulturelle-bildung.md\"},{\"slug\":\"thema_kulturelle-infrastruktur\",\"title\":\"Kulturelle Infrastruktur zukunftssicher gestalten\",\"cluster\":\"cluster4_demokratie-teilhabe\",\"clusterTitle\":\"Demokratie Teilhabe\",\"themenblock\":\"themenblock4_kultur\",\"themenblockTitle\":\"Kultur\",\"tags\":[\"Kultur-und-Kreativität\",\"Finanzpolitik\",\"Innovation\"],\"links\":[\"thema_finanzen\"],\"paragraph\":\"Gießen steht vor einer doppelten Herausforderung: Die Stadt wächst kontinuierlich, doch die kulturelle Infrastruktur hält nicht Schritt. Räume für Kultur werden knapper, Kulturschaffende finden keine bezahlbaren Ateliers, Proberäume oder Veranstaltungsorte. Gleichzeitig droht die Verdrängung bestehender Kulturorte durch steigende Mietpreise und kommerzielle Interessen. Es fehlen verbindliche stadtplanerische Mechanismen, die das Mitwachsen der kulturellen Infrastruktur mit steigender Bevölkerungszahl garantieren. Ohne aktives Gegensteuern verliert Gießen nicht nur kulturelle Vielfalt, sondern auch einen wichtigen Standortfaktor für junge Menschen, Kreative und Kulturschaffende.\",\"massnahmen\":[\"Kulturbaustein in allen Quartieren, egal ob Neubau- und Entwicklungsgebiete. Die Schaffung von Kulturräumen (Ateliers, Proberäume, Ausstellungsflächen, kleine Bühnen) soll verbindlich in Bebauungsplänen oder städtebaulichen Verträgen verankert werden.\",\"Kulturförderung proportional zum Bevölkerungswachstum, um dauerhafte Unterfinanzierung zu vermeiden. Die Stadt Gießen stellt aktuell 60.000 Euro jährlich für Projektförderung bereit, dieser Betrag muss deutlich aufgestockt werden.\",\"Raumkataster für Kultur: Systematische Erfassung verfügbarer städtischer und privater Räume für kulturelle Nutzung, um Leerstand sichtbar zu machen und Vermittlung zu erleichtern.\",\"Schutz bestehender Kulturorte: Strukturelle Berücksichtigung von kulturell genutzten Immobilien bei Stadtentwicklungsprojekten, um Kulturorte vor Verdrängung zu schützen.\"],\"path\":\"C:/Users/Slava/.gemini/antigravity/scratch/volt-giessen-website/assets/Whalprogramme/wahlprogramm/cluster4_demokratie-teilhabe/themenblock4_kultur/thema_kulturelle-infrastruktur.md\"},{\"slug\":\"thema_kulturgewerbehof-walltor\",\"title\":\"Kreativwirtschaft und Kulturgewerbehof am Walltor-Quartier\",\"cluster\":\"cluster4_demokratie-teilhabe\",\"clusterTitle\":\"Demokratie Teilhabe\",\"themenblock\":\"themenblock4_kultur\",\"themenblockTitle\":\"Kultur\",\"tags\":[\"Kultur-und-Kreativität\",\"Wirtschaftsförderung\",\"Wohnen-und-Stadtentwicklung\"],\"links\":[\"thema_walltor\",\"thema_schulbildung\",\"thema_gruendungsfoerderung\",\"thema_wirtschaftsfoerderung\",\"thema_arbeit-industrie-gerecht\",\"thema_brandschutz\",\"thema_soziokultur-stadtteile\",\"thema_nachtleben-clubkultur\"],\"paragraph\":\"Das Walltor-Quartier ist ein strategischer Sanierungsbereich mit großem Potenzial für Kreativwirtschaft und Kultur. Gleichzeitig entsteht auf den Liegenschaften der alten Feuerwehr an der Westanlage am Oswaldsgarten – zwischen Weststadt, Lahn und Walltor-Quartier – der geplante Kulturgewerbehof. Die JLU-Studie „Kultur, Kreativwirtschaft und Stadtentwicklung in Gießen\\\" zeigt: Gießen benötigt genau einen solchen Ort als Synergiezentrum für wirtschaftliche, kulturelle und nachhaltige Entwicklung.\",\"massnahmen\":[\"Kulturgewerbehof mit städtischer Grundfinanzierung und sozialer Bindung Zügige Realisierung des Kulturgewerbehofs auf den Liegenschaften der alten Feuerwehr am Oswaldsgarten – mit städtischer Grundfinanzierung für Aufbau und Basisbetrieb, langfristiger Sicherung durch Erbpacht bzw. kommunalen Grundstücksbesitz sowie sozial verträglichen, gedeckelten Mieten und verbindlichen Kontingenten für nicht-kommerzielle Träger, freie Szene und Vereine. Öffentliche Mittel werden dabei konsequent an soziale Bindung und Gemeinwohlorientierung geknüpft.\",\"Nutzungsmix, Trägermodell mit Szenebeteiligung, Beirat mit Entscheidungsrechten Der Kulturgewerbehof wird als gemischt genutztes Haus konzipiert: ○ ein wesentlicher Teil der Flächen für freie Kunst- und Musikszene, Proberäume, Studios, offene Werkstätten und kleine Bühnen, ○ ein weiterer Teil für Kreativwirtschaft, Start-ups und sozialunternehmerische Projekte, ○ der übrige Teil für soziokulturelle und nachbarschaftliche Nutzungen (z.B. Bildungsangebote, Initiativen aus dem Stadtteil, Kooperationen mit Akteurinnen aus dem Landkreis). Dieser Nutzungsmix wird in Trägerstruktur und Mietverträgen gesichert.\",\"Trägerschaft mit Beteiligung der Szene Volt setzt sich für ein gemeinwohlorientiertes Trägermodell ein, das die Stadt als Eigentümerin oder starke Partnerin einbindet und als Rechtsform z.B. eine Genossenschaft, Stiftung oder gGmbH mit Nutzerinnenbeteiligung vorsieht. Ein Beirat mit Vertreterinnen der freien Szene, Kreativwirtschaft, Stadtgesellschaft und Verwaltung begleitet Nutzungskonzept, Belegung und Vergabe.\",\"Verzahnung mit Raumkataster und kreativen Zwischennutzungen („Frei_Fläche Gießen\\\") Der Kulturgewerbehof wird eng mit dem städtischen Raumkataster verknüpft: Leerstände im Umfeld von Walltor-Quartier und Weststadt werden über ein Programm „Frei_Fläche Gießen\\\" für kreative Zwischennutzungen (Ausstellungen, Ateliers, Pop-up-Clubs, Proberäume) geöffnet. Das bestehende Urbanautik-Programm (Kooperation Stadt – Raumstation) wird ausgebaut, um Zwischennutzungen systematisch an den Kulturgewerbehof anzubinden und so ein offenes Kreativquartier zu entwickeln – nicht nur ein einzelnes Haus.\",\"Schnittstelle zur Nachtkultur und Clubszene Im Kulturgewerbehof werden gezielt Räume für niedrigschwellige Abend- und Nachtformate (z.B. kleinere Clubnächte, Listening Sessions, Label-Events, Safe-Space-Formate, Awareness-Workshops) mitgeplant. In Kooperation mit der geplanten Koordinationsstelle für Nachtkultur und der freien Szene werden potenzielle Konflikte (Lärm, Nutzungsspitzen) frühzeitig planerisch und baulich berücksichtigt, statt später nur ordnungsrechtlich zu reagieren.\",\"Regionale Einbettung – Stadt und Landkreis gemeinsam Der Kulturgewerbehof öffnet sich ausdrücklich für Kreative, Bands und Initiativen aus dem Landkreis Gießen: Proberäume, Studios und Co-Working-Plätze werden für Projekte aus Stadt und Land zugänglich gemacht. Kooperationen mit Dorfgemeinschaftshäusern, Schulen und Vereinen im Umland (Workshops, Residenzen, gemeinsame Produktionen) werden über das Kulturbüro koordiniert und stärken die Kulturregion Gießen als Ganzes.\"],\"path\":\"C:/Users/Slava/.gemini/antigravity/scratch/volt-giessen-website/assets/Whalprogramme/wahlprogramm/cluster4_demokratie-teilhabe/themenblock4_kultur/thema_kulturgewerbehof-walltor.md\"},{\"slug\":\"thema_kunst-oeffentlicher-raum\",\"title\":\"Kunst im öffentlichen Raum\",\"cluster\":\"cluster4_demokratie-teilhabe\",\"clusterTitle\":\"Demokratie Teilhabe\",\"themenblock\":\"themenblock4_kultur\",\"themenblockTitle\":\"Kultur\",\"tags\":[\"Kultur-und-Kreativität\",\"Wohnen-und-Stadtentwicklung\",\"Partizipation\"],\"links\":[\"thema_brandplatz\",\"thema_brandplatz-wirtschaft\",\"thema_soziokultur-stadtteile\",\"thema_erinnerungskultur\"],\"paragraph\":\"Öffentliche Plätze wie Brandplatz, Lindenplatz und Marktplatz haben durch die Zerstörungen im Zweiten Weltkrieg ihre ursprüngliche Identität verloren. Heute werden sie häufig vor allem als Verkehrs- und Durchgangsflächen wahrgenommen und bieten wenig Aufenthaltsqualität. Kunst im öffentlichen Raum kann diese Orte neu lesbar machen, Identität stiften und niedrigschwellige kulturelle Teilhabe ermöglichen – gerade auch für Menschen, die sonst kaum Kulturangebote nutzen. Zugleich wird die bestehende Kunst-am-Bau-Regelung des Landes Hessen in Gießen bislang nicht konsequent genutzt, und es fehlt an einer klaren kommunalen Strategie, wie Kunst im öffentlichen Raum mit Stadtentwicklung, Erinnerungskultur und Soziokultur zusammengedacht werden soll.\",\"massnahmen\":[\"Kunst-am-Bau-Regelung konsequent anwenden und ausweiten Gießen übernimmt die Darmstädter Praxis: Bis zu 2 % der Baukosten bei kommunalen Projekten werden für Kunst am Bau und Kunst im direkten Umfeld (Plätze, Zugänge, Freiflächen) reserviert.\",\"Kommunaler Kunstbeirat Ein Kunstbeirat begleitet Kunst-am-Bau- und Kunst-im-Raum-Projekte, organisiert transparente Wettbewerbe und Ausschreibungen und bezieht lokale Kunstschaffende ein.\",\"Kulturfonds für öffentlichen Raum Jährlich mindestens 50.000 Euro für Kunstprojekte auf Plätzen, in Parks und an Gebäuden – von temporären Installationen bis zu dauerhaften Skulpturen.\",\"Plätze als regelmäßige Kulturorte nutzen Brandplatz, Lindenplatz und Marktplatz werden gezielt als Kulturorte profiliert: Mindestens ein regelmäßiges, niedrigschwelliges Kulturformat pro Monat im öffentlichen Raum (z.B. Straßentheater, Konzerte, Lesungen, Filmnächte).\",\"Kulturnacht Gießen Jährliches stadtweites Fest zur Sichtbarmachung der kulturellen Vielfalt – alle Kulturorte öffnen ihre Türen, besondere Performances und Installationen im öffentlichen Raum.\"],\"path\":\"C:/Users/Slava/.gemini/antigravity/scratch/volt-giessen-website/assets/Whalprogramme/wahlprogramm/cluster4_demokratie-teilhabe/themenblock4_kultur/thema_kunst-oeffentlicher-raum.md\"},{\"slug\":\"thema_nachtleben-clubkultur\",\"title\":\"Nachtleben, Clubkultur und sichere Freiräume\",\"cluster\":\"cluster4_demokratie-teilhabe\",\"clusterTitle\":\"Demokratie Teilhabe\",\"themenblock\":\"themenblock4_kultur\",\"themenblockTitle\":\"Kultur\",\"tags\":[\"Kultur-und-Kreativität\",\"Sicherheit\",\"Soziale-Gerechtigkeit\",\"Integration-und-Diversität\",\"Generationengerechtigkeit\"],\"links\":[\"thema_oepnv\",\"thema_hochschulbildung\",\"thema_gesundheitsfoerderung-praevention\",\"thema_ordnungspartnerschaft\",\"thema_inklusive-sicherheit\",\"thema_freie-kulturszene\"],\"paragraph\":\"Gießens Profil als junge Universitätsstadt lebt von einem vielfältigen Nachtleben: Clubs, Bars, Livemusik, Open-Air-Veranstaltungen und nicht-kommerzielle Formate wie Raves. In den letzten Jahren geraten diese jedoch zunehmend unter Druck: Lärmschutzkonflikte führen zu Einschränkungen von Außenveranstaltungen, Clubs und Livemusikspielstätten kämpfen mit steigenden Mieten und Auflagen, einige mussten bereits schließen. Legale Räume für elektronische Musik und Experimentierräume fehlen weitgehend. Wird darauf nur mit Verboten und Repression reagiert, verliert Gießen einen zentralen Teil seiner kulturellen Attraktivität – und junge Menschen weichen entweder in andere Städte oder in illegale Grauzonen aus.\",\"massnahmen\":[\"Nachtkultur als Kulturaufgabe anerkennen und Clubs schützen Clubs, Musikspielstätten und kulturell geprägte Gastronomie werden im Kulturleitbild ausdrücklich als Kulturorte benannt. Die Stadt: ○ wendet das \\\"Agent-of-Change\\\"-Prinzip an (Neubauten sorgen für Lärmschutz, nicht die bestehenden Clubs), ○ prüft planungsrechtliche Bestandssicherungen für Kulturorte, ○ öffnet Kulturförderinstrumente für Clubs (z.B. Lärmschutz, Barrierefreiheit, Awareness-Konzepte).\",\"Faire Regeln für Außenkultur und legale „Rave Spaces\\\" Statt pauschaler Verbote entwickelt die Stadt: ○ ein transparentes Regelwerk für Außenveranstaltungen (klare Zeiten, Pegel, Ankündigungen), ○ planerisch ausgewiesene Flächen für elektronische Musik und Raves – innerstädtisch und im Außenbereich, mit vereinfachten Genehmigungen für nicht-kommerzielle Veranstaltungen sowie Grundinfrastruktur (ÖPNV/Nachtbusse, sanitäre Anlagen, Müllkonzept).\",\"Nachtbeauftragte / Nachtbürgermeisterin & Koordinationsstelle Nachtkultur Die bereits eingesetzte Nachtbeauftragte der Stadt Gießen wird zu einer unabhängigen, moderierenden Stelle mit klaren Kompetenzen für Nachtleben und Clubkultur weiterentwickelt. Der Fall Ulenspiegel – bei dem nach Anwohnerbeschwerden die Nutzung der Wiese hinter dem Biergarten für Veranstaltungen untersagt wurde, ohne einen tragfähigen Kompromiss zwischen Club, Nachbarschaft und Stadt zu finden – zeigt, wie dringend eine solche koordinierende Struktur ist, die: ○ zwischen Clubs, Gastronomie, Anwohnenden, Ordnungsamt und Polizei vermittelt, ○ Konflikte frühzeitig aufgreift und mediationbasierte Lösungen statt Verbotsauflagen erarbeitet, ○ als feste Ansprechperson für neue Formate (z.B. Raves, Open-Air-Festivals) fungiert ○ und eine gesamtstädtische Nachtkultur‑Strategie, die Clubkultur, Lärmschutz, Sicherheit (Awareness, feministische Stadtplanung) und Aufenthaltsqualität im öffentlichen Raum zusammendenkt und koordiniert.\",\"Sichere, diskriminierungssensible Nachtkultur Die Stadt unterstützt Clubs und Veranstaltende bei: ○ Awareness-Konzepten und Schulungen (z.B. gegen sexualisierte Gewalt, Rassismus, Queerfeindlichkeit), ○ der Einführung von Awareness-Teams und klaren Hausregeln, ○ der Verknüpfung mit Nachtbussen, On-Demand-Angeboten und Präventionsarbeit (Streetwork, Suchtberatung, Safer-Use-Informationen im rechtlich zulässigen Rahmen)\"],\"path\":\"C:/Users/Slava/.gemini/antigravity/scratch/volt-giessen-website/assets/Whalprogramme/wahlprogramm/cluster4_demokratie-teilhabe/themenblock4_kultur/thema_nachtleben-clubkultur.md\"},{\"slug\":\"thema_soziokultur-stadtteile\",\"title\":\"Soziokultur in Stadtteilen verankern\",\"cluster\":\"cluster4_demokratie-teilhabe\",\"clusterTitle\":\"Demokratie Teilhabe\",\"themenblock\":\"themenblock4_kultur\",\"themenblockTitle\":\"Kultur\",\"tags\":[\"Kultur-und-Kreativität\",\"Soziale-Gerechtigkeit\",\"Partizipation\"],\"links\":[],\"paragraph\":\"Soziokultur und Nachbarschaftskultur sind mehr als Freizeitangebote – sie sind Kitt für den gesellschaftlichen Zusammenhalt. Co-Working-Spaces, Repair-Cafés und Urban-Gardening-Projekte schaffen Begegnungsorte, in denen Menschen unterschiedlicher Herkunft, jeden Alters und mit verschiedenen Interessen zusammenkommen. Doch in Gießen fehlen solche niedrigschwelligen Nachbarschaftszentren mit Kulturangebot. Das Flussstraßenviertel bietet ideale Voraussetzungen für ein solches Zentrum, doch die Umsetzung muss aktiv vorangetrieben werden.\",\"massnahmen\":[\"Nachbarschaftszentrum Flussstraßenviertel: Pilotprojekt mit Proberäumen, kleiner Bühne, Ausstellungsflächen, Co-Working-Space, Repair-Café und Urban-Gardening-Fläche. Die Planung erfolgt partizipativ unter Einbindung der Anwohnerinnen und lokalen Initiativen.\",\"Kulturrucksack Gießen: Kommunales Programm nach NRW-Vorbild für kostenfreie Kulturangebote für Kinder und Jugendliche zwischen 10 und 14 Jahren – Tanz, Theater, Musik, Film, Schreiben, Malen. Startbudget: 50.000 Euro jährlich.\",\"Interkulturelle Gärten: Urban-Gardening-Projekte werden als Plattformen für kulturellen Austausch gefördert und mit soziokultureller Programmierung (Lesungen, Konzerte, Filmvorführungen) bespielt.\",\"Mobile Kulturangebote: Kultur kommt in die Stadtteile – mobile Bibliothek, Wanderausstellungen, Open-Air-Kino und Pop-up-Performances in unterversorgten Quartieren; perspektivisch vernetzt mit ähnlichen Angeboten im Landkreis. Perspektivisch werden diese mobilen Kulturangebote mit ähnlichen Formaten im Landkreis vernetzt, damit Stadtteile und Dörfer gemeinsam von Tourneen, Wanderausstellungen und Open-Air-Reihen profitieren.\"],\"path\":\"C:/Users/Slava/.gemini/antigravity/scratch/volt-giessen-website/assets/Whalprogramme/wahlprogramm/cluster4_demokratie-teilhabe/themenblock4_kultur/thema_soziokultur-stadtteile.md\"},{\"slug\":\"thema_eu-buergerschaftsbeteiligung\",\"title\":\"EU Bürgerschaftsbeteiligung\",\"cluster\":\"cluster4_demokratie-teilhabe\",\"clusterTitle\":\"Demokratie Teilhabe\",\"themenblock\":\"themenblock5_europa\",\"themenblockTitle\":\"Europa\",\"tags\":[\"Europa\",\"Innovation\",\"Wirtschaftsförderung\"],\"links\":[\"thema_wirtschaftsfoerderung\",\"thema_europaeische-identitaet\"],\"paragraph\":\"Obwohl Instrumente wie die Europäische Bürgerinitiative und die EU-Plattform für Bürgerschaftsbeteiligung es Menschen ermöglichen, europäische Politik aktiv mitzugestalten, sind diese Angebote in Gießen und dem Landkreis bislang wenig bekannt und oft nicht barrierearm zugänglich. Dadurch bleiben Beteiligungsmöglichkeiten ungenutzt und Europa wirkt für Teile der Bürgerschaft fern, abstrakt und schwer greifbar.\",\"massnahmen\":[\"Volt will durch die EU Citizens' Engagement Platform einen unkomplizierten Zugang schaffen, um eigene Ideen und Anliegen direkt in den politischen Prozess der EU einzubringen. Die Plattform ist digital, barrierearm und transparent gestaltet.\",\"Die Europäische Bürgerinitiative (EBI) ermöglicht es der Bürgerschaft, Themen eigenständig auf die Agenda der EU zu setzen, verbindlich und wirksam, wenn ausreichend viele Menschen aus verschiedenen Mitgliedstaaten die Initiative unterstützen. Beide Ansätze bauen eine direkte Brücke zwischen der Lebensrealität in Gießen und der europäischen Politik. Sie machen deutlich, dass Mitmachen nicht nur möglich ist, sondern ausdrücklich gewollt. So wird Europa konkret, verständlich und gestaltbar.\"],\"path\":\"C:/Users/Slava/.gemini/antigravity/scratch/volt-giessen-website/assets/Whalprogramme/wahlprogramm/cluster4_demokratie-teilhabe/themenblock5_europa/thema_eu-buergerschaftsbeteiligung.md\"},{\"slug\":\"thema_europaeische-identitaet\",\"title\":\"Europäische Identität in Gießen\",\"cluster\":\"cluster4_demokratie-teilhabe\",\"clusterTitle\":\"Demokratie Teilhabe\",\"themenblock\":\"themenblock5_europa\",\"themenblockTitle\":\"Europa\",\"tags\":[\"Europa\",\"Integration-und-Diversität\",\"Bildung\",\"Kultur-und-Kreativität\"],\"links\":[\"thema_schulbildung\",\"thema_regionale-landwirtschaft\"],\"paragraph\":\"Europa wirkt in Gießen und im Landkreis, bleibt jedoch oft unsichtbar. Fördermittel, Partnerschaften und Projekte prägen bereits heute viele Bereiche des kommunalen Lebens.\",\"massnahmen\":[\"Darstellung von Zuschüssen und Fördermitteln der EU, mit denen lokale Infrastruktur, Bildung, Digitalisierung, Umwelt- und Sozialprojekte unterstützt wurden oder aktuell unterstützt werden\",\"Information über Subventionen für Wirtschaft und Landwirtschaft im Landkreis, die Arbeitsplätze sichern und Innovationen fördern\",\"Aufzeigen der wirtschaftlichen Auswirkungen der EU-Politik auf Gießen, etwa durch Strukturförderung, Investitionen und internationale Kooperationen\",\"Erklärung der Rolle europäischer Institutionen und Organe, deren Entscheidungen Gießen und den Landkreis unmittelbar betreffen\",\"Sichtbarmachung von EU-Abgeordneten mit Bezug zur Region, die als Ansprechpersonen zwischen Europa und kommunaler Realität wirken und deren Arbeit stärker ins öffentliche Bewusstsein rücken soll\",\"Teilnahme am Projekt „Europa fängt in der Gemeinde an\\\" (Building Europe with Local Councillors, BELC), das ein europaweites Netzwerk kommunal gewählter Mandatstragender aufbaut und EU-Politik dort erklärt, wo sie unmittelbar wirkt, in Stadtparlamenten, Kreistagen und Ortsbeiräten\"],\"path\":\"C:/Users/Slava/.gemini/antigravity/scratch/volt-giessen-website/assets/Whalprogramme/wahlprogramm/cluster4_demokratie-teilhabe/themenblock5_europa/thema_europaeische-identitaet.md\"},{\"slug\":\"thema_eurotown\",\"title\":\"Gießen als Eurotown\",\"cluster\":\"cluster4_demokratie-teilhabe\",\"clusterTitle\":\"Demokratie Teilhabe\",\"themenblock\":\"themenblock5_europa\",\"themenblockTitle\":\"Europa\",\"tags\":[\"Europa\",\"Innovation\",\"Wirtschaftsförderung\"],\"links\":[\"thema_wirtschaftsfoerderung\",\"thema_europaeische-identitaet\"],\"paragraph\":\"Auch mittelgroße Städte können europäische Politik aktiv mitgestalten, wenn sie sich zusammenschließen. Das Netzwerk Eurotowns bietet Gießen die Chance, Kräfte zu bündeln, Fördermittel gezielt zu nutzen und gemeinsam Pilotprojekte voranzubringen. So entstehen neue Impulse für Mobilität, Kreislaufwirtschaft und digitale Daseinsvorsorge und das alles sichtbar und erlebbar vor Ort.\",\"massnahmen\":[\"Beitritt Netzwerk Eurotowns: Bis 2027 soll Gießen dem Netzwerk Eurotowns beitreten und innerhalb von drei Jahren mindestens ein Pilotprojekt übernehmen, das lokale Innovationen mit europäischen Strategien verbindet, z.B. ein Circular Economy Lab.\"],\"path\":\"C:/Users/Slava/.gemini/antigravity/scratch/volt-giessen-website/assets/Whalprogramme/wahlprogramm/cluster4_demokratie-teilhabe/themenblock5_europa/thema_eurotown.md\"},{\"slug\":\"thema_staedtepartnerschaften\",\"title\":\"Städtepartnerschaften\",\"cluster\":\"cluster4_demokratie-teilhabe\",\"clusterTitle\":\"Demokratie Teilhabe\",\"themenblock\":\"themenblock5_europa\",\"themenblockTitle\":\"Europa\",\"tags\":[\"Europa\",\"Kultur-und-Kreativität\",\"Bildung\"],\"links\":[\"thema_europaeische-identitaet\"],\"paragraph\":\"Städtepartnerschaften sind gelebtes Europa. Durch Austauschprogramme, gemeinsame Projekte und Begegnungen bringen sie Menschen zusammen, fördern gegenseitiges Verständnis und bauen Vorurteile ab.\",\"massnahmen\":[\"Förderung des kulturellen Austauschs zwischen Kommunen, Vereinen und Organisationen\",\"Ausbau internationaler Austauschprogramme sowie Kooperationen in der Jugend- und Erwachsenenbildung\",\"Nutzung digitaler Formate für gemeinsame Projekte, zum Beispiel virtuelle Begegnungen und kollaborative Plattformen\",\"Gemeinsame Veranstaltungen, Festivals und Austauschprogramme, die Verständnis und Toleranz fördern\",\"Ausbau von Schüler- und Jugendaustauschen, damit junge Menschen internationale Erfahrungen sammeln und Sprachkenntnisse vertiefen können\",\"Stärkung wirtschaftlicher Netzwerke, damit Unternehmen neue Märkte erschließen und Kommunen durch gemeinsame Projekte Impulse für ihre Entwicklung erhalten\"],\"path\":\"C:/Users/Slava/.gemini/antigravity/scratch/volt-giessen-website/assets/Whalprogramme/wahlprogramm/cluster4_demokratie-teilhabe/themenblock5_europa/thema_staedtepartnerschaften.md\"}]}");
