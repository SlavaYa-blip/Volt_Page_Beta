function tagColor(tag){const colors=["#b86cff","#35a7ff","#00c98b","#ffb000","#ff6b6b","#72ddf7","#c9f31d","#ff8bd1","#9aa5ff","#f59e0b"];let h=0;for(const c of tag)h=((h<<5)-h+c.charCodeAt(0))|0;return colors[Math.abs(h)%colors.length]}
function clusters(){return [...new Set(PROGRAMME_DATA.topics.map(t=>t.cluster))]}function clusterIndex(c){return clusters().indexOf(c)}function clusterColor(c){return CLUSTER_COLORS[Math.max(0,clusterIndex(c))%CLUSTER_COLORS.length]}function radius(d){return({supercluster:40,cluster:22,topic:9,measure:4}[d.type]||8)}
function curvePath(d){const sx=d.source.x,sy=d.source.y,tx=d.target.x,ty=d.target.y,dx=tx-sx,dy=ty-sy,dr=Math.sqrt(dx*dx+dy*dy)||1,nx=-dy/dr,ny=dx/dr,b=d.kind==="cross"?Math.min(90,dr*.23):Math.min(38,dr*.12),c1x=sx+dx*.35+nx*b,c1y=sy+dy*.35+ny*b,c2x=sx+dx*.65+nx*b,c2y=sy+dy*.65+ny*b;return `M${sx},${sy} C${c1x},${c1y} ${c2x},${c2y} ${tx},${ty}`}

function buildModel(){const nodes=[],hierarchical=[],topicBySlug=new Map(PROGRAMME_DATA.topics.map(t=>[t.slug,t]));for(const [cluster,clusterTopics]of d3.group(PROGRAMME_DATA.topics,d=>d.cluster)){const scData=SUPERCLUSTER_DATA.find(s=>s.id===cluster)||{scIdx:0,color:CLUSTER_COLORS[0]};const scNode={id:`supercluster:${cluster}`,type:"supercluster",title:clusterTopics[0].clusterTitle||slugLabel(cluster),cluster,scIdx:scData.scIdx,color:scData.color,parent:null};nodes.push(scNode);for(const [block,blockTopics]of d3.group(clusterTopics,d=>d.themenblock)){const cNode={id:`cluster:${block}`,type:"cluster",title:blockTopics[0].themenblockTitle||slugLabel(block),cluster,themenblock:block,parent:scNode.id};nodes.push(cNode);hierarchical.push({source:scNode.id,target:cNode.id,kind:"hier",cluster});for(const topic of blockTopics){const tNode={id:`topic:${topic.slug}`,type:"topic",title:topic.title,cluster,themenblock:block,parent:cNode.id,data:topic,tags:topic.tags};nodes.push(tNode);hierarchical.push({source:cNode.id,target:tNode.id,kind:"hier",cluster});topic.massnahmen.forEach((m,i)=>{const mNode={id:`measure:${topic.slug}:${i}`,type:"measure",title:m,cluster,parent:tNode.id};nodes.push(mNode);hierarchical.push({source:tNode.id,target:mNode.id,kind:"hier",cluster})})}}}const pairTags=new Map();for(const [tag,entries]of d3.group(PROGRAMME_DATA.topics.flatMap(t=>t.tags.map(tag=>({tag,topic:t}))),d=>d.tag)){for(let i=0;i<entries.length;i++)for(let j=i+1;j<entries.length;j++){const a=entries[i].topic.slug,b=entries[j].topic.slug,key=[a,b].sort().join("|");if(!pairTags.has(key))pairTags.set(key,{source:`topic:${a}`,target:`topic:${b}`,kind:"cross",tags:[],explicit:false});pairTags.get(key).tags.push(tag)}}const cross=[...pairTags.values()].map(e=>({...e,tag:e.tags[0]}));for(const topic of PROGRAMME_DATA.topics)for(const link of topic.links||[])if(topicBySlug.has(link))cross.push({source:`topic:${topic.slug}`,target:`topic:${link}`,kind:"cross",tag:"Explizite Links",tags:["Explizite Links"],explicit:true});return{nodes,hierarchical,cross}}
const model=buildModel();model.nodes.filter(n=>n.type==="supercluster").forEach(n=>collapsed.add(n.id));activeTagFilters=new Set([...new Set(model.cross.flatMap(e=>e.tags||[e.tag]))]);
function renderFilters(){const tags=[...new Set(model.cross.flatMap(e=>e.tags||[e.tag]))].sort((a,b)=>a.localeCompare(b,"de"));const nodeMap=new Map(model.nodes.map(n=>[n.id,n]));const scTagMap=new Map(SUPERCLUSTER_DATA.map(sc=>[sc.id,new Set()]));const crossSet=new Set();tags.forEach(tag=>{const scs=new Set();model.cross.forEach(e=>{const et=e.tags||[e.tag];if(!et.includes(tag))return;let cur=nodeMap.get(e.source?.id||e.source);while(cur&&cur.type!=="supercluster")cur=nodeMap.get(cur.parent);if(cur)scs.add(cur.id.replace("supercluster:",""))});if(scs.size===1&&scTagMap.has([...scs][0]))scTagMap.get([...scs][0]).add(tag);else crossSet.add(tag)});const groups=[...SUPERCLUSTER_DATA.map(sc=>({id:sc.id,title:sc.title,color:sc.color,tags:[...scTagMap.get(sc.id)].sort((a,b)=>a.localeCompare(b,"de"))})),{id:"cross",title:"Uebergreifend",color:"#7c6fa0",tags:[...crossSet].sort((a,b)=>a.localeCompare(b,"de"))}].filter(g=>g.tags.length);const fg=d3.select("#filterGrid");fg.selectAll("*").remove();groups.forEach(grp=>{const gd=fg.append("div").attr("class","tree-group open");gd.append("div").attr("class","tree-header").html(`<span class="chev">&#9660;</span><span class="tree-dot" style="width:8px;height:8px;margin:0 2px;background:${grp.color}"></span><span>${grp.title}</span>`).on("click",function(){gd.classed("open",!gd.classed("open"))});const bd=gd.append("div").attr("class","tree-body");grp.tags.forEach(tag=>{bd.append("label").attr("class","tree-item").html(`<input type="checkbox" checked data-tag="${tag.replace(/"/g,"&quot;")}"><span class="tree-dot" style="width:7px;height:7px;background:${tagColor(tag)}"></span>${tag}`)})});fg.on("change",e=>{const cb=e.target.closest("input[data-tag]");if(!cb)return;cb.checked?activeTagFilters.add(cb.dataset.tag):activeTagFilters.delete(cb.dataset.tag);update()})}
function renderLegend(){d3.select("#legend").selectAll("div").data(SUPERCLUSTER_DATA).join("div").attr("class","legend-item").html(sc=>`<span class="legend-dot" style="background:${sc.color}"></span><span>${sc.title}</span>`)}
function childCount(id){return model.nodes.filter(n=>n.parent===id).length}function descendants(id){const byParent=d3.group(model.nodes,d=>d.parent),out=[];(function visit(x){for(const child of byParent.get(x)||[]){out.push(child.id);visit(child.id)}})(id);return out}
function visibleModel(){const map=new Map(model.nodes.map(n=>[n.id,n])),hidden=new Set();for(const node of model.nodes){let parent=node.parent;while(parent){if(collapsed.has(parent)){hidden.add(node.id);break}parent=map.get(parent)?.parent}}const nodes=model.nodes.filter(n=>!hidden.has(n.id)),ids=new Set(nodes.map(n=>n.id)),toObj=l=>({...l,source:map.get(l.source.id||l.source),target:map.get(l.target.id||l.target)}),hier=model.hierarchical.filter(l=>ids.has(l.source.id||l.source)&&ids.has(l.target.id||l.target)).map(toObj),cross=model.cross.filter(l=>(l.tags||[l.tag]).some(tag=>activeTagFilters.has(tag))&&ids.has(l.source.id||l.source)&&ids.has(l.target.id||l.target)).map(toObj);return{nodes,links:[...hier,...cross]}}
function radialR(d){return{supercluster:0,cluster:200,topic:400,measure:540}[d.type]||300}function radialS(d){return{supercluster:0,cluster:.6,topic:.65,measure:.7}[d.type]||0.3}const simulation=d3.forceSimulation().alphaDecay(0.026).velocityDecay(0.36).force("link",d3.forceLink().id(d=>d.id).distance(d=>d.kind==="hier"?({supercluster:180,cluster:130,topic:80}[d.source.type]||60):200).strength(d=>d.kind==="hier"?.88:.007)).force("charge",d3.forceManyBody().strength(d=>d.type==="supercluster"?-1800:d.type==="cluster"?-500:d.type==="topic"?-100:-14)).force("center",d3.forceCenter(width()/2,height()/2)).force("radial",d3.forceRadial(radialR,width()/2,height()/2).strength(radialS)).force("collide",d3.forceCollide().radius(d=>radius(d)+(d.type==="supercluster"?28:d.type==="cluster"?16:6)).iterations(2));
function connectedSet(id){const set=new Set([id]);for(const l of visibleLinks)if((l.source.id||l.source)===id||(l.target.id||l.target)===id){set.add(l.source.id||l.source);set.add(l.target.id||l.target)}return set}
function createParticles(activeLinks){particleG.selectAll("circle").remove();particleG.selectAll("circle").data(activeLinks.slice(0,34)).join("circle").attr("r",d=>d.kind==="hier"?3:2).attr("fill",d=>d.kind==="hier"?clusterColor(d.cluster||d.source.cluster):tagColor(d.tag)).attr("opacity",.9).append("animateMotion").attr("dur",(d,i)=>`${1.4+(i%5)*.2}s`).attr("repeatCount","indefinite").attr("path",d=>curvePath(d))}
function applyFocus(){if(!hoveredId){nodeG.selectAll(".node").classed("dim",false);rootG.selectAll(".edge").classed("dim",false).classed("hot",false);return}const connected=connectedSet(hoveredId);nodeG.selectAll(".node").classed("dim",d=>!connected.has(d.id));rootG.selectAll(".edge").classed("dim",d=>!connected.has(d.source.id||d.source)||!connected.has(d.target.id||d.target)).classed("hot",d=>(d.source.id||d.source)===hoveredId||(d.target.id||d.target)===hoveredId);createParticles(visibleLinks.filter(d=>(d.source.id||d.source)===hoveredId||(d.target.id||d.target)===hoveredId))}
function clearHover(){hoveredId=null;tooltip.style("opacity",0);particleG.selectAll("circle").remove();applyFocus()}
function showDetails(node){if(!node?.data)return;const t=node.data;details.classed("open",true);details.select(".title").text(t.title);details.select(".meta").text(`${t.clusterTitle} · ${t.themenblockTitle}`);details.select(".pills").selectAll("span").data(t.tags).join("span").attr("class","pill").style("box-shadow",tag=>`inset 3px 0 0 ${tagColor(tag)}`).text(d=>d);details.select("p").text(t.paragraph||"Kein Fließtext gefunden.")}
function update(){const vm=visibleModel();visibleLinks=vm.links;const visibleIds=new Set(vm.nodes.map(d=>d.id));const linkData=visibleLinks.filter(d=>d.kind==="hier").map(d=>({...d}));hierG.selectAll("path.edge").data(visibleLinks.filter(d=>d.kind==="hier"),d=>`${d.source.id||d.source}->${d.target.id||d.target}`).join("path").attr("class","edge hier").attr("stroke",d=>clusterColor(d.cluster)).attr("stroke-width",d=>d.source.type==="supercluster"?7:d.source.type==="cluster"?4:2.2);crossG.selectAll("path.edge").data(visibleLinks.filter(d=>d.kind==="cross"),d=>`${d.source.id||d.source}->${d.target.id||d.target}:${(d.tags||[d.tag]).join(",")}`).join("path").attr("class","edge cross").attr("stroke",d=>tagColor((d.tags||[d.tag]).find(tag=>activeTagFilters.has(tag))||d.tag)).attr("stroke-dasharray",d=>d.explicit?"none":"3 7");const node=nodeG.selectAll("g.node").data(vm.nodes,d=>d.id);node.exit().remove();const enter=node.enter().append("g").attr("class",d=>`node ${d.type}`).on("mouseenter",(event,d)=>{hoveredId=d.id;tooltip.style("opacity",1).html(`<strong>${d.title}</strong><br>${d.type==="topic"?d.tags.join(", "):d.type==="supercluster"?"Hauptkapitel":d.type==="cluster"?"Themenbereich":d.type}`);applyFocus()}).on("mousemove",event=>tooltip.style("left",event.clientX+"px").style("top",event.clientY+"px")).on("mouseleave",clearHover).on("click",(event,d)=>{event.stopPropagation();if(childCount(d.id)){if(collapsed.has(d.id)){collapsed.delete(d.id);model.nodes.filter(n=>n.parent===d.id).forEach(n=>collapsed.add(n.id))}else{collapsed.add(d.id)};update()}if(d.type==="topic")showDetails(d)});enter.append("circle").attr("class","main");enter.append("text").attr("class","label").attr("text-anchor","middle").attr("dy",d=>radius(d)+13).text(d=>d.type==="measure"?"":d.title).each(function(d){const max=d.type==="supercluster"?20:d.type==="cluster"?16:20;if((d.title||"").length>max)d3.select(this).text(d.title.slice(0,max-1)+"…")});enter.append("g").attr("class","badge").style("display","none").call(g=>{g.append("circle").attr("r",8);g.append("text")});const merged=enter.merge(node);merged.select("circle.main").attr("r",radius).attr("fill",d=>d.type==="supercluster"?d.color:clusterColor(d.cluster));merged.select(".badge").style("display",d=>collapsed.has(d.id)?null:"none").attr("transform",d=>`translate(${radius(d)-1},${-radius(d)+1})`).select("text").text(d=>descendants(d.id).filter(id=>!visibleIds.has(id)).length||childCount(d.id));simulation.nodes(vm.nodes).on("tick",ticked);simulation.force("link").links(linkData);simulation.force("center",d3.forceCenter(width()/2,height()/2));simulation.alpha(.72).restart();applyFocus()}
function ticked(){rootG.selectAll("path.edge").attr("d",curvePath);nodeG.selectAll("g.node").attr("transform",d=>`translate(${d.x},${d.y})`)}
svg.on("click",()=>details.classed("open",false));window.addEventListener("resize",()=>{simulation.force("center",d3.forceCenter(width()/2,height()/2)).force("radial",d3.forceRadial(radialR,width()/2,height()/2).strength(radialS));simulation.alpha(.35).restart()});renderFilters();renderLegend();update();};if(window.d3)window.startGraph();
</script>
